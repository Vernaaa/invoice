<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor 企業級圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- 引入 React 與 Babel (內建翻譯官) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        /* 隱藏滾動條但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const INITIAL_INVOICES = [
            { id: '1', invoiceNumber: 'AB-12345678', date: '2026-04-01', invoiceType: '三聯式', taxId: 'TW-23456789', netAmount: 1000, tax: 50, total: 1050, status: 'verified' },
            { id: '2', invoiceNumber: 'CD-87654321', date: '2026-03-15', invoiceType: '二聯式', taxId: '', netAmount: 5000, tax: 250, total: 5250, status: 'verified' },
            { id: '3', invoiceNumber: 'EF-99887766', date: '2026-05-10', invoiceType: '三聯式', taxId: 'US-11223344', netAmount: 10000, tax: 500, total: 10500, status: 'verified' },
            { id: '4', invoiceNumber: 'GH-11223344', date: '2026-05-12', invoiceType: '二聯式', taxId: '', netAmount: 250, tax: 0, total: 250, status: 'verified' },
        ];

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        function App() {
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices');
                return saved ? JSON.parse(saved) : INITIAL_INVOICES;
            });
            const [activeTab, setActiveTab] = useState('entry');
            const [toast, setToast] = useState(null);
            const [selectedPeriod, setSelectedPeriod] = useState('ALL');
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式',
                taxRate: 0.05, 
                invoiceNumber: '',
                date: new Date().toISOString().split('T')[0],
                taxId: '',
                netAmount: '',
                tax: '',
                total: ''
            });
            
            const [isScanning, setIsScanning] = useState(false);
            const [errors, setErrors] = useState({});
            const invoiceInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('nextgen_invoices', JSON.stringify(invoices));
            }, [invoices]);

            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort((a, b) => b.localeCompare(a));
            }, [invoices]);

            const filteredInvoices = useMemo(() => {
                if (selectedPeriod === 'ALL') return invoices;
                return invoices.filter(inv => getInvoicePeriod(inv.date) === selectedPeriod);
            }, [invoices, selectedPeriod]);

            useEffect(() => {
                if (selectedPeriod !== 'ALL' && !availablePeriods.includes(selectedPeriod)) {
                    setSelectedPeriod('ALL');
                }
            }, [availablePeriods, selectedPeriod]);

            const exportToCSV = () => {
                if (filteredInvoices.length === 0) {
                    showToast('目前篩選的期別沒有資料可以匯出喔！', 'info');
                    return;
                }
                const headers = ['期別', '發票類型', '稅別', '發票號碼', '開立日期', '買受人統編', '銷售額(未稅)', '營業稅', '總計(含稅)'];
                const csvContent = [
                    headers.join(','),
                    ...filteredInvoices.map(inv => {
                        const taxTypeLabel = inv.tax === 0 ? '免稅' : '應稅';
                        return `${getInvoicePeriod(inv.date)},${inv.invoiceType},${taxTypeLabel},${inv.invoiceNumber},${inv.date},${inv.taxId || ''},${inv.netAmount},${inv.tax},${inv.total}`;
                    })
                ].join('\n');

                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `發票財務報表_${selectedPeriod === 'ALL' ? '全部' : selectedPeriod}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast(`已成功匯出 ${selectedPeriod === 'ALL' ? '全部' : selectedPeriod} 的報表！`, 'success');
            };

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const validateForm = () => {
                const newErrors = {};
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) newErrors.invoiceNumber = '格式為：兩碼英文-八碼數字';
                if (formData.invoiceType === '三聯式') {
                    if (!formData.taxId || !formData.taxId.match(/^[A-Z]{2}-\d{8}$/)) {
                        newErrors.taxId = '格式為：兩碼英文-八碼數字';
                    }
                    if (!formData.netAmount || isNaN(formData.netAmount)) newErrors.netAmount = '請輸入有效銷售額';
                } else {
                    if (!formData.total || isNaN(formData.total)) newErrors.total = '請輸入有效總計金額';
                }
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleTaxRateChange = (rate) => {
                let newFormData = { ...formData, taxRate: rate };
                if (newFormData.invoiceType === '三聯式' && newFormData.netAmount && !isNaN(newFormData.netAmount)) {
                    const net = parseInt(newFormData.netAmount, 10);
                    newFormData.tax = Math.round(net * rate);
                    newFormData.total = net + newFormData.tax;
                } else if (newFormData.invoiceType === '二聯式' && newFormData.total && !isNaN(newFormData.total)) {
                    const tot = parseInt(newFormData.total, 10);
                    newFormData.netAmount = Math.round(tot / (1 + rate));
                    newFormData.tax = tot - newFormData.netAmount;
                }
                setFormData(newFormData);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let newFormData = { ...formData, [name]: value };

                if (name === 'invoiceType') {
                    newFormData.taxId = ''; newFormData.netAmount = ''; newFormData.tax = ''; newFormData.total = '';
                }

                if (name === 'netAmount' && newFormData.invoiceType === '三聯式' && value && !isNaN(value)) {
                    const net = parseInt(value, 10);
                    newFormData.tax = Math.round(net * formData.taxRate);
                    newFormData.total = net + newFormData.tax;
                }

                if (name === 'total' && newFormData.invoiceType === '二聯式' && value && !isNaN(value)) {
                    const tot = parseInt(value, 10);
                    const calculatedNet = Math.round(tot / (1 + formData.taxRate));
                    newFormData.netAmount = calculatedNet;
                    newFormData.tax = tot - calculatedNet;
                }

                if (name === 'invoiceNumber' || name === 'taxId') {
                    let formatted = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (formatted.length > 2) formatted = formatted.substring(0, 2) + '-' + formatted.substring(2, 10);
                    newFormData[name] = formatted;
                }

                setFormData(newFormData);
                if (errors[name]) setErrors({ ...errors, [name]: null });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validateForm()) {
                    const newInvoice = {
                        ...formData,
                        id: Date.now().toString(),
                        netAmount: parseInt(formData.netAmount, 10) || 0,
                        tax: parseInt(formData.tax, 10) || 0,
                        total: parseInt(formData.total, 10) || 0,
                    };
                    
                    const period = getInvoicePeriod(formData.date);
                    const updatedInvoices = [newInvoice, ...invoices].sort((a, b) => new Date(b.date) - new Date(a.date));
                    setInvoices(updatedInvoices);
                    
                    showToast(`發票已歸檔至 ${period}！`, 'success');
                    setFormData({ ...formData, invoiceNumber: '', taxId: '', netAmount: '', tax: '', total: '' });
                    
                    // 在手機上送出後自動失焦，收起鍵盤
                    if (window.innerWidth > 768) {
                        invoiceInputRef.current?.focus();
                    } else {
                        invoiceInputRef.current?.blur();
                    }
                } else {
                    showToast('請檢查輸入格式是否正確。', 'error');
                }
            };

            const handleDelete = (id) => {
                setInvoices(invoices.filter(inv => inv.id !== id));
                showToast('發票已作廢刪除。', 'success');
            };

            const simulateAIScan = () => {
                setIsScanning(true);
                showToast('AI 視覺模組啟動中...', 'info');
                setTimeout(() => {
                    const isTri = Math.random() > 0.5;
                    const isTaxFree = Math.random() > 0.8;
                    const currentTaxRate = isTaxFree ? 0 : 0.05;
                    const randomNet = Math.floor(Math.random() * 9000) + 1000;
                    
                    setFormData({
                        invoiceType: isTri ? '三聯式' : '二聯式',
                        taxRate: currentTaxRate,
                        invoiceNumber: `XY-${Math.floor(10000000 + Math.random() * 90000000)}`,
                        date: new Date().toISOString().split('T')[0],
                        taxId: isTri ? `AI-${Math.floor(10000000 + Math.random() * 90000000)}` : '',
                        netAmount: randomNet,
                        tax: Math.round(randomNet * currentTaxRate),
                        total: randomNet + Math.round(randomNet * currentTaxRate)
                    });
                    setIsScanning(false);
                    showToast(isTaxFree ? '偵測為【免稅】憑證。' : 'AI 解析完成！', 'success');
                }, 1500);
            };

            const totalAmount = filteredInvoices.reduce((sum, inv) => sum + inv.total, 0);
            const totalTax = filteredInvoices.reduce((sum, inv) => sum + inv.tax, 0);

            const PeriodSelector = () => (
                <div className="flex items-center gap-2 bg-white border border-slate-200 px-3 py-2 rounded-xl shadow-sm flex-shrink-0 w-full md:w-auto">
                    <i className="ph ph-calendar-blank text-slate-400 text-lg"></i>
                    <select 
                        value={selectedPeriod} 
                        onChange={(e) => setSelectedPeriod(e.target.value)}
                        className="bg-transparent border-none focus:outline-none text-slate-700 font-medium text-sm cursor-pointer w-full"
                    >
                        <option value="ALL">全部期別總覽</option>
                        {availablePeriods.map(p => (
                            <option key={p} value={p}>{p}</option>
                        ))}
                    </select>
                </div>
            );

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
                    
                    {/* 桌機版側邊欄 */}
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col z-10 shadow-xl flex-shrink-0">
                        <div className="p-6">
                            <h1 className="text-xl font-bold text-white flex items-center gap-2">
                                <i className="ph-fill ph-lightning text-emerald-400 text-2xl"></i>
                                NextGen 發票
                            </h1>
                            <p className="text-xs mt-2 text-slate-500">2026 企業級中樞</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'entry' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="ph ph-plus text-xl"></i> 發票錄入
                            </button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'list' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="ph ph-list-numbers text-xl"></i> 總覽與篩選
                            </button>
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="ph ph-chart-polar text-xl"></i> 統計儀表板
                            </button>
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button className="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors">
                                <i className="ph ph-gear text-lg"></i> 設定
                            </button>
                        </div>
                    </aside>

                    {/* 手機版底部導航列 */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-2 z-50 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] pb-safe">
                        <button onClick={() => setActiveTab('entry')} className={`flex flex-col items-center p-2 w-full transition-colors ${activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className={`ph${activeTab === 'entry' ? '-fill' : ''} ph-plus-circle text-2xl mb-1`}></i>
                            <span className="text-[10px] font-bold">錄入</span>
                        </button>
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center p-2 w-full transition-colors ${activeTab === 'list' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className={`ph${activeTab === 'list' ? '-fill' : ''} ph-list-numbers text-2xl mb-1`}></i>
                            <span className="text-[10px] font-bold">清單</span>
                        </button>
                        <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 w-full transition-colors ${activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className={`ph${activeTab === 'dashboard' ? '-fill' : ''} ph-chart-polar text-2xl mb-1`}></i>
                            <span className="text-[10px] font-bold">數據</span>
                        </button>
                    </nav>

                    {/* 主內容區 */}
                    <main className="flex-1 overflow-y-auto overflow-x-hidden relative pb-24 md:pb-0">
                        {toast && (
                            <div className={`absolute top-4 md:top-6 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 px-4 py-3 w-11/12 md:w-auto rounded-xl shadow-lg flex items-center gap-3 transition-all z-[60] animate-slide-in ${toast.type === 'error' ? 'bg-red-100 text-red-800 border border-red-200' : toast.type === 'info' ? 'bg-blue-100 text-blue-800 border border-blue-200' : 'bg-emerald-100 text-emerald-800 border border-emerald-200'}`}>
                                <i className={`ph-fill flex-shrink-0 ${toast.type === 'error' ? 'ph-warning-circle text-red-500' : 'ph-check-circle text-emerald-500'} text-xl`}></i>
                                <span className="font-medium text-sm md:text-base">{toast.message}</span>
                            </div>
                        )}

                        <div className="p-4 md:p-8 max-w-6xl mx-auto">
                            
                            {/* 手機版頂部標題 */}
                            <div className="md:hidden flex items-center justify-between mb-6">
                                <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <i className="ph-fill ph-lightning text-emerald-500 text-2xl"></i>
                                    NextGen
                                </h1>
                            </div>

                            <header className="mb-6 md:mb-8 flex flex-col md:flex-row md:justify-between items-start md:items-end gap-4">
                                <div className="hidden md:block">
                                    <h2 className="text-3xl font-bold text-slate-800">
                                        {activeTab === 'entry' && '新增發票'}
                                        {activeTab === 'list' && '發票總覽'}
                                        {activeTab === 'dashboard' && '財務洞察'}
                                    </h2>
                                    <p className="text-slate-500 mt-1">依據營業稅申報期別，精準管理帳務。</p>
                                </div>
                                
                                <div className="flex flex-col md:flex-row gap-3 w-full md:w-auto items-stretch md:items-center">
                                    {(activeTab === 'list' || activeTab === 'dashboard') && <PeriodSelector />}
                                    
                                    {activeTab === 'list' && (
                                        <button onClick={exportToCSV} className="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl shadow-sm transition-all transform active:scale-95 text-sm font-medium w-full md:w-auto">
                                            <i className="ph ph-download text-lg"></i> <span className="md:inline">匯出 CSV</span>
                                        </button>
                                    )}
                                </div>
                            </header>

                            {activeTab === 'entry' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                                    <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-8">
                                        <form onSubmit={handleSubmit} className="space-y-5 md:space-y-6">
                                            <div className="flex p-1 bg-slate-100 rounded-xl mb-2 w-full md:max-w-sm mx-auto md:mx-0">
                                                <button type="button" onClick={() => handleInputChange({ target: { name: 'invoiceType', value: '三聯式' }})} className={`flex-1 flex items-center justify-center gap-2 py-2.5 md:py-2 text-sm font-bold rounded-lg transition-all ${formData.invoiceType === '三聯式' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                                    <i className="ph ph-buildings text-lg"></i> 三聯 (B2B)
                                                </button>
                                                <button type="button" onClick={() => handleInputChange({ target: { name: 'invoiceType', value: '二聯式' }})} className={`flex-1 flex items-center justify-center gap-2 py-2.5 md:py-2 text-sm font-bold rounded-lg transition-all ${formData.invoiceType === '二聯式' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                                    <i className="ph ph-user text-lg"></i> 二聯 (B2C)
                                                </button>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-sm font-semibold text-slate-700 flex justify-between">發票號碼 <span className="text-red-500">*</span></label>
                                                    <div className="relative">
                                                        <i className="ph ph-receipt absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                                        <input ref={invoiceInputRef} type="text" inputMode="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} placeholder="AB-12345678" className={`w-full pl-10 pr-4 py-3 md:py-2.5 rounded-xl md:rounded-lg border text-base ${errors.invoiceNumber ? 'border-red-400 focus:ring-red-500' : 'border-slate-300 focus:ring-indigo-500'} focus:outline-none focus:ring-2 transition-all uppercase`} />
                                                    </div>
                                                    {errors.invoiceNumber && <p className="text-red-500 text-xs mt-1">{errors.invoiceNumber}</p>}
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-sm font-semibold text-slate-700 flex justify-between">
                                                        開立日期 <span className="text-indigo-500 text-xs mt-1 bg-indigo-50 px-2 py-0.5 rounded">({getInvoicePeriod(formData.date)})</span>
                                                    </label>
                                                    <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-4 py-3 md:py-2.5 rounded-xl md:rounded-lg border border-slate-300 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all" />
                                                </div>
                                            </div>

                                            <div className={`space-y-2 transition-all ${formData.invoiceType === '二聯式' ? 'opacity-50 pointer-events-none hidden md:block' : ''}`}>
                                                <label className="text-sm font-semibold text-slate-700">買受人統編 {formData.invoiceType === '三聯式' && <span className="text-red-500">*</span>}</label>
                                                <input 
                                                    type="text" 
                                                    inputMode="text"
                                                    name="taxId" 
                                                    value={formData.taxId} 
                                                    onChange={handleInputChange} 
                                                    placeholder={formData.invoiceType === '二聯式' ? "二聯式免填" : "例: AB-12345678"} 
                                                    maxLength={11} 
                                                    disabled={formData.invoiceType === '二聯式'} 
                                                    className={`w-full px-4 py-3 md:py-2.5 rounded-xl md:rounded-lg border text-base ${errors.taxId ? 'border-red-400' : 'border-slate-300 focus:ring-indigo-500'} focus:outline-none focus:ring-2 transition-all disabled:bg-slate-50 uppercase`} 
                                                />
                                                {errors.taxId && <p className="text-red-500 text-xs mt-1">{errors.taxId}</p>}
                                            </div>

                                            <div className="pt-4 border-t border-slate-100">
                                                <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-3">
                                                    <div className="flex items-center gap-2 text-slate-700">
                                                        <i className="ph-fill ph-calculator text-indigo-500 text-xl hidden md:inline"></i>
                                                        <h3 className="font-semibold text-base">金額計算 <span className="text-xs text-slate-400 font-normal ml-1 hidden md:inline">({formData.invoiceType === '三聯式' ? '正算' : '逆推'})</span></h3>
                                                    </div>
                                                    
                                                    <div className="flex p-1 bg-slate-100 rounded-lg w-full md:w-auto">
                                                        <button type="button" onClick={() => handleTaxRateChange(0.05)} className={`flex-1 md:flex-none px-3 py-2 md:py-1.5 text-xs font-bold rounded-md transition-all ${formData.taxRate === 0.05 ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}>
                                                            應稅 (5%)
                                                        </button>
                                                        <button type="button" onClick={() => handleTaxRateChange(0)} className={`flex-1 md:flex-none px-3 py-2 md:py-1.5 text-xs font-bold rounded-md transition-all ${formData.taxRate === 0 ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>
                                                            免稅 (0%)
                                                        </button>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4">
                                                    <div className={`space-y-1 md:space-y-2 flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start ${formData.invoiceType === '二聯式' && formData.taxRate !== 0 ? 'opacity-70' : ''}`}>
                                                        <label className="text-sm md:text-xs font-medium text-slate-500 w-1/3 md:w-auto">銷售額 {formData.invoiceType === '三聯式' && <span className="text-red-500">*</span>}</label>
                                                        <input type="number" inputMode="numeric" name="netAmount" value={formData.netAmount} onChange={handleInputChange} placeholder="0" readOnly={formData.invoiceType === '二聯式' && formData.taxRate !== 0} className={`w-2/3 md:w-full px-4 py-2.5 md:py-2 rounded-xl md:rounded-lg border border-slate-300 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-mono text-right ${(formData.invoiceType === '二聯式' && formData.taxRate !== 0) ? 'bg-slate-50' : ''}`} />
                                                    </div>
                                                    <div className="space-y-1 md:space-y-2 opacity-70 flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start">
                                                        <label className="text-sm md:text-xs font-medium text-slate-500 w-1/3 md:w-auto">營業稅 ({formData.taxRate === 0 ? '0%' : '5%'})</label>
                                                        <input type="number" name="tax" value={formData.tax} onChange={handleInputChange} placeholder="0" readOnly className="w-2/3 md:w-full px-4 py-2.5 md:py-2 rounded-xl md:rounded-lg border border-slate-300 text-base bg-slate-50 focus:outline-none font-mono text-right" />
                                                    </div>
                                                    <div className={`space-y-1 md:space-y-2 pt-2 md:pt-0 border-t border-slate-100 md:border-none flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start ${formData.invoiceType === '三聯式' && formData.taxRate !== 0 ? 'opacity-70' : ''}`}>
                                                        <label className="text-sm md:text-xs font-bold text-indigo-700 w-1/3 md:w-auto">總計 {formData.invoiceType === '二聯式' && <span className="text-red-500">*</span>}</label>
                                                        <input type="number" inputMode="numeric" name="total" value={formData.total} onChange={handleInputChange} placeholder="0" readOnly={formData.invoiceType === '三聯式' && formData.taxRate !== 0} className={`w-2/3 md:w-full px-4 py-3 md:py-2 rounded-xl md:rounded-lg border text-lg md:text-base ${(formData.invoiceType === '二聯式' || formData.taxRate === 0) ? 'border-indigo-400 bg-white shadow-inner focus:ring-2 focus:ring-indigo-500' : 'border-indigo-200 bg-indigo-50'} text-indigo-900 font-bold focus:outline-none transition-all font-mono text-right`} />
                                                    </div>
                                                </div>
                                                {errors.netAmount && <p className="text-red-500 text-xs mt-2 text-right md:text-left">{errors.netAmount}</p>}
                                                {errors.total && <p className="text-red-500 text-xs mt-2 text-right md:text-left">{errors.total}</p>}
                                            </div>

                                            <div className="pt-4 md:pt-6">
                                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 md:py-3 px-4 rounded-xl shadow-md md:shadow-sm transition-all transform active:scale-[0.98] flex justify-center items-center gap-2 text-lg md:text-base">
                                                    <i className="ph-bold ph-check-circle text-xl"></i> 儲存歸檔
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <div className="space-y-4 md:space-y-6">
                                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl shadow-lg p-5 md:p-6 text-white relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-4 opacity-10">
                                                <i className="ph-fill ph-camera text-6xl"></i>
                                            </div>
                                            <div className="relative z-10">
                                                <h3 className="text-lg font-bold flex items-center gap-2 mb-2"><i className="ph ph-scan text-blue-400 text-xl"></i> AI 智能辨識</h3>
                                                <p className="text-xs text-slate-300 mb-5 leading-relaxed">在手機上，未來這裡將直接連動您的相機進行 OCR 掃描。</p>
                                                <button onClick={simulateAIScan} disabled={isScanning} className={`w-full py-3 md:py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${isScanning ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-md'}`}>
                                                    {isScanning ? <><span className="animate-spin text-xl">◓</span> 解析中...</> : <><i className="ph ph-camera text-xl"></i> 模擬拍攝發票</>}
                                                </button>
                                            </div>
                                        </div>

                                        <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 md:p-6">
                                            <h4 className="text-emerald-800 font-bold mb-1 md:mb-2 flex items-center gap-2"><i className="ph-fill ph-database text-lg"></i> 系統狀態</h4>
                                            <p className="text-emerald-700 text-sm">已安全存放 <span className="font-bold text-lg md:text-xl">{invoices.length}</span> 張發票。</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'list' && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-left border-collapse min-w-[800px]">
                                            <thead>
                                                <tr className="bg-slate-50 text-slate-500 text-xs md:text-sm uppercase tracking-wider border-b border-slate-200">
                                                    <th className="p-3 md:p-4 font-semibold whitespace-nowrap">期別</th>
                                                    <th className="p-3 md:p-4 font-semibold">類型</th>
                                                    <th className="p-3 md:p-4 font-semibold">發票號碼</th>
                                                    <th className="p-3 md:p-4 font-semibold">開立日期</th>
                                                    <th className="p-3 md:p-4 font-semibold">統編</th>
                                                    <th className="p-3 md:p-4 font-semibold text-right">銷售額</th>
                                                    <th className="p-3 md:p-4 font-semibold text-right">稅額</th>
                                                    <th className="p-3 md:p-4 font-semibold text-right">總計</th>
                                                    <th className="p-3 md:p-4 font-semibold text-center">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filteredInvoices.length === 0 ? (
                                                    <tr><td colSpan="9" className="p-10 md:p-12 text-center text-slate-400 flex flex-col items-center gap-2">
                                                        <i className="ph ph-file-dashed text-4xl mb-2"></i>
                                                        此期別目前沒有發票資料。
                                                    </td></tr>
                                                ) : (
                                                    filteredInvoices.map((inv) => (
                                                        <tr key={inv.id} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-3 md:p-4 text-xs font-semibold text-slate-400 whitespace-nowrap">{getInvoicePeriod(inv.date).split(' ')[1]}</td>
                                                            <td className="p-3 md:p-4">
                                                                <div className="flex flex-col md:flex-row items-start md:items-center gap-1 md:gap-2">
                                                                    <span className={`px-2 py-0.5 md:py-1 text-[10px] md:text-xs font-bold rounded-md whitespace-nowrap ${inv.invoiceType === '三聯式' ? 'bg-indigo-100 text-indigo-700' : 'bg-amber-100 text-amber-700'}`}>{inv.invoiceType.substring(0,2)}</span>
                                                                    {inv.tax === 0 && <span className="px-2 py-0.5 md:py-1 text-[10px] md:text-xs font-bold rounded-md bg-emerald-100 text-emerald-700 border border-emerald-200">免稅</span>}
                                                                </div>
                                                            </td>
                                                            <td className="p-3 md:p-4 font-bold text-sm md:text-base text-slate-800 whitespace-nowrap">{inv.invoiceNumber}</td>
                                                            <td className="p-3 md:p-4 text-xs md:text-sm text-slate-600 whitespace-nowrap">{inv.date}</td>
                                                            <td className="p-3 md:p-4 text-xs md:text-sm text-slate-600 font-mono whitespace-nowrap">{inv.taxId || '-'}</td>
                                                            <td className="p-3 md:p-4 text-xs md:text-sm text-slate-600 font-mono text-right">${inv.netAmount.toLocaleString()}</td>
                                                            <td className="p-3 md:p-4 text-xs md:text-sm text-slate-600 font-mono text-right">${inv.tax.toLocaleString()}</td>
                                                            <td className="p-3 md:p-4 text-sm md:text-base text-indigo-700 font-bold font-mono text-right">${inv.total.toLocaleString()}</td>
                                                            <td className="p-3 md:p-4 text-center">
                                                                <button onClick={() => handleDelete(inv.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="作廢刪除">
                                                                    <i className="ph ph-trash text-lg md:text-xl"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="md:hidden bg-slate-50 text-center text-[10px] text-slate-400 py-1.5 border-t border-slate-200">
                                        <i className="ph ph-arrows-left-right mr-1"></i>左右滑動查看完整表格
                                    </div>
                                </div>
                            )}

                            {activeTab === 'dashboard' && (
                                <div className="animate-slide-in">
                                    <div className="mb-4 md:mb-6 flex items-center justify-between">
                                        <h3 className="text-lg md:text-xl font-bold text-slate-700">
                                            {selectedPeriod === 'ALL' ? '累積財務總覽' : `${selectedPeriod} 報表`}
                                        </h3>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                                        <div className="col-span-2 md:col-span-1 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                            <div className="text-slate-500 text-xs md:text-sm font-bold mb-1 md:mb-2">處理發票數</div>
                                            <div className="text-3xl md:text-4xl font-black text-slate-800">{filteredInvoices.length} <span className="text-sm md:text-lg text-slate-400 font-normal">張</span></div>
                                        </div>
                                        <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                            <div className="text-slate-500 text-xs md:text-sm font-bold mb-1 md:mb-2">銷售總額(未稅)</div>
                                            <div className="text-xl md:text-4xl font-black text-slate-800 font-mono">${(totalAmount - totalTax).toLocaleString()}</div>
                                        </div>
                                        <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 p-5 md:p-6 rounded-2xl shadow-sm border border-indigo-200 text-white">
                                            <div className="text-indigo-100 text-xs md:text-sm font-bold mb-1 md:mb-2">發票總額(含稅)</div>
                                            <div className="text-xl md:text-4xl font-black font-mono">${totalAmount.toLocaleString()}</div>
                                            <div className="mt-2 md:mt-4 text-[10px] md:text-sm text-indigo-200 font-medium">營業稅: ${totalTax.toLocaleString()}</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
