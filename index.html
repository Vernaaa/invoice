<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .guide-step { position: relative; padding-left: 2rem; border-left: 2px solid #e2e8f0; margin-bottom: 2rem; }
        .guide-step::before { content: ''; position: absolute; left: -0.5rem; top: 0; width: 1rem; height: 1rem; border-radius: 9999px; background: #4f46e5; border: 2px solid white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        // --- Supabase 配置 ---
        const SUPABASE_URL = 'https://bzdwlfodbkyiougsqeve.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f7RuOJ8xRT8qXNIjwP5wlw_pRTFKN3b';
        const supabase = Object.assign(window['supabase']).createClient(SUPABASE_URL, SUPABASE_KEY);

        const COLORS = { 
            primary: '#4f46e5', 
            success: '#10b981', 
            warning: '#f59e0b', 
            danger: '#ef4444', 
            accent: '#8b5cf6',
            chart: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
        };

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const periodStart = (date.getMonth() + 1) % 2 === 0 ? date.getMonth() : date.getMonth() + 1;
            return `${date.getFullYear()}年 ${String(periodStart).padStart(2, '0')}-${String(periodStart + 1).padStart(2, '0')}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices_supabase');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [activeTab, setActiveTab] = useState('help');
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterType, setFilterType] = useState('ALL');

            const chartRefs = { bar: useRef(null), line: useRef(null), doughnut: useRef(null) };
            const chartInstances = useRef({});

            const [formData, setFormData] = useState({
                invoiceType: '三聯式', taxType: 'taxable', invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0], taxId: '', 
                items: [], netAmount: 0, tax: 0, total: 0, status: 'active'
            });

            useEffect(() => {
                localStorage.setItem('nextgen_invoices_supabase', JSON.stringify(invoices));
            }, [invoices]);

            useEffect(() => {
                const performSync = async () => {
                    if (invoices.length === 0) return;
                    setSyncStatus('syncing');
                    const syncData = invoices.map(inv => ({
                        id: inv.invoiceNumber,
                        data: { ...inv, items: inv.items || [] },
                        updated_at: new Date()
                    }));
                    const { error } = await supabase.from('invoices').upsert(syncData);
                    if (error) setSyncStatus('error');
                    else {
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus('idle'), 2000);
                    }
                };
                const timer = setTimeout(performSync, 1500);
                return () => clearTimeout(timer);
            }, [invoices]);

            useEffect(() => {
                if (activeTab === 'dashboard') {
                    Object.values(chartInstances.current).forEach(c => c?.destroy());
                    const activeInvoices = invoices.filter(i => i.status !== 'void');
                    if (chartRefs.line.current) {
                        const trendMap = {};
                        [...activeInvoices].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(inv => {
                            const month = inv.date.substring(0, 7);
                            trendMap[month] = (trendMap[month] || 0) + (inv.total || 0);
                        });
                        chartInstances.current.line = new Chart(chartRefs.line.current, {
                            type: 'line',
                            data: { labels: Object.keys(trendMap), datasets: [{ label: '營收趨勢', data: Object.values(trendMap), borderColor: COLORS.primary, fill: true, tension: 0.4 }] },
                            options: { responsive: true, maintainAspectRatio: false }
                        });
                    }
                    if (chartRefs.bar.current && activeInvoices.length > 0) {
                        const itemMap = {};
                        activeInvoices.forEach(inv => (inv.items || []).forEach(it => { itemMap[it.name] = (itemMap[it.name] || 0) + (it.amount || 0); }));
                        const barData = Object.keys(itemMap).map(n => ({ n, v: itemMap[n] })).sort((a,b) => b.v - a.v).slice(0, 5);
                        chartInstances.current.bar = new Chart(chartRefs.bar.current, {
                            type: 'bar',
                            data: { labels: barData.map(d=>d.n), datasets: [{ data: barData.map(d=>d.v), backgroundColor: COLORS.chart, borderRadius: 8 }] },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    }
                    if (chartRefs.doughnut.current) {
                        const b2b = activeInvoices.filter(i => i.invoiceType === '三聯式').length;
                        const b2c = activeInvoices.filter(i => i.invoiceType === '二聯式').length;
                        chartInstances.current.doughnut = new Chart(chartRefs.doughnut.current, {
                            type: 'doughnut',
                            data: {
                                labels: ['三聯 (B2B)', '二聯 (B2C)'],
                                datasets: [{ data: [b2b, b2c], backgroundColor: [COLORS.accent, COLORS.warning], borderWidth: 0 }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
                        });
                    }
                }
            }, [activeTab, invoices]);

            const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 3000); };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let val = value;
                if (name === 'invoiceNumber') {
                    val = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (val.length > 2) val = val.substring(0, 2) + '-' + val.substring(2, 10);
                }
                if (name === 'taxId') val = value.replace(/[^0-9]/g, '').substring(0, 8);
                const next = { ...formData, [name]: val };
                if (name === 'taxType') {
                    const tax = val === 'taxable' ? Math.round(next.netAmount * 0.05) : 0;
                    setFormData({ ...next, tax, total: next.netAmount + tax });
                } else setFormData(next);
            };

            const handleItemChange = (idx, field, val) => {
                const items = [...formData.items];
                let processedVal = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    processedVal = val.replace(/[^0-9.]/g, ''); 
                    if (processedVal !== "" && parseFloat(processedVal) < 0) processedVal = "0";
                }
                items[idx][field] = processedVal;
                if (field === 'quantity' || field === 'unitPrice') {
                    items[idx].amount = Math.round((parseFloat(items[idx].quantity) || 0) * (parseFloat(items[idx].unitPrice) || 0));
                }
                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                setFormData({ ...formData, items, netAmount, tax, total: netAmount + tax });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) return showToast("發票格式錯誤 (AA-12345678)");
                setInvoices([{ ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber)]);
                showToast("數據存檔成功並鏡像雲端");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            const exportCSV = () => {
                const filtered = invoices.filter(i => {
                    const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(i.date) === filterPeriod;
                    const matchType = filterType === 'ALL' || i.invoiceType === filterType;
                    return matchPeriod && matchType;
                });
                if (filtered.length === 0) return showToast("目前篩選下無資料");
                const headers = ['狀態', '期別', '類型', '稅別', '發票號碼', '開立日期', '買方統編', '發票銷售額', '發票營業稅', '發票含稅總額', '品項名稱', '規格', '數量', '單價', '品項小計'];
                const csvRows = [headers.join(',')];
                filtered.forEach(inv => {
                    const base = [inv.status==='void'?'作廢':'正常', getInvoicePeriod(inv.date), inv.invoiceType, inv.taxType==='taxable'?'應稅':'免稅', inv.invoiceNumber, inv.date, inv.taxId||'', inv.netAmount, inv.tax, inv.total];
                    if (inv.items && inv.items.length > 0) {
                        inv.items.forEach(it => { csvRows.push([...base, (it.name||'').replace(/,/g,' '), (it.specs||'').replace(/,/g,' '), it.quantity, it.unitPrice, it.amount].join(',')); });
                    } else { csvRows.push([...base, '', '', '', '', ''].join(',')); }
                });
                const csvContent = '\uFEFF' + csvRows.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `發票明細全導出_${filterPeriod}.csv`; a.click();
                showToast("報表下載成功");
            };

            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort().reverse(); 
            }, [invoices]);

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 overflow-hidden relative">
                    {/* 側邊導航 */}
                    <aside className="hidden md:flex w-72 bg-slate-900 text-slate-300 flex-col shadow-2xl flex-shrink-0">
                        <div className="p-8 border-b border-slate-800">
                            <h1 className="text-xl font-black text-white flex items-center gap-2 italic">
                                <i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務
                            </h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8 font-bold text-sm">
                            <button onClick={() => setActiveTab('help')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'help' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-book-open"></i> 使用指南</button>
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-polar"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers"></i> 整合清單</button>
                        </nav>
                        <div className="p-6 mt-auto border-t border-slate-800">
                            <div className="bg-slate-800 rounded-2xl p-4 border border-slate-700">
                                <div className="text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest">System Cloud Node</div>
                                <div className="flex items-center gap-2">
                                    <div className={`w-2.5 h-2.5 rounded-full ${syncStatus === 'syncing' ? 'bg-amber-400 animate-pulse' : syncStatus === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                    <span className="text-[10px] font-bold text-slate-300 uppercase tracking-tighter">
                                        {syncStatus === 'syncing' ? 'Cloud Mirroring...' : syncStatus === 'error' ? 'Node Error' : 'Database Ready'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 md:p-10 relative pb-24 md:pb-10">
                        {toast && <div className="fixed top-6 right-6 px-6 py-3 rounded-2xl shadow-2xl bg-white border-l-8 border-indigo-600 z-[110] animate-slide-in font-bold">{toast}</div>}

                        {/* --- 使用指南 (全新詳細版) --- */}
                        {activeTab === 'help' && (
                            <div className="max-w-4xl mx-auto space-y-12 animate-slide-in">
                                <header className="bg-gradient-to-br from-indigo-900 via-indigo-800 to-slate-900 p-12 rounded-[3.5rem] text-white shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-4xl font-black mb-4 tracking-tight">NextGen 財務系統使用指南</h2>
                                        <p className="text-indigo-200 text-lg font-medium leading-relaxed italic">「精準錄入，智慧分析，雲端永存。」</p>
                                    </div>
                                    <i className="ph-fill ph-shield-check text-[15rem] absolute -right-20 -bottom-20 text-white/5 rotate-12"></i>
                                </header>

                                <section className="space-y-6">
                                    <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3"><i className="ph ph-lightning text-indigo-500"></i> 快速上手流程</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="guide-step">
                                            <h4 className="font-black text-indigo-700 mb-2">01. 智能錄入與校驗</h4>
                                            <p className="text-sm text-slate-500 leading-relaxed">進入 <b>「智能錄入」</b> 介面。系統會自動校正發票號碼格式。請注意：<b>數量與單價欄位強制鎖定正數</b>，任何負號或符號將被自動過濾，確保財務數據純淨。</p>
                                        </div>
                                        <div className="guide-step">
                                            <h4 className="font-black text-indigo-700 mb-2">02. 詳細品項與規格</h4>
                                            <p className="text-sm text-slate-500 leading-relaxed">點擊「新增品項」可紀錄具體內容。除了品名，您可以填入<b>「規格」</b>（如尺寸、型號），這對未來稽核或對帳至關重要。所有細節將同步至雲端。</p>
                                        </div>
                                        <div className="guide-step">
                                            <h4 className="font-black text-indigo-700 mb-2">03. 數據決策分析</h4>
                                            <p className="text-sm text-slate-500 leading-relaxed">完成錄入後，切換至 <b>「戰情儀表板」</b>。您可以觀察「每月營收趨勢」以判斷業務淡旺季，或透過「熱銷品項排行」分析核心獲利來源。</p>
                                        </div>
                                        <div className="guide-step">
                                            <h4 className="font-black text-indigo-700 mb-2">04. 財務報表導出</h4>
                                            <p className="text-sm text-slate-500 leading-relaxed">在 <b>「整合清單」</b> 頁面，您可以利用篩選器鎖定「月份期別」或「發票類型」。點擊導出 CSV 後，報表將呈現<b>完整明細格式</b>（一張發票多列顯示），方便會計作業。</p>
                                        </div>
                                    </div>
                                </section>

                                <section className="bg-white p-10 rounded-[2.5rem] border shadow-sm space-y-6">
                                    <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3"><i className="ph ph-shield-check text-emerald-500"></i> 核心功能解析</h3>
                                    <div className="space-y-4">
                                        <div className="flex items-start gap-4 p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                                            <div className="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 flex-shrink-0 mt-1"><i className="ph ph-calculator font-bold"></i></div>
                                            <div>
                                                <h5 className="font-black text-slate-800">應稅/免稅 智慧切換</h5>
                                                <p className="text-xs text-slate-500 mt-1 leading-relaxed">位於錄入頁面底部。切換後系統會根據 5% 稅率自動重算「營業稅」與「含稅總額」，無須手動計算。</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-4 p-4 hover:bg-slate-50 rounded-2xl transition-colors">
                                            <div className="w-10 h-10 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-600 flex-shrink-0 mt-1"><i className="ph ph-cloud-arrow-up font-bold"></i></div>
                                            <div>
                                                <h5 className="font-black text-slate-800">Supabase 雲端鏡像 (Backup)</h5>
                                                <p className="text-xs text-slate-500 mt-1 leading-relaxed">系統具備雙向存儲。資料先存於瀏覽器以確保離線可用，隨後會自動推送到雲端 PostgreSQL。左側指示器變為綠色即代表備份完成。</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <div className="bg-amber-50 border-2 border-amber-100 p-8 rounded-[2.5rem] flex items-center gap-6">
                                    <div className="w-16 h-16 bg-amber-400 text-white rounded-full flex items-center justify-center text-2xl shadow-lg"><i className="ph-fill ph-lightbulb"></i></div>
                                    <div>
                                        <h5 className="font-black text-amber-900 text-lg">專家建議</h5>
                                        <p className="text-xs text-amber-700 leading-relaxed font-medium">建議每雙月結算一次報表。利用清單的「期別篩選」功能，您可以精確導出 3-4 月或 5-6 月的發票明細 CSV，這對申報營業稅非常有幫助！</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- 其餘頁面維持原有強大功能 --- */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-slide-in">
                                <header><h2 className="text-4xl font-black text-slate-900">戰情儀表板</h2><p className="text-slate-400 mt-1">財務趨勢與品項價值分析</p></header>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-xs font-bold text-slate-400">總處理張數</div><div className="text-4xl font-black mt-1">{invoices.length}</div></div>
                                    <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white"><div className="text-xs font-bold text-indigo-200 uppercase">累計營收 (含稅)</div><div className="text-4xl font-black font-mono mt-1">${invoices.filter(i=>i.status!=='void').reduce((s,i)=>s+(i.total||0),0).toLocaleString()}</div></div>
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-xs font-bold text-slate-400">預估應繳稅額</div><div className="text-4xl font-black text-indigo-600 mt-1">${invoices.filter(i=>i.status!=='void').reduce((s,i)=>s+(i.tax||0),0).toLocaleString()}</div></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm h-[26rem]"><div className="flex justify-between mb-4"><div><h4 className="font-black text-slate-800 text-lg">每月營收趨勢圖</h4><p className="text-[10px] text-slate-400">分析：監控業績淡旺季變化</p></div><i className="ph ph-trend-up text-indigo-500 text-2xl"></i></div><div className="h-64"><canvas ref={chartRefs.line}></canvas></div></div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm h-[26rem]"><div className="flex justify-between mb-4"><div><h4 className="font-black text-slate-800 text-lg">熱銷品項排行 (Top 5)</h4><p className="text-[10px] text-slate-400">分析：識別核心營收來源</p></div><i className="ph ph-chart-bar text-emerald-500 text-2xl"></i></div><div className="h-64"><canvas ref={chartRefs.bar}></canvas></div></div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm lg:col-span-2 flex flex-col md:flex-row gap-12 items-center"><div className="flex-1"><h4 className="font-black text-slate-800 mb-2">客群結構分析</h4><p className="text-xs text-slate-400 leading-relaxed mb-6 font-medium">分析功能：對比 B2B 與 B2C 佔比，協助優化資源投放。</p></div><div className="w-56 h-56 flex-shrink-0"><canvas ref={chartRefs.doughnut}></canvas></div></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'entry' && (
                            <div className="max-w-4xl mx-auto space-y-6 animate-slide-in">
                                <h2 className="text-3xl font-black">智能錄入</h2>
                                <div className="bg-white rounded-[2.5rem] border p-10 shadow-sm">
                                    <form onSubmit={handleSubmit} className="space-y-8">
                                        <div className="flex flex-wrap justify-between items-center bg-slate-50 p-2 rounded-2xl border gap-4">
                                            <div className="flex gap-2">
                                                <button type="button" onClick={()=>setFormData({...formData, invoiceType:'三聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType==='三聯式'?'bg-white shadow-md text-indigo-700':'text-slate-400'}`}>三聯 (B2B)</button>
                                                <button type="button" onClick={()=>setFormData({...formData, invoiceType:'二聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType==='二聯式'?'bg-white shadow-md text-indigo-700':'text-slate-400'}`}>二聯 (B2C)</button>
                                            </div>
                                            <label className="flex items-center gap-2 cursor-pointer text-red-600 text-[10px] font-bold"><input type="checkbox" checked={formData.status==='void'} onChange={e=>setFormData({...formData, status:e.target.checked?'void':'active'})} className="accent-red-500" /> 作廢標記</label>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase">發票號碼</label><input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border font-mono text-lg outline-none" placeholder="AA-12345678" /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-bold text-slate-400 uppercase">日期</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border outline-none" /></div>
                                            {formData.invoiceType==='三聯式' && <div className="space-y-1"><label className="text-[10px] font-bold text-indigo-500 uppercase">統編 (8碼)</label><input type="text" name="taxId" value={formData.taxId} onChange={handleInputChange} maxLength={8} className="w-full px-4 py-3 rounded-2xl border bg-indigo-50/30 font-mono outline-none" /></div>}
                                        </div>
                                        
                                        <div className="pt-6 border-t">
                                            <div className="flex justify-between items-center mb-4"><h3 className="font-bold">品項細節錄入</h3><button type="button" onClick={()=>setFormData(p=>({...p, items:[...p.items, {id:generateItemId(), name:'', specs:'', quantity:1, unitPrice:'', amount:0}]}))} className="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg">+ 新增品項</button></div>
                                            <div className="space-y-3">
                                                {formData.items.map((it, i) => (
                                                    <div key={it.id} className="flex flex-col md:flex-row gap-3 p-5 bg-slate-50 rounded-2xl border relative group">
                                                        <div className="flex-1 flex flex-col gap-2">
                                                            <input type="text" placeholder="品名內容 (如: 軟體服務費)" value={it.name} onChange={e=>handleItemChange(i, 'name', e.target.value)} className="bg-transparent text-sm font-bold outline-none" />
                                                            <input type="text" placeholder="規格描述 (如: 2026 年度版)" value={it.specs} onChange={e=>handleItemChange(i, 'specs', e.target.value)} className="bg-transparent text-[10px] text-slate-400 outline-none italic" />
                                                        </div>
                                                        <div className="flex gap-4">
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 font-bold mb-1 uppercase">數量</label><input type="number" onKeyDown={(e) => ["-", "e", "+"].includes(e.key) && e.preventDefault()} value={it.quantity} onChange={e=>handleItemChange(i, 'quantity', e.target.value)} className="w-16 py-1 px-2 text-center text-sm rounded-lg border bg-white outline-none font-mono" /></div>
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 font-bold mb-1 uppercase">單價</label><input type="number" onKeyDown={(e) => ["-", "e", "+"].includes(e.key) && e.preventDefault()} value={it.unitPrice} onChange={e=>handleItemChange(i, 'unitPrice', e.target.value)} className="w-24 py-1 px-2 text-right text-sm rounded-lg border bg-white outline-none font-mono" /></div>
                                                            <div className="flex flex-col items-end"><label className="text-[8px] text-slate-400 font-bold mb-1 uppercase">小計</label><div className="w-24 text-right font-black text-indigo-600 text-sm py-1">${(it.amount||0).toLocaleString()}</div></div>
                                                        </div>
                                                        <button type="button" onClick={()=>{const items=formData.items.filter((_,idx)=>idx!==i); setFormData({...formData, items});}} className="absolute -top-2 -right-2 bg-white rounded-full shadow-lg text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph-fill ph-x-circle text-2xl"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className={`p-8 rounded-[2.5rem] text-white shadow-2xl transition-all ${formData.status==='void'?'bg-slate-700':'bg-indigo-900'}`}>
                                            <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                                                <div className="flex gap-10">
                                                    <div><div className="text-[10px] uppercase font-bold text-indigo-300 mb-2 tracking-widest">銷售總額 (未稅)</div><div className="text-2xl font-black font-mono">${(formData.netAmount||0).toLocaleString()}</div></div>
                                                    <div className="border-l border-indigo-800 pl-10">
                                                        <div className="flex items-center gap-4 mb-2"><span className="text-[10px] font-bold text-indigo-300 tracking-widest">稅別設定</span>
                                                            <div className="flex p-0.5 bg-white/10 rounded-md">
                                                                <button type="button" onClick={()=>handleInputChange({target:{name:'taxType',value:'taxable'}})} className={`px-3 py-1 rounded text-[10px] font-bold ${formData.taxType==='taxable'?'bg-indigo-500 text-white':'text-indigo-300'}`}>應稅 5%</button>
                                                                <button type="button" onClick={()=>handleInputChange({target:{name:'taxType',value:'exempt'}})} className={`px-3 py-1 rounded text-[10px] font-bold ${formData.taxType==='exempt'?'bg-indigo-500 text-white':'text-indigo-300'}`}>免稅 0%</button>
                                                            </div>
                                                        </div>
                                                        <div className="text-2xl font-black font-mono">${(formData.tax||0).toLocaleString()}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right md:border-l md:border-indigo-800 md:pl-12 font-black"><div className="text-[10px] uppercase font-bold text-indigo-300 tracking-widest">含稅總計金額</div><div className="text-5xl text-emerald-400 font-mono tracking-tighter">${(formData.total||0).toLocaleString()}</div></div>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 py-5 rounded-3xl font-black text-white text-xl shadow-xl transition-all active:scale-[0.98]">確認儲存並同步至 Supabase</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-6 animate-slide-in">
                                <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                    <div><h2 className="text-3xl font-black">發票整合清單</h2><p className="text-slate-400 text-sm">財務導出連動當前篩選器</p></div>
                                    <div className="flex flex-wrap gap-4 w-full md:w-auto">
                                        <div className="bg-white border px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm text-xs font-bold">
                                            <i className="ph ph-calendar text-slate-400"></i>
                                            <select value={filterPeriod} onChange={e=>setFilterPeriod(e.target.value)} className="outline-none bg-transparent">
                                                <option value="ALL">全部月份期別</option>
                                                {availablePeriods.map(p=><option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                        <div className="bg-white border px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm text-xs font-bold">
                                            <i className="ph ph-funnel text-slate-400"></i>
                                            <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="outline-none bg-transparent">
                                                <option value="ALL">所有發票類型</option>
                                                <option value="三聯式">三聯式 (B2B)</option>
                                                <option value="二聯式">二聯式 (B2C)</option>
                                            </select>
                                        </div>
                                        <button onClick={exportCSV} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg text-xs hover:bg-emerald-700 transition-colors"><i className="ph ph-download"></i> 導出完整明細 CSV</button>
                                    </div>
                                </header>
                                <div className="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 tracking-widest border-b uppercase">
                                            <tr><th className="p-6">發票號碼</th><th className="p-6">期別/統編</th><th className="p-6 text-center">狀態</th><th className="p-6 text-right font-black">總計金額</th><th className="p-6 text-center">操作</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {invoices.filter(i=>{
                                                const matchPeriod=filterPeriod==='ALL'||getInvoicePeriod(i.date)===filterPeriod;
                                                const matchType=filterType==='ALL'||i.invoiceType===filterType;
                                                return matchPeriod && matchType;
                                            }).map(inv=>(
                                                <Fragment key={inv.id}>
                                                    <tr onClick={()=>setExpandedInvoiceId(expandedInvoiceId===inv.id?null:inv.id)} className="cursor-pointer hover:bg-slate-50 transition-all">
                                                        <td className={`p-6 font-black font-mono text-lg ${inv.status==='void'?'line-through text-slate-300':'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                        <td className="p-6 text-sm text-slate-500"><div className="font-bold text-slate-700">{getInvoicePeriod(inv.date)}</div><div className="text-[10px] font-bold text-slate-300 uppercase">{inv.taxId || '二聯/無統編'}</div></td>
                                                        <td className="p-6 text-center">{inv.status==='void'?<span className="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-black border border-red-100">作廢</span>:<span className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black border border-emerald-100">正常</span>}</td>
                                                        <td className={`p-6 text-right font-black font-mono text-xl ${inv.status==='void'?'text-slate-300':'text-indigo-700'}`}>${(inv.total||0).toLocaleString()}</td>
                                                        <td className="p-6 text-center"><button onClick={(e)=>{e.stopPropagation(); setInvoices(invoices.filter(i=>i.id!==inv.id));}} className="text-slate-300 hover:text-red-500 transition-colors"><i className="ph-fill ph-trash-simple text-2xl"></i></button></td>
                                                    </tr>
                                                    {expandedInvoiceId===inv.id && (
                                                        <tr className="bg-slate-900 animate-slide-in">
                                                            <td colSpan="5" className="p-8">
                                                                <div className="rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                                                                    <table className="w-full text-xs text-left text-slate-300">
                                                                        <thead className="bg-slate-800 text-slate-500 font-black tracking-widest border-b border-slate-700 uppercase">
                                                                            <tr><th className="p-4">品項/規格</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr>
                                                                        </thead>
                                                                        <tbody className="divide-y divide-slate-800/50">
                                                                            {(inv.items || []).map((it, idx) => (
                                                                                <tr key={idx}><td className="p-4"><div className="font-bold">{it.name || '未命名項目'}</div><div className="text-[10px] text-slate-500 italic mt-0.5">{it.specs || '無規格資訊'}</div></td><td className="p-4 text-center font-mono">{it.quantity}</td><td className="p-4 text-right font-mono">${(it.unitPrice||0).toLocaleString()}</td><td className="p-4 text-right font-black text-emerald-400 font-mono">${(it.amount||0).toLocaleString()}</td></tr>
                                                                            ))}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {/* 手機導航 */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl pb-safe">
                        <button onClick={()=>setActiveTab('help')} className={activeTab==='help'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-book-open text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('dashboard')} className={activeTab==='dashboard'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-chart-polar text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('entry')} className={activeTab==='entry'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-plus-circle text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('list')} className={activeTab==='list'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-list-numbers text-3xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
