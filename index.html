<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        // --- Supabase 配置區域 ---
        const SUPABASE_URL = 'https://bzdwlfodbkyiougsqeve.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f7RuOJ8xRT8qXNIjwP5wlw_pRTFKN3b';
        const supabase = Object.assign(window['supabase']).createClient(SUPABASE_URL, SUPABASE_KEY);

        const COLORS = { primary: '#4f46e5', success: '#10b981', warning: '#f59e0b', danger: '#ef4444' };

        // 格式與邏輯函數
        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const periodStart = (date.getMonth() + 1) % 2 === 0 ? date.getMonth() : date.getMonth() + 1;
            return `${date.getFullYear()}年 ${String(periodStart).padStart(2, '0')}-${String(periodStart + 1).padStart(2, '0')}月`;
        };

        function App() {
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices_supabase');
                return saved ? JSON.parse(saved) : [];
            });
            const [activeTab, setActiveTab] = useState('help');
            const [toast, setToast] = useState(null);
            const [syncStatus, setSyncStatus] = useState('idle'); // idle, syncing, success, error

            const chartRefs = { bar: useRef(null) };
            const chartInstance = useRef(null);

            const [formData, setFormData] = useState({
                invoiceType: '三聯式', taxType: 'taxable', invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0], taxId: '', 
                items: [], netAmount: 0, tax: 0, total: 0, status: 'active'
            });

            // (1) 本地持久化
            useEffect(() => {
                localStorage.setItem('nextgen_invoices_supabase', JSON.stringify(invoices));
            }, [invoices]);

            // (2) 隱形雲端同步邏輯 (核心備援)
            useEffect(() => {
                const performSync = async () => {
                    if (invoices.length === 0) return;
                    setSyncStatus('syncing');

                    // 使用 upsert：若發票號碼(id)重複則更新，不重複則新增
                    const syncData = invoices.map(inv => ({
                        id: inv.invoiceNumber,
                        data: inv,
                        updated_at: new Date()
                    }));

                    const { error } = await supabase.from('invoices').upsert(syncData);

                    if (error) {
                        console.error("雲端備援同步失敗:", error.message);
                        setSyncStatus('error');
                    } else {
                        console.log("雲端數據備份成功");
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus('idle'), 2000);
                    }
                };

                const timer = setTimeout(performSync, 1500); // 停止動作後 1.5 秒執行同步
                return () => clearTimeout(timer);
            }, [invoices]);

            // 介面交互邏輯
            const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 3000); };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let val = value;
                if (name === 'invoiceNumber') {
                    val = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (val.length > 2) val = val.substring(0, 2) + '-' + val.substring(2, 10);
                }
                if (name === 'taxId') val = value.replace(/[^0-9]/g, '').substring(0, 8);
                
                const next = { ...formData, [name]: val };
                if (name === 'taxType') {
                    const tax = val === 'taxable' ? Math.round(next.netAmount * 0.05) : 0;
                    setFormData({ ...next, tax, total: next.netAmount + tax });
                } else setFormData(next);
            };

            const handleItemChange = (idx, field, val) => {
                const items = [...formData.items];
                items[idx][field] = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    items[idx].amount = Math.round((parseFloat(items[idx].quantity) || 0) * (parseFloat(items[idx].unitPrice) || 0));
                }
                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                setFormData({ ...formData, items, netAmount, tax, total: netAmount + tax });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) return showToast("發票格式錯誤");
                setInvoices([{ ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber)]);
                showToast("數據存檔成功 (正同步至 Supabase)");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 overflow-hidden">
                    {/* 側邊導航 */}
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col shadow-2xl flex-shrink-0">
                        <div className="p-8 border-b border-slate-800">
                            <h1 className="text-xl font-black text-white italic"><i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務</h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8 font-bold">
                            <button onClick={() => setActiveTab('help')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'help' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph-fill ph-book-open"></i> 使用指南</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers"></i> 整合清單</button>
                        </nav>
                        
                        {/* 同步狀態指示器 */}
                        <div className="p-6 mt-auto">
                            <div className="bg-slate-800 rounded-xl p-3 border border-slate-700">
                                <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Backup Engine</div>
                                <div className="flex items-center gap-2">
                                    <div className={`w-2 h-2 rounded-full ${syncStatus === 'syncing' ? 'bg-amber-400 animate-pulse' : syncStatus === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                    <span className="text-[10px] font-bold text-slate-300">
                                        {syncStatus === 'syncing' ? '同步中...' : syncStatus === 'error' ? '連線失敗' : 'Supabase 已備份'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 md:p-10 relative">
                        {toast && <div className="fixed top-6 right-6 px-6 py-3 rounded-2xl shadow-2xl bg-white border-l-8 border-indigo-500 z-[110] animate-slide-in font-bold">{toast}</div>}

                        {activeTab === 'help' && (
                            <div className="max-w-3xl mx-auto space-y-6 animate-slide-in">
                                <header className="bg-indigo-900 p-10 rounded-[2.5rem] text-white shadow-2xl">
                                    <h2 className="text-3xl font-black mb-2">Supabase 備援系統已啟動</h2>
                                    <p className="text-indigo-200 text-sm">這是一個無感同步版本。您在本地的所有操作都會實時鏡像到雲端資料庫。</p>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm"><h5 className="font-bold text-slate-800 mb-2">無需登入</h5><p className="text-xs text-slate-400 leading-relaxed">我們採用匿名金鑰機制，只要有網路，數據就會自動飛往雲端。</p></div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm"><h5 className="font-bold text-slate-800 mb-2">雙向安全</h5><p className="text-xs text-slate-400 leading-relaxed">即使瀏覽器快取被清空，您的數據依然完好保存在 Supabase 的 PostgreSQL 資料庫中。</p></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'entry' && (
                            <div className="max-w-4xl mx-auto space-y-6 animate-slide-in">
                                <h2 className="text-3xl font-black">發票錄入</h2>
                                <div className="bg-white rounded-[2.5rem] border p-10 shadow-sm">
                                    <form onSubmit={handleSubmit} className="space-y-8">
                                        <div className="flex flex-wrap justify-between items-center bg-slate-50 p-2 rounded-2xl border gap-4">
                                            <div className="flex gap-2">
                                                <button type="button" onClick={()=>setFormData({...formData, invoiceType:'三聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType==='三聯式'?'bg-white shadow-md text-indigo-700':'text-slate-400'}`}>三聯 (B2B)</button>
                                                <button type="button" onClick={()=>setFormData({...formData, invoiceType:'二聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType==='二聯式'?'bg-white shadow-md text-indigo-700':'text-slate-400'}`}>二聯 (B2C)</button>
                                            </div>
                                            <label className="flex items-center gap-2 cursor-pointer bg-red-50 px-4 py-1.5 rounded-xl text-red-600 text-[10px] font-bold">
                                                <input type="checkbox" checked={formData.status==='void'} onChange={e=>setFormData({...formData, status:e.target.checked?'void':'active'})} className="accent-red-500" />
                                                作廢標記
                                            </label>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">發票號碼</label>
                                                <input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border font-mono text-xl focus:ring-4 focus:ring-indigo-50" placeholder="AB-12345678" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">日期</label>
                                                <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border focus:ring-4 focus:ring-indigo-50" />
                                            </div>
                                            {formData.invoiceType === '三聯式' && (
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">買方統編 (8碼)</label>
                                                    <input type="text" name="taxId" value={formData.taxId} onChange={handleInputChange} maxLength={8} className="w-full px-5 py-4 rounded-2xl border border-indigo-100 bg-indigo-50/30 font-mono focus:ring-4 focus:ring-indigo-50" placeholder="00000000" />
                                                </div>
                                            )}
                                        </div>

                                        {/* 金額統計區與稅別選擇整合 */}
                                        <div className={`p-8 rounded-[2.5rem] text-white shadow-2xl transition-all ${formData.status === 'void' ? 'bg-slate-700' : 'bg-indigo-900'}`}>
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                                                <div className="flex flex-col md:flex-row gap-12 w-full md:w-auto">
                                                    <div>
                                                        <div className="text-[10px] uppercase font-bold text-indigo-300 tracking-widest mb-2">銷售額 (未稅)</div>
                                                        <div className="text-2xl font-black font-mono">${(formData.netAmount || 0).toLocaleString()}</div>
                                                    </div>
                                                    <div className="md:border-l md:border-indigo-800 md:pl-12">
                                                        <div className="flex items-center gap-4 mb-2">
                                                            <div className="text-[10px] uppercase font-bold text-indigo-300 tracking-widest">營業稅 ({formData.taxType === 'taxable' ? '5%' : '0%'})</div>
                                                            <div className="flex p-1 bg-white/10 rounded-lg">
                                                                <button type="button" onClick={() => handleInputChange({target: {name: 'taxType', value: 'taxable'}})} className={`px-3 py-1 rounded-md text-[10px] font-bold ${formData.taxType === 'taxable' ? 'bg-indigo-500 text-white' : 'text-indigo-300'}`}>應稅</button>
                                                                <button type="button" onClick={() => handleInputChange({target: {name: 'taxType', value: 'exempt'}})} className={`px-3 py-1 rounded-md text-[10px] font-bold ${formData.taxType === 'exempt' ? 'bg-indigo-500 text-white' : 'text-indigo-300'}`}>免稅</button>
                                                            </div>
                                                        </div>
                                                        <div className="text-2xl font-black font-mono">${(formData.tax || 0).toLocaleString()}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right w-full md:w-auto md:border-l md:border-indigo-800 md:pl-16">
                                                    <div className="text-[10px] uppercase font-bold text-indigo-300">含稅總額</div>
                                                    <div className="text-5xl font-black font-mono text-emerald-400 mt-2">${(formData.total || 0).toLocaleString()}</div>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 py-5 rounded-3xl font-black text-white text-xl shadow-xl transition-all">儲存發票並備份</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-6 animate-slide-in">
                                <h2 className="text-3xl font-black">發票整合清單</h2>
                                <div className="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 tracking-widest border-b">
                                            <tr><th className="p-6">發票號碼</th><th className="p-6">期別/統編</th><th className="p-6 text-center">狀態</th><th className="p-6 text-right">總計 (含稅)</th><th className="p-6 text-center">操作</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {invoices.map(inv => (
                                                <tr key={inv.id} className="hover:bg-slate-50 transition-all">
                                                    <td className={`p-6 font-black font-mono text-lg ${inv.status==='void'?'line-through text-slate-300':'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                    <td className="p-6 text-sm text-slate-500">
                                                        <div className="font-bold">{getInvoicePeriod(inv.date)}</div>
                                                        <div className="text-[10px]">{inv.taxId || '二聯無統編'}</div>
                                                    </td>
                                                    <td className="p-6 text-center">{inv.status==='void'?<span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black">作廢</span>:<span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black">正常</span>}</td>
                                                    <td className="p-6 text-right font-black font-mono text-xl text-indigo-700">${(inv.total||0).toLocaleString()}</td>
                                                    <td className="p-6 text-center"><button onClick={()=>setInvoices(invoices.filter(i=>i.id!==inv.id))} className="text-slate-300 hover:text-red-500 transition-colors"><i className="ph ph-trash-simple text-2xl"></i></button></td>
                                                </tr>
                                            ))}
                                            {invoices.length === 0 && <tr><td colSpan="5" className="p-20 text-center text-slate-300 font-bold italic">目前尚無數據</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    {/* 手機導航 */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl pb-safe">
                        <button onClick={()=>setActiveTab('help')} className={activeTab==='help'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-book-open text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('entry')} className={activeTab==='entry'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-plus-circle text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('list')} className={activeTab==='list'?'text-indigo-600':'text-slate-400'}><i className="ph-fill ph-list-numbers text-3xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
