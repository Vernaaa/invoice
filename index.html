<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor 企業級圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- 引入 React, ReactDOM 與 Chart.js -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- 引入 Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-in-row { animation: fadeInRow 0.2s ease-out forwards; }
        .expand-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .camera-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        video { object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const COLORS = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
        const apiKey = ""; // Gemini API 密鑰由環境提供

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            // 初始化採用雙軌制：優先 LocalStorage 確保使用者體驗
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices');
                return saved ? JSON.parse(saved) : [];
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [toast, setToast] = useState(null);
            
            // 介面控制
            const [selectedPeriod, setSelectedPeriod] = useState('ALL');
            const [selectedType, setSelectedType] = useState('ALL'); 
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            
            // 狀態監控
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [user, setUser] = useState(null);
            const [isCloudSync, setIsCloudSync] = useState(false);
            
            const dbRef = useRef(null);
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const barChartRef = useRef(null);
            const pieChartRef = useRef(null);
            const barChartInstance = useRef(null);
            const pieChartInstance = useRef(null);
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式', 
                taxRate: 0.05, 
                invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0],
                taxId: '', 
                items: [], 
                netAmount: '', 
                tax: '', 
                total: '',
                status: 'active'
            });

            // --- Firebase 初始化 ---
            useEffect(() => {
                const setupFirebase = async () => {
                    try {
                        let config;
                        const isCanvasEnv = typeof __firebase_config !== 'undefined';
                        if (isCanvasEnv) { 
                            config = JSON.parse(__firebase_config); 
                        } else {
                            config = { 
                                apiKey: "AIzaSyBLI4Ypd1P77IipmPw0kuOw7CFUAMBd_wI", 
                                authDomain: "invoice-671f0.firebaseapp.com", 
                                projectId: "invoice-671f0", 
                                storageBucket: "invoice-671f0.firebasestorage.app", 
                                messagingSenderId: "24573201567", 
                                appId: "1:24573201567:web:b52eb312887923c08a26aa",
                                measurementId: "G-182872EYQM"
                            };
                        }

                        if (!firebase.apps.length) firebase.initializeApp(config);
                        dbRef.current = firebase.firestore();
                        const auth = firebase.auth();
                        
                        if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else { 
                            await auth.signInAnonymously(); 
                        }
                        auth.onAuthStateChanged(setUser);
                    } catch (error) { console.error("Firebase Error:", error); }
                };
                setupFirebase();
            }, []);

            // --- 雲端備援監聽：將雲端資料反映回本地 ---
            useEffect(() => {
                if (!user || !dbRef.current) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'verna-invoice-app';
                const colRef = dbRef.current.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('invoices');
                
                return colRef.onSnapshot((snapshot) => {
                    if (snapshot.empty) return;
                    const loaded = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setInvoices(loaded); // 備援機制：雲端有更新則覆蓋本地，確保資料一致
                    setIsCloudSync(true);
                }, (err) => {
                    console.error("雲端備援連線中斷:", err);
                    setIsCloudSync(false);
                });
            }, [user]);

            // 本地快取：確保離線可用
            useEffect(() => {
                localStorage.setItem('nextgen_invoices', JSON.stringify(invoices));
            }, [invoices]);

            // --- 儀表板視覺化邏輯 ---
            const activeInvoices = useMemo(() => invoices.filter(inv => inv.status !== 'void'), [invoices]);
            const voidCount = invoices.filter(inv => inv.status === 'void').length;
            const totalAmount = activeInvoices.reduce((sum, inv) => sum + inv.total, 0);
            const totalTax = activeInvoices.reduce((sum, inv) => sum + inv.tax, 0);

            const chartData = useMemo(() => {
                const itemMap = {};
                activeInvoices.forEach(inv => {
                    inv.items.forEach(it => {
                        itemMap[it.name] = (itemMap[it.name] || 0) + it.amount;
                    });
                });
                return Object.keys(itemMap)
                    .map(name => ({ name, value: itemMap[name] }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);
            }, [activeInvoices]);

            useEffect(() => {
                if (activeTab === 'dashboard' && barChartRef.current && chartData.length > 0) {
                    if (barChartInstance.current) barChartInstance.current.destroy();
                    barChartInstance.current = new Chart(barChartRef.current, {
                        type: 'bar',
                        data: {
                            labels: chartData.map(d => d.name),
                            datasets: [{ label: '銷售額 ($)', data: chartData.map(d => d.value), backgroundColor: COLORS, borderRadius: 8 }]
                        },
                        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
                if (activeTab === 'dashboard' && pieChartRef.current) {
                    if (pieChartInstance.current) pieChartInstance.current.destroy();
                    const taxable = activeInvoices.filter(i => i.tax > 0).reduce((s, i) => s + i.total, 0);
                    const exempt = activeInvoices.filter(i => i.tax === 0).reduce((s, i) => s + i.total, 0);
                    pieChartInstance.current = new Chart(pieChartRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: ['應稅', '免稅'],
                            datasets: [{ data: [taxable, exempt], backgroundColor: ['#4f46e5', '#10b981'], borderWidth: 0 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
                    });
                }
            }, [activeTab, chartData, activeInvoices]);

            // --- 核心操作邏輯 ---
            const callGeminiVision = async (base64Data) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const prompt = `辨識發票 JSON：{"invoiceNumber": "XX-12345678", "date": "YYYY-MM-DD", "invoiceType": "三聯式/二聯式", "taxId": "8碼", "netAmount": 數字, "tax": 數字, "total": 數字, "items": [{"name": "品名", "quantity": 數量, "unitPrice": 單價, "amount": 小計}]}`;
                const payload = { contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data } }] }], generationConfig: { responseMimeType: "application/json" } };
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const result = await response.json();
                return JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text);
            };

            const captureAndAnalyze = async () => {
                if (!videoRef.current || !canvasRef.current) return;
                setIsAnalyzing(true); showToast("AI 辨識中...", "info");
                const canvas = canvasRef.current;
                const video = videoRef.current;
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64Image = canvas.toDataURL('image/png').split(',')[1];
                const stream = video.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                setIsCameraOpen(false);
                try {
                    const data = await callGeminiVision(base64Image);
                    setFormData({ ...formData, ...data, items: data.items.map(it => ({ ...it, id: generateItemId() })), status: 'active' });
                    showToast("辨識成功！", "success");
                } catch (err) { showToast("辨識失敗", "error"); } finally { setIsAnalyzing(false); }
            };

            const recalculateTotalsFromItems = (itemsToCalc, currentType, currentRate) => {
                const sumAmount = itemsToCalc.reduce((acc, item) => acc + (item.amount || 0), 0);
                let newNet = 0; let newTax = 0; let newTotal = 0;
                if (itemsToCalc.length > 0 && sumAmount > 0) {
                    if (currentType === '三聯式') { newNet = sumAmount; newTax = Math.round(sumAmount * currentRate); newTotal = sumAmount + newTax; } 
                    else { newTotal = sumAmount; newNet = Math.round(sumAmount / (1 + currentRate)); newTax = sumAmount - newNet; }
                }
                return { netAmount: newNet, tax: newTax, total: newTotal };
            };

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                const finalValue = type === 'checkbox' ? (checked ? 'void' : 'active') : value;
                let newFormData = { ...formData, [name]: finalValue };
                if (name === 'invoiceNumber') {
                    let formatted = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (formatted.length > 2) formatted = formatted.substring(0, 2) + '-' + formatted.substring(2, 10);
                    newFormData[name] = formatted;
                }
                setFormData(newFormData);
            };

            const handleItemChange = (index, field, value) => {
                const newItems = [...formData.items];
                const item = newItems[index];
                if (field === 'quantity' || field === 'unitPrice') {
                    item[field] = value === '' ? '' : parseFloat(value);
                    item.amount = Math.round((parseFloat(item.quantity) || 0) * (parseFloat(item.unitPrice) || 0));
                } else { item[field] = value; }
                setFormData({ ...formData, items: newItems, ...recalculateTotalsFromItems(newItems, formData.invoiceType, formData.taxRate) });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const existingInv = invoices.find(inv => inv.invoiceNumber === formData.invoiceNumber);
                let finalInvoice;
                if (existingInv) {
                    const mergedItems = [...existingInv.items, ...formData.items.filter(it => it.name.trim())];
                    const calc = recalculateTotalsFromItems(mergedItems, existingInv.invoiceType, existingInv.taxRate);
                    finalInvoice = { ...existingInv, items: mergedItems, ...calc, status: formData.status };
                } else {
                    finalInvoice = { ...formData, id: Date.now().toString(), items: formData.items.filter(it => it.name.trim()) };
                }
                
                // 本地優先更新
                const updatedList = [finalInvoice, ...invoices.filter(i => i.id !== finalInvoice.id)];
                setInvoices(updatedList);
                
                // 雲端備援同步
                if (isCloudSync && dbRef.current && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'verna-invoice-app';
                    await dbRef.current.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('invoices').doc(finalInvoice.id).set(finalInvoice);
                    showToast("同步成功！", "success");
                } else {
                    showToast("本地已存檔 (目前離線)", "info");
                }
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: '', tax: '', total: '', status: 'active' });
            };

            const handleDelete = async (id) => {
                 const updatedList = invoices.filter(inv => inv.id !== id);
                 setInvoices(updatedList);
                 if (isCloudSync && dbRef.current && user) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'verna-invoice-app';
                    await dbRef.current.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('invoices').doc(id).delete();
                }
                showToast("發票已徹底作廢移除。", "info");
            };

            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
                    
                    {/* 相機圖層 */}
                    {isCameraOpen && (
                        <div className="fixed inset-0 z-[100] camera-overlay flex flex-col items-center justify-center p-4">
                            <video ref={videoRef} autoPlay playsInline className="w-full max-w-lg rounded-3xl" />
                            <div className="flex gap-4 mt-8">
                                <button onClick={() => setIsCameraOpen(false)} className="bg-white/10 text-white px-8 py-4 rounded-2xl font-bold">取消</button>
                                <button onClick={captureAndAnalyze} className="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold shadow-xl">拍照辨識</button>
                            </div>
                        </div>
                    )}
                    <canvas ref={canvasRef} className="hidden" />

                    {/* 側邊導航 */}
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col z-10 shadow-xl">
                        <div className="p-6">
                            <h1 className="text-xl font-bold text-white flex items-center gap-2"><i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務</h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-polar"></i> 匯總儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg ${activeTab === 'entry' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg ${activeTab === 'list' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers"></i> 整合清單</button>
                        </nav>
                        <div className="p-4 mt-auto">
                           <div className={`px-4 py-3 rounded-xl border flex items-center gap-3 ${isCloudSync ? 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400' : 'bg-slate-800 text-slate-500'}`}>
                                <i className={`ph-fill ${isCloudSync ? 'ph-cloud-check' : 'ph-cloud-slash'} text-xl`}></i>
                                <span className="text-[10px] font-bold uppercase tracking-widest">{isCloudSync ? 'Cloud Backup Active' : 'Offline/Backup Only'}</span>
                           </div>
                        </div>
                    </aside>
                    
                    <main className="flex-1 overflow-y-auto relative pb-24 md:pb-0">
                        {toast && (
                            <div className="fixed top-4 right-4 px-4 py-3 rounded-xl shadow-lg bg-white border border-slate-200 z-[110] animate-slide-in">
                                <span className="font-bold">{toast.message}</span>
                            </div>
                        )}

                        <div className="p-4 md:p-8 max-w-6xl mx-auto">
                            {/* 儀表板頁面 */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 animate-slide-in">
                                    <header><h2 className="text-3xl font-black text-slate-800">戰情儀表板</h2><p className="text-slate-500">當前統計數據 (已自動排除作廢發票)</p></header>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest">累計張數</div>
                                            <div className="text-4xl font-black text-slate-800">{activeInvoices.length}</div>
                                        </div>
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest">本期稅額 (5%)</div>
                                            <div className="text-4xl font-black text-indigo-600">${totalTax.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white">
                                            <div className="text-indigo-200 text-xs font-bold mb-1 uppercase tracking-widest">含稅總額</div>
                                            <div className="text-4xl font-black font-mono">${totalAmount.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-red-50 p-6 rounded-3xl border border-red-100">
                                            <div className="text-red-400 text-xs font-bold mb-1 uppercase tracking-widest">作廢張數</div>
                                            <div className="text-4xl font-black text-red-600">{voidCount}</div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm h-96">
                                            <h4 className="font-bold text-slate-700 mb-6 flex items-center gap-2"><i className="ph-fill ph-chart-bar text-indigo-500"></i> 熱銷品項營收 (Top 5)</h4>
                                            <div className="h-64"><canvas ref={barChartRef}></canvas></div>
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm h-96 text-center">
                                            <h4 className="font-bold text-slate-700 mb-6 flex items-center gap-2 justify-center"><i className="ph-fill ph-chart-donut text-emerald-500"></i> 應稅/免稅 分佈</h4>
                                            <div className="h-64"><canvas ref={pieChartRef}></canvas></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 錄入頁面 */}
                            {activeTab === 'entry' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header><h2 className="text-3xl font-black text-slate-800">智能錄入</h2><p className="text-slate-500">AI 輔助辨識，手動彈性微調</p></header>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-2 bg-white rounded-3xl border border-slate-200 p-8">
                                            <form onSubmit={handleSubmit} className="space-y-6">
                                                <div className="flex justify-between items-center bg-slate-100 p-2 rounded-2xl mb-6">
                                                    <div className="flex gap-2">
                                                        <button type="button" onClick={() => setFormData({...formData, invoiceType: '三聯式'})} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${formData.invoiceType === '三聯式' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500'}`}>三聯 (B2B)</button>
                                                        <button type="button" onClick={() => setFormData({...formData, invoiceType: '二聯式'})} className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${formData.invoiceType === '二聯式' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500'}`}>二聯 (B2C)</button>
                                                    </div>
                                                    <label className="flex items-center gap-2 cursor-pointer bg-white px-4 py-2 rounded-xl border border-slate-200">
                                                        <input type="checkbox" name="status" checked={formData.status === 'void'} onChange={handleInputChange} className="w-4 h-4 accent-red-500" />
                                                        <span className="text-xs font-bold text-red-600 uppercase">標記作廢</span>
                                                    </label>
                                                </div>
                                                <div className="grid grid-cols-2 gap-6">
                                                    <div className="space-y-2"><label className="text-sm font-bold">發票號碼</label><input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border border-slate-200 outline-none font-mono uppercase focus:ring-2 focus:ring-indigo-500" /></div>
                                                    <div className="space-y-2"><label className="text-sm font-bold">日期</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border border-slate-200 outline-none" /></div>
                                                </div>
                                                <div className="pt-6 border-t border-slate-100">
                                                    <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-indigo-900">商品細項</h3><button type="button" onClick={addItem} className="text-xs font-bold text-indigo-600">+ 新增品項</button></div>
                                                    <div className="space-y-3 max-h-60 overflow-y-auto no-scrollbar">
                                                        {formData.items.map((it, i) => (
                                                            <div key={it.id} className="flex gap-3 p-4 bg-slate-50 rounded-2xl relative border border-slate-100">
                                                                <input type="text" placeholder="品名" value={it.name} onChange={(e) => handleItemChange(i, 'name', e.target.value)} className="flex-1 bg-transparent border-none text-sm outline-none" />
                                                                <input type="number" placeholder="數量" value={it.quantity} onChange={(e) => handleItemChange(i, 'quantity', e.target.value)} className="w-16 bg-transparent text-center text-sm outline-none" />
                                                                <input type="number" placeholder="單價" value={it.unitPrice} onChange={(e) => handleItemChange(i, 'unitPrice', e.target.value)} className="w-24 bg-transparent text-right text-sm outline-none font-mono" />
                                                                <div className="w-24 text-right font-black text-slate-600 text-sm">${(it.amount || 0).toLocaleString()}</div>
                                                                <button type="button" onClick={() => removeItem(i)} className="absolute -top-2 -right-2 bg-white p-1 rounded-full shadow-sm text-red-500"><i className="ph ph-x-circle text-xl"></i></button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className={`p-6 rounded-3xl text-white grid grid-cols-3 gap-4 ${formData.status === 'void' ? 'bg-slate-700' : 'bg-indigo-900 shadow-xl shadow-indigo-200'}`}>
                                                    <div><label className="text-[10px] uppercase font-bold text-indigo-300">銷售額</label><div className="text-xl font-mono">${(formData.netAmount || 0).toLocaleString()}</div></div>
                                                    <div className="border-x border-indigo-800/30 px-4"><label className="text-[10px] uppercase font-bold text-indigo-300">稅額</label><div className="text-xl font-mono">${(formData.tax || 0).toLocaleString()}</div></div>
                                                    <div className="text-right"><label className="text-[10px] uppercase font-bold text-indigo-300">總計 {formData.status === 'void' && '(作廢)'}</label><div className="text-2xl font-black font-mono">${(formData.total || 0).toLocaleString()}</div></div>
                                                </div>
                                                <div className="flex gap-4">
                                                    <button type="button" onClick={openCamera} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl flex items-center justify-center gap-2"><i className="ph ph-camera"></i> AI 拍照</button>
                                                    <button type="submit" className="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl">整合存檔 (含雲端備援)</button>
                                                </div>
                                            </form>
                                        </div>
                                        <div className="bg-indigo-50 p-8 rounded-3xl border border-indigo-100 h-fit">
                                            <h4 className="font-bold text-indigo-800 mb-4">系統備援說明</h4>
                                            <p className="text-sm text-indigo-600/80 leading-relaxed">您的資料會優先存放在本地。Firebase 雲端則作為工程師查核與跨裝置同步的「備援鏡像」，確保數據 100% 永不遺失。</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 清單頁面 */}
                            {activeTab === 'list' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header className="flex justify-between items-end">
                                        <div><h2 className="text-3xl font-black text-slate-800">整合清單</h2><p className="text-slate-500">點擊發票列展開明細資料</p></div>
                                        <button onClick={() => {
                                            const csv = invoices.map(i => `${i.invoiceNumber},${i.date},${i.total},${i.status}`).join('\n');
                                            const blob = new Blob([csv], {type: 'text/csv'});
                                            const url = window.URL.createObjectURL(blob);
                                            const a = document.createElement('a'); a.href = url; a.download = 'export.csv'; a.click();
                                        }} className="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg"><i className="ph ph-download"></i> 導出整合報表</button>
                                    </header>
                                    <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b">
                                                <tr><th className="p-5 w-10"></th><th className="p-5">號碼</th><th className="p-5">期別</th><th className="p-5">狀態</th><th className="p-5 text-right text-indigo-600">總額 (含稅)</th><th className="p-5 text-center">操作</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {invoices.map(inv => (
                                                    <Fragment key={inv.id}>
                                                        <tr onClick={() => setExpandedInvoiceId(expandedInvoiceId === inv.id ? null : inv.id)} className={`cursor-pointer transition-colors ${inv.status === 'void' ? 'bg-red-50/20' : 'hover:bg-slate-50'}`}>
                                                            <td className="p-5"><i className={`ph ph-caret-right transition-transform ${expandedInvoiceId === inv.id ? 'rotate-90' : ''}`}></i></td>
                                                            <td className={`p-5 font-bold font-mono ${inv.status === 'void' ? 'line-through text-slate-400' : ''}`}>{inv.invoiceNumber}</td>
                                                            <td className="p-5 text-sm text-slate-400">{getInvoicePeriod(inv.date)}</td>
                                                            <td className="p-5">{inv.status === 'void' ? <span className="bg-red-100 text-red-600 px-2 py-1 rounded-md text-[10px] font-bold">作廢</span> : <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md text-[10px] font-bold">正常</span>}</td>
                                                            <td className="p-5 text-right font-black font-mono text-indigo-700">${inv.total.toLocaleString()}</td>
                                                            <td className="p-5 text-center"><button onClick={(e) => { e.stopPropagation(); handleDelete(inv.id); }} className="text-slate-300 hover:text-red-500"><i className="ph ph-trash text-xl"></i></button></td>
                                                        </tr>
                                                        {expandedInvoiceId === inv.id && (
                                                            <tr className="bg-slate-900"><td colSpan="6" className="p-6">
                                                                <table className="w-full text-xs text-left text-slate-300">
                                                                    <thead className="text-slate-500 border-b border-slate-800"><tr><th className="pb-3">品項</th><th className="pb-3 text-center">數量</th><th className="pb-3 text-right">單價</th><th className="pb-3 text-right">小計</th></tr></thead>
                                                                    <tbody className="divide-y divide-slate-800">
                                                                        {inv.items.map((it, idx) => (
                                                                            <tr key={idx}><td className="py-3">{it.name}</td><td className="py-3 text-center">{it.quantity}</td><td className="py-3 text-right font-mono">${it.unitPrice.toLocaleString()}</td><td className="py-3 text-right font-black text-emerald-400 font-mono">${it.amount.toLocaleString()}</td></tr>
                                                                        ))}
                                                                    </tbody>
                                                                </table>
                                                            </td></tr>
                                                        )}
                                                    </Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    
                    {/* 手機底部導航 */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-3 z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-chart-polar text-2xl"></i></button>
                        <button onClick={() => setActiveTab('entry')} className={activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-plus-circle text-2xl"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-list-numbers text-2xl"></i></button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
