<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor 圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- 引入 React, ReactDOM 與 Chart.js -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-in-row { animation: fadeInRow 0.2s ease-out forwards; }
        .expand-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const COLORS = {
            primary: '#4f46e5',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            accent: '#8b5cf6',
            gray: '#94a3b8'
        };

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            const [invoices, setInvoices] = useState(() => {
                try {
                    const saved = localStorage.getItem('nextgen_invoices');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterType, setFilterType] = useState('ALL');

            const barChartRef = useRef(null);
            const doughnutChartRef = useRef(null);
            const lineChartRef = useRef(null);
            const chartInstances = useRef({});
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式', 
                taxRate: 0.05, 
                taxType: 'taxable',
                invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0],
                taxId: '', 
                items: [], 
                netAmount: 0, 
                tax: 0, 
                total: 0,
                status: 'active'
            });

            useEffect(() => {
                localStorage.setItem('nextgen_invoices', JSON.stringify(invoices));
            }, [invoices]);

            // --- 數據分析邏輯 ---
            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort().reverse(); 
            }, [invoices]);

            const filteredInvoices = useMemo(() => {
                return invoices.filter(inv => {
                    const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(inv.date) === filterPeriod;
                    const matchType = filterType === 'ALL' || inv.invoiceType === filterType;
                    return matchPeriod && matchType;
                });
            }, [invoices, filterPeriod, filterType]);

            const activeInvoices = useMemo(() => filteredInvoices.filter(inv => inv.status !== 'void'), [filteredInvoices]);
            const voidCount = filteredInvoices.filter(inv => inv.status === 'void').length;
            const totalAmount = activeInvoices.reduce((sum, inv) => sum + (inv.total || 0), 0);
            const totalTax = activeInvoices.reduce((sum, inv) => sum + (inv.tax || 0), 0);

            // --- 圖表繪製 ---
            useEffect(() => {
                if (activeTab === 'dashboard') {
                    // 清理舊圖表
                    Object.values(chartInstances.current).forEach(chart => chart?.destroy());

                    // 1. 熱銷品項營收 (Top 5 Bar)
                    if (barChartRef.current) {
                        const itemMap = {};
                        activeInvoices.forEach(inv => (inv.items || []).forEach(it => {
                            itemMap[it.name] = (itemMap[it.name] || 0) + (it.amount || 0);
                        }));
                        const barData = Object.keys(itemMap).map(n => ({ n, v: itemMap[n] })).sort((a,b) => b.v - a.v).slice(0, 5);
                        
                        chartInstances.current.bar = new Chart(barChartRef.current, {
                            type: 'bar',
                            data: { 
                                labels: barData.map(d => d.n), 
                                datasets: [{ 
                                    label: '營收額', 
                                    data: barData.map(d => d.v), 
                                    backgroundColor: [COLORS.primary, COLORS.accent, COLORS.success, COLORS.warning, COLORS.danger],
                                    borderRadius: 10
                                }] 
                            },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    }

                    // 2. 營收趨勢 (Line Chart)
                    if (lineChartRef.current) {
                        const trendMap = {};
                        [...activeInvoices].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(inv => {
                            const m = inv.date.substring(0, 7); // YYYY-MM
                            trendMap[m] = (trendMap[m] || 0) + (inv.total || 0);
                        });
                        const trendData = Object.keys(trendMap).map(m => ({ m, v: trendMap[m] }));

                        chartInstances.current.line = new Chart(lineChartRef.current, {
                            type: 'line',
                            data: {
                                labels: trendData.map(d => d.m),
                                datasets: [{
                                    label: '每月含稅總額',
                                    data: trendData.map(d => d.v),
                                    borderColor: COLORS.primary,
                                    backgroundColor: 'rgba(79, 70, 229, 0.1)',
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 6,
                                    pointBackgroundColor: COLORS.primary
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
                        });
                    }

                    // 3. 發票類型佔比 (Doughnut)
                    if (doughnutChartRef.current) {
                        const b2b = activeInvoices.filter(i => i.invoiceType === '三聯式').length;
                        const b2c = activeInvoices.filter(i => i.invoiceType === '二聯式').length;

                        chartInstances.current.doughnut = new Chart(doughnutChartRef.current, {
                            type: 'doughnut',
                            data: {
                                labels: ['三聯式 (B2B)', '二聯式 (B2C)'],
                                datasets: [{
                                    data: [b2b, b2c],
                                    backgroundColor: [COLORS.accent, COLORS.warning],
                                    borderWidth: 0
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
                        });
                    }
                }
                return () => Object.values(chartInstances.current).forEach(chart => chart?.destroy());
            }, [activeTab, activeInvoices]);

            // --- 核心操作 ---
            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let finalValue = value;
                if (name === 'invoiceNumber') {
                    let cleaned = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (cleaned.length > 2) cleaned = cleaned.substring(0, 2) + '-' + cleaned.substring(2, 10);
                    finalValue = cleaned;
                }
                if (name === 'taxId') finalValue = value.replace(/[^0-9]/g, '').substring(0, 8);

                const newFormData = { ...formData, [name]: finalValue };
                if (name === 'taxType') {
                    const sum = newFormData.items.reduce((acc, it) => acc + (it.amount || 0), 0);
                    const tax = finalValue === 'taxable' ? Math.round(sum * 0.05) : 0;
                    setFormData({ ...newFormData, netAmount: sum, tax: tax, total: sum + tax });
                } else { setFormData(newFormData); }
            };

            const addItem = () => setFormData(p => ({ ...p, items: [...p.items, { id: generateItemId(), name: '', quantity: 1, unitPrice: '', amount: 0 }] }));
            
            const handleItemChange = (idx, field, val) => {
                const newItems = [...formData.items];
                newItems[idx][field] = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    newItems[idx].amount = Math.round((parseFloat(newItems[idx].quantity) || 0) * (parseFloat(newItems[idx].unitPrice) || 0));
                }
                const sum = newItems.reduce((acc, it) => acc + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(sum * 0.05) : 0;
                setFormData(prev => ({ ...prev, items: newItems, netAmount: sum, tax: tax, total: sum + tax }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) return showToast("發票號碼格式錯誤", "error");
                setInvoices([ { ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber) ]);
                showToast("數據已成功錄入");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
                    
                    {/* Desktop Sidebar */}
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col shadow-2xl flex-shrink-0">
                        <div className="p-8 border-b border-slate-800">
                            <h1 className="text-xl font-black text-white flex items-center gap-2 italic">
                                <i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務
                            </h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-polar"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers"></i> 整合清單</button>
                        </nav>
                        <div className="p-6 mt-auto">
                            <div className="bg-slate-800 rounded-2xl p-4 border border-slate-700">
                                <div className="text-[10px] font-bold text-slate-500 uppercase">System Status</div>
                                <div className="text-emerald-400 text-xs font-bold mt-1 flex items-center gap-1"><i className="ph-fill ph-circle"></i> Local Engine Optimized</div>
                            </div>
                        </div>
                    </aside>
                    
                    <main className="flex-1 overflow-y-auto relative pb-24 md:pb-0">
                        {toast && (
                            <div className="fixed top-6 right-6 px-6 py-3 rounded-2xl shadow-2xl bg-white border border-slate-200 z-[110] animate-slide-in flex items-center gap-3 font-bold border-l-8 border-l-emerald-500">
                                <i className="ph-fill ph-check-circle text-emerald-500"></i> {toast.message}
                            </div>
                        )}

                        <div className="p-4 md:p-10 max-w-6xl mx-auto">
                            
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 animate-slide-in">
                                    <header className="flex justify-between items-end">
                                        <div><h2 className="text-4xl font-black tracking-tight text-slate-900">戰情儀表板</h2><p className="text-slate-400 mt-2">Real-time Financial Insights</p></div>
                                    </header>

                                    {/* 核心指標 */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm transition-transform hover:scale-[1.02]">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">有效張數</div>
                                            <div className="text-4xl font-black mt-1">{activeInvoices.length}</div>
                                        </div>
                                        <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white transition-transform hover:scale-[1.02]">
                                            <div className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">含稅總額</div>
                                            <div className="text-4xl font-black font-mono mt-1">${totalAmount.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm transition-transform hover:scale-[1.02]">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">應繳營業稅</div>
                                            <div className="text-4xl font-black text-indigo-600 mt-1">${totalTax.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-red-50 p-6 rounded-3xl border border-red-100 transition-transform hover:scale-[1.02]">
                                            <div className="text-red-400 text-[10px] font-bold uppercase tracking-widest">已作廢</div>
                                            <div className="text-4xl font-black text-red-500 mt-1">{voidCount}</div>
                                        </div>
                                    </div>

                                    {/* 圖表分析區 */}
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 space-y-8">
                                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm h-80">
                                                <h4 className="font-bold text-slate-700 flex items-center gap-2 mb-4"><i className="ph ph-trend-up text-indigo-500"></i> 營收趨勢圖 (Monthly)</h4>
                                                <div className="h-56"><canvas ref={lineChartRef}></canvas></div>
                                            </div>
                                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm h-80">
                                                <h4 className="font-bold text-slate-700 flex items-center gap-2 mb-4"><i className="ph ph-chart-bar text-emerald-500"></i> 熱銷品項營收 Top 5</h4>
                                                <div className="h-56"><canvas ref={barChartRef}></canvas></div>
                                            </div>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm h-[42rem] flex flex-col items-center">
                                            <h4 className="font-bold text-slate-700 flex items-center gap-2 mb-12 self-start"><i className="ph ph-users-three text-orange-500"></i> 客群分佈 (B2B/B2C)</h4>
                                            <div className="h-64 w-full"><canvas ref={doughnutChartRef}></canvas></div>
                                            <div className="mt-12 space-y-4 w-full">
                                                <div className="flex justify-between p-4 bg-slate-50 rounded-2xl"><span className="text-slate-500 font-bold">三聯式 (B2B)</span><span className="font-black text-indigo-600">{activeInvoices.filter(i=>i.invoiceType==='三聯式').length} 張</span></div>
                                                <div className="flex justify-between p-4 bg-slate-50 rounded-2xl"><span className="text-slate-500 font-bold">二聯式 (B2C)</span><span className="font-black text-orange-500">{activeInvoices.filter(i=>i.invoiceType==='二聯式').length} 張</span></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'entry' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header><h2 className="text-3xl font-black text-slate-900">發票錄入</h2></header>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 p-10 shadow-sm">
                                        <form onSubmit={handleSubmit} className="space-y-8">
                                            <div className="flex flex-wrap justify-between items-center bg-slate-50 p-2 rounded-2xl border border-slate-100 gap-4">
                                                <div className="flex gap-2">
                                                    <button type="button" onClick={() => setFormData({...formData, invoiceType: '三聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '三聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>三聯 (B2B)</button>
                                                    <button type="button" onClick={() => setFormData({...formData, invoiceType: '二聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '二聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>二聯 (B2C)</button>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="flex p-1 bg-slate-200 rounded-xl">
                                                        <button type="button" onClick={() => handleInputChange({target: {name: 'taxType', value: 'taxable'}})} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all ${formData.taxType === 'taxable' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>應稅</button>
                                                        <button type="button" onClick={() => handleInputChange({target: {name: 'taxType', value: 'exempt'}})} className={`px-4 py-1.5 rounded-lg text-[10px] font-bold transition-all ${formData.taxType === 'exempt' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>免稅</button>
                                                    </div>
                                                    <label className="flex items-center gap-2 cursor-pointer bg-red-50 px-4 py-1.5 rounded-xl border border-red-100">
                                                        <input type="checkbox" checked={formData.status === 'void'} onChange={e => setFormData({...formData, status: e.target.checked ? 'void' : 'active'})} className="accent-red-500" />
                                                        <span className="text-[10px] font-bold text-red-600">作廢標記</span>
                                                    </label>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">發票號碼</label>
                                                    <input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border border-slate-200 outline-none font-mono text-xl focus:ring-4 focus:ring-indigo-100 transition-all" placeholder="AB-12345678" />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">日期</label>
                                                    <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-indigo-100" />
                                                </div>
                                                {formData.invoiceType === '三聯式' && (
                                                    <div className="space-y-2">
                                                        <label className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">買方統編 (8碼)</label>
                                                        <input type="text" name="taxId" value={formData.taxId} onChange={handleInputChange} maxLength={8} className="w-full px-5 py-4 rounded-2xl border border-indigo-100 bg-indigo-50/50 outline-none font-mono focus:ring-4 focus:ring-indigo-100" placeholder="00000000" />
                                                    </div>
                                                )}
                                            </div>

                                            <div className="pt-8 border-t border-slate-100">
                                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-slate-700 flex items-center gap-2"><i className="ph ph-shopping-cart text-indigo-500"></i> 品項細節</h3><button type="button" onClick={addItem} className="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-xl">+ 新增品項</button></div>
                                                <div className="space-y-4">
                                                    {formData.items.map((it, i) => (
                                                        <div key={it.id} className="flex flex-col md:flex-row gap-4 p-5 bg-slate-50 rounded-2xl relative group border border-slate-100 shadow-inner">
                                                            <input type="text" placeholder="品名" value={it.name} onChange={e => handleItemChange(i, 'name', e.target.value)} className="flex-1 bg-transparent outline-none text-sm font-black" />
                                                            <div className="flex gap-4">
                                                                <input type="number" placeholder="數量" value={it.quantity} onChange={e => handleItemChange(i, 'quantity', e.target.value)} className="w-20 bg-white border border-slate-200 rounded-xl py-2 px-3 text-center text-sm outline-none" />
                                                                <input type="number" placeholder="單價" value={it.unitPrice} onChange={e => handleItemChange(i, 'unitPrice', e.target.value)} className="w-28 bg-white border border-slate-200 rounded-xl py-2 px-3 text-right text-sm outline-none font-mono" />
                                                                <div className="w-32 text-right font-black text-slate-400 text-sm py-2 group-hover:text-indigo-600 transition-colors">${(it.amount || 0).toLocaleString()}</div>
                                                            </div>
                                                            <button type="button" onClick={() => {
                                                                const newItems = formData.items.filter((_, idx) => idx !== i);
                                                                const sum = newItems.reduce((acc, item) => acc + (item.amount || 0), 0);
                                                                const tax = formData.taxType === 'taxable' ? Math.round(sum * 0.05) : 0;
                                                                setFormData({...formData, items: newItems, netAmount: sum, tax: tax, total: sum + tax});
                                                            }} className="absolute -top-3 -right-3 bg-white p-2 rounded-full shadow-lg text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-trash-simple text-xl"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className={`p-8 rounded-[2.5rem] text-white flex flex-col md:flex-row justify-between items-center shadow-2xl transition-all ${formData.status === 'void' ? 'bg-slate-700' : 'bg-indigo-900'}`}>
                                                <div className="flex gap-12 w-full md:w-auto">
                                                    <div><div className="text-[10px] uppercase font-bold text-indigo-300">銷售額 (未稅)</div><div className="text-2xl font-black font-mono mt-1">${(formData.netAmount || 0).toLocaleString()}</div></div>
                                                    <div className="border-l border-indigo-800 pl-12"><div className="text-[10px] uppercase font-bold text-indigo-300">營業稅 ({formData.taxType === 'taxable' ? '5%' : '0%'})</div><div className="text-2xl font-black font-mono mt-1">${(formData.tax || 0).toLocaleString()}</div></div>
                                                </div>
                                                <div className="text-right mt-8 md:mt-0 w-full md:w-auto border-t md:border-t-0 md:border-l border-indigo-800 pt-6 md:pt-0 md:pl-16">
                                                    <div className="text-[10px] uppercase font-bold text-indigo-300">含稅總計金額</div>
                                                    <div className="text-5xl font-black font-mono text-emerald-400 mt-2">${(formData.total || 0).toLocaleString()}</div>
                                                </div>
                                            </div>
                                            
                                            <button type="submit" className={`w-full font-black py-5 rounded-3xl shadow-xl transition-all active:scale-[0.98] text-xl ${formData.status === 'void' ? 'bg-red-600 text-white' : 'bg-indigo-600 text-white'}`}>
                                                {formData.status === 'void' ? '確認作廢發票' : '存檔發票資訊'}
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'list' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                        <div><h2 className="text-3xl font-black text-slate-800">整合明細清單</h2><p className="text-slate-400">所有數據僅存放於本地加密快取</p></div>
                                        <div className="flex flex-wrap gap-4 w-full md:w-auto">
                                            <select value={filterPeriod} onChange={e => setFilterPeriod(e.target.value)} className="bg-white border-2 border-slate-100 px-4 py-2 rounded-2xl text-xs font-bold shadow-sm outline-none">
                                                <option value="ALL">全部期別</option>
                                                {availablePeriods.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                            <button onClick={() => {
                                                const headers = ['狀態', '期別', '號碼', '總額'];
                                                const rows = filteredInvoices.map(i => `${i.status},${getInvoicePeriod(i.date)},${i.invoiceNumber},${i.total}`);
                                                const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                                                const blob = new Blob([csv], { type: 'text/csv' });
                                                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '財務報表.csv'; a.click();
                                            }} className="bg-emerald-600 text-white px-8 py-2.5 rounded-2xl font-black flex items-center gap-2 shadow-lg text-xs"><i className="ph ph-download"></i> 導出 CSV</button>
                                        </div>
                                    </header>
                                    
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                                <tr><th className="p-6">發票號碼</th><th className="p-6">統編/稅別</th><th className="p-6 text-center">狀態</th><th className="p-6 text-right">總計 (含稅)</th><th className="p-6 text-center">操作</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filteredInvoices.map(inv => (
                                                    <Fragment key={inv.id}>
                                                        <tr onClick={() => setExpandedInvoiceId(expandedInvoiceId === inv.id ? null : inv.id)} className={`cursor-pointer transition-all ${inv.status === 'void' ? 'bg-red-50/30' : 'hover:bg-slate-50'}`}>
                                                            <td className={`p-6 font-black font-mono text-lg ${inv.status === 'void' ? 'line-through text-slate-300' : 'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                            <td className="p-6 text-sm text-slate-500">
                                                                <div className="font-bold">{inv.taxId || '二聯/無統編'}</div>
                                                                <div className="text-[10px] uppercase text-slate-300">{inv.taxType === 'taxable' ? '應稅 5%' : '免稅 0%'}</div>
                                                            </td>
                                                            <td className="p-6 text-center">{inv.status === 'void' ? <span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black">作廢</span> : <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black">正常</span>}</td>
                                                            <td className={`p-6 text-right font-black font-mono text-xl ${inv.status === 'void' ? 'text-slate-300' : 'text-indigo-700'}`}>${(inv.total || 0).toLocaleString()}</td>
                                                            <td className="p-6 text-center"><button onClick={(e) => { e.stopPropagation(); setInvoices(invoices.filter(i=>i.id !== inv.id)); showToast("已移除紀錄"); }} className="text-slate-300 hover:text-red-500 transition-colors"><i className="ph ph-trash-simple text-2xl"></i></button></td>
                                                        </tr>
                                                        {expandedInvoiceId === inv.id && (
                                                            <tr className="bg-slate-900"><td colSpan="5" className="p-8">
                                                                <div className="rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                                                                    <table className="w-full text-xs text-left text-slate-300">
                                                                        <thead className="bg-slate-800 text-slate-500 font-black uppercase tracking-widest border-b border-slate-700">
                                                                            <tr><th className="p-4">品項名稱</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr>
                                                                        </thead>
                                                                        <tbody className="divide-y divide-slate-800/50">
                                                                            {(inv.items || []).map((it, idx) => (
                                                                                <tr key={idx}><td className="p-4 font-medium">{it.name}</td><td className="p-4 text-center font-mono">{it.quantity}</td><td className="p-4 text-right font-mono">${(it.unitPrice || 0).toLocaleString()}</td><td className="p-4 text-right font-black text-emerald-400 font-mono">${(it.amount || 0).toLocaleString()}</td></tr>
                                                                            ))}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </td></tr>
                                                        )}
                                                    </Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    
                    {/* Mobile Navigation */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl pb-safe">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-chart-polar text-3xl"></i></button>
                        <button onClick={() => setActiveTab('entry')} className={activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-plus-circle text-3xl"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-list-numbers text-3xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
