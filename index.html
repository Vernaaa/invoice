<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const SUPABASE_URL = 'https://bzdwlfodbkyiougsqeve.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f7RuOJ8xRT8qXNIjwP5wlw_pRTFKN3b';
        const supabase = Object.assign(window['supabase']).createClient(SUPABASE_URL, SUPABASE_KEY);

        const COLORS = { 
            primary: '#4f46e5', success: '#10b981', warning: '#f59e0b', danger: '#ef4444', accent: '#8b5cf6',
            chart: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4']
        };

        const getInvoicePeriod = (dateString) => {
            if (!dateString || dateString === "undefined" || dateString === "NaN") return '期別未知';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '日期格式錯誤';
            const periodStart = (date.getMonth() + 1) % 2 === 0 ? date.getMonth() : date.getMonth() + 1;
            return `${date.getFullYear()}年 ${String(periodStart).padStart(2, '0')}-${String(periodStart + 1).padStart(2, '0')}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        const parseCSVLine = (text) => {
            const result = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ""; } 
                else { current += char; }
            }
            result.push(current.trim());
            return result;
        };

        function App() {
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices_supabase');
                return saved ? JSON.parse(saved) : [];
            });

            const [productMaster, setProductMaster] = useState(() => {
                const saved = localStorage.getItem('nextgen_product_master');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [activeTab, setActiveTab] = useState('entry'); // 加入 'products'
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            const [syncStatus, setSyncStatus] = useState('idle');
            
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterType, setFilterType] = useState('ALL');
            const [filterTrans, setFilterTrans] = useState('ALL');
            const [focusedItemIndex, setFocusedItemIndex] = useState(null);

            const chartRefs = { trend: useRef(null), salesDoughnut: useRef(null), purchaseDoughnut: useRef(null), salesBar: useRef(null), purchaseBar: useRef(null) };
            const chartInstances = useRef({});

            const [formData, setFormData] = useState({
                transactionType: '銷項', invoiceType: '三聯式', taxType: 'taxable', 
                invoiceNumber: '', vendorName: '', date: new Date().toISOString().split('T')[0], 
                taxId: '', items: [], netAmount: 0, tax: 0, total: 0, status: 'active'
            });

            const [newProductForm, setNewProductForm] = useState({ name: '', specs: '', unitPrice: '' });

            // --- 全雲端資料初始化 (Fetch on Load) ---
            useEffect(() => {
                const fetchCloudData = async () => {
                    setSyncStatus('syncing');
                    try {
                        const { data, error } = await supabase.from('invoices').select('*');
                        if (error) throw error;
                        
                        if (data && data.length > 0) {
                            const cloudInvoices = [];
                            let cloudMaster = null;
                            data.forEach(row => {
                                // 智慧黑科技：識別隱藏在發票表內的商品主檔
                                if (row.id === '__PRODUCT_MASTER__') {
                                    cloudMaster = row.data?.products;
                                } else if (row.data) {
                                    cloudInvoices.push(row.data);
                                }
                            });
                            
                            if (cloudInvoices.length > 0) setInvoices(cloudInvoices);
                            if (cloudMaster) setProductMaster(cloudMaster);
                            setSyncStatus('success');
                        } else {
                            setSyncStatus('idle');
                        }
                    } catch (err) {
                        console.error("Cloud fetch failed:", err);
                        setSyncStatus('error');
                    }
                };
                fetchCloudData();
            }, []);

            // --- 持久化與全量雲端同步 (Sync) ---
            useEffect(() => { localStorage.setItem('nextgen_invoices_supabase', JSON.stringify(invoices)); }, [invoices]);
            useEffect(() => { localStorage.setItem('nextgen_product_master', JSON.stringify(productMaster)); }, [productMaster]);

            useEffect(() => {
                const performSync = async () => {
                    // 若無資料且無商品則不同步，避免清空雲端
                    if (invoices.length === 0 && productMaster.length === 0) return; 
                    
                    setSyncStatus('syncing');
                    const syncData = invoices.map(inv => ({ id: inv.invoiceNumber, data: { ...inv, items: inv.items || [] }, updated_at: new Date() }));
                    
                    // 將商品主檔打包成特殊紀錄一併上傳
                    syncData.push({
                        id: '__PRODUCT_MASTER__',
                        data: { isSystemRecord: true, type: 'ProductMaster', products: productMaster },
                        updated_at: new Date()
                    });

                    const { error } = await supabase.from('invoices').upsert(syncData);
                    if (error) setSyncStatus('error');
                    else { setSyncStatus('success'); setTimeout(() => setSyncStatus('idle'), 2000); }
                };
                const timer = setTimeout(performSync, 1500);
                return () => clearTimeout(timer);
            }, [invoices, productMaster]);

            // --- 儀表板圖表邏輯 ---
            useEffect(() => {
                if (activeTab === 'dashboard') {
                    Object.values(chartInstances.current).forEach(c => c?.destroy());
                    const activeInvoices = invoices.filter(i => i.status !== 'void');

                    if (chartRefs.trend.current) {
                        const salesMap = {}; const purchaseMap = {};
                        [...activeInvoices].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(inv => {
                            const month = inv.date.substring(0, 7);
                            if (inv.transactionType === '進項') purchaseMap[month] = (purchaseMap[month] || 0) + (inv.total || 0);
                            else salesMap[month] = (salesMap[month] || 0) + (inv.total || 0);
                        });
                        const labels = [...new Set([...Object.keys(salesMap), ...Object.keys(purchaseMap)])].sort();
                        chartInstances.current.trend = new Chart(chartRefs.trend.current, {
                            type: 'line',
                            data: { labels, datasets: [
                                { label: '銷項 (營收)', data: labels.map(l => salesMap[l] || 0), borderColor: COLORS.primary, backgroundColor: 'rgba(79, 70, 229, 0.1)', fill: true, tension: 0.4 },
                                { label: '進項 (支出)', data: labels.map(l => purchaseMap[l] || 0), borderColor: COLORS.danger, backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.4 }
                            ]},
                            options: { responsive: true, maintainAspectRatio: false }
                        });
                    }

                    if (chartRefs.salesDoughnut.current) {
                        const salesOnly = activeInvoices.filter(i => i.transactionType === '銷項');
                        const b2b = salesOnly.filter(i => i.invoiceType === '三聯式').length;
                        const b2c = salesOnly.filter(i => i.invoiceType === '二聯式').length;
                        chartInstances.current.salesDoughnut = new Chart(chartRefs.salesDoughnut.current, {
                            type: 'doughnut', data: { labels: ['三聯 (B2B)', '二聯 (B2C)'], datasets: [{ data: [b2b, b2c], backgroundColor: [COLORS.accent, COLORS.warning], borderWidth: 0 }] },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                        });
                    }

                    if (chartRefs.purchaseDoughnut.current) {
                        const purchaseOnly = activeInvoices.filter(i => i.transactionType === '進項');
                        const taxable = purchaseOnly.filter(i => i.taxType === 'taxable').length;
                        const exempt = purchaseOnly.filter(i => i.taxType === 'exempt').length;
                        chartInstances.current.purchaseDoughnut = new Chart(chartRefs.purchaseDoughnut.current, {
                            type: 'doughnut', data: { labels: ['應稅 (可抵扣)', '免稅'], datasets: [{ data: [taxable, exempt], backgroundColor: [COLORS.success, COLORS.chart[2]], borderWidth: 0 }] },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                        });
                    }

                    if (chartRefs.salesBar.current) {
                        const itemMap = {};
                        activeInvoices.filter(i => i.transactionType === '銷項').forEach(inv => (inv.items || []).forEach(it => { itemMap[it.name] = (itemMap[it.name] || 0) + (it.amount || 0); }));
                        const sorted = Object.keys(itemMap).map(n => ({ n, v: itemMap[n] })).sort((a,b) => b.v - a.v).slice(0, 5);
                        chartInstances.current.salesBar = new Chart(chartRefs.salesBar.current, {
                            type: 'bar', data: { labels: sorted.map(d=>d.n), datasets: [{ data: sorted.map(d=>d.v), backgroundColor: COLORS.chart, borderRadius: 8 }] },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    }

                    if (chartRefs.purchaseBar.current) {
                        const vendorMap = {};
                        activeInvoices.filter(i => i.transactionType === '進項').forEach(inv => { vendorMap[inv.vendorName || '未註明'] = (vendorMap[inv.vendorName || '未註明'] || 0) + (inv.total || 0); });
                        const sorted = Object.keys(vendorMap).map(n => ({ n, v: vendorMap[n] })).sort((a,b) => b.v - a.v).slice(0, 5);
                        chartInstances.current.purchaseBar = new Chart(chartRefs.purchaseBar.current, {
                            type: 'bar', data: { labels: sorted.map(d=>d.n), datasets: [{ data: sorted.map(d=>d.v), backgroundColor: COLORS.danger, borderRadius: 8 }] },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    }
                }
            }, [activeTab, invoices]);

            const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 3000); };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let val = value;
                if (name === 'invoiceNumber') {
                    val = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (val.length > 2) val = val.substring(0, 2) + '-' + val.substring(2, 10);
                }
                if (name === 'taxId') val = value.replace(/[^0-9]/g, '').substring(0, 8);
                const next = { ...formData, [name]: val };
                if (name === 'taxType') {
                    const tax = val === 'taxable' ? Math.round(next.netAmount * 0.05) : 0;
                    setFormData({ ...next, tax, total: next.netAmount + tax });
                } else setFormData(next);
            };

            const handleItemChange = (idx, field, val) => {
                const items = [...formData.items];
                let processedVal = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    processedVal = val.replace(/[^0-9.]/g, ''); 
                    if (processedVal !== "" && parseFloat(processedVal) < 0) processedVal = "0";
                }
                items[idx][field] = processedVal;
                if (field === 'quantity' || field === 'unitPrice') {
                    items[idx].amount = Math.round((parseFloat(items[idx].quantity) || 0) * (parseFloat(items[idx].unitPrice) || 0));
                }
                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                setFormData({ ...formData, items, netAmount, tax, total: netAmount + tax });
            };

            const applyProductToItem = (idx, product) => {
                const items = [...formData.items];
                items[idx].name = product.name;
                items[idx].specs = product.specs || '';
                items[idx].unitPrice = product.unitPrice || 0;
                items[idx].amount = Math.round((parseFloat(items[idx].quantity) || 0) * (parseFloat(product.unitPrice) || 0));
                
                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                setFormData({ ...formData, items, netAmount, tax, total: netAmount + tax });
                setFocusedItemIndex(null);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) return showToast("發票格式錯誤 (AA-12345678)");
                
                const newMaster = [...productMaster];
                let isMasterUpdated = false;
                formData.items.forEach(it => {
                    if (!it.name) return;
                    const existingIdx = newMaster.findIndex(p => p.name === it.name);
                    if (existingIdx >= 0) {
                        if (newMaster[existingIdx].unitPrice != it.unitPrice || newMaster[existingIdx].specs !== it.specs) {
                            newMaster[existingIdx] = { ...newMaster[existingIdx], unitPrice: parseFloat(it.unitPrice)||0, specs: it.specs };
                            isMasterUpdated = true;
                        }
                    } else {
                        newMaster.push({ id: generateItemId(), name: it.name, specs: it.specs, unitPrice: parseFloat(it.unitPrice)||0 });
                        isMasterUpdated = true;
                    }
                });
                if (isMasterUpdated) setProductMaster(newMaster);

                setInvoices([{ ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber)]);
                showToast("數據存檔成功，商品主檔已同步至雲端");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', vendorName: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            const handleFormKeyDown = (e) => { if (e.key === 'Enter') e.preventDefault(); };

            // --- 商品主檔管理邏輯 ---
            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProductForm.name) return showToast('請填寫商品名稱');
                if (productMaster.some(p => p.name === newProductForm.name)) return showToast('此商品名稱已存在');
                
                setProductMaster([{
                    id: generateItemId(),
                    name: newProductForm.name,
                    specs: newProductForm.specs,
                    unitPrice: parseFloat(newProductForm.unitPrice) || 0
                }, ...productMaster]);
                
                setNewProductForm({ name: '', specs: '', unitPrice: '' });
                showToast('商品建檔成功並已同步');
            };

            const exportProductsCSV = () => {
                const headers = ['系統ID', '商品/服務名稱', '規格描述', '預設單價'];
                const csvRows = [headers.join(',')];
                productMaster.forEach(p => {
                    csvRows.push([p.id, `"${(p.name||'').replace(/"/g,'""')}"`, `"${(p.specs||'').replace(/"/g,'""')}"`, p.unitPrice].join(','));
                });
                const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `商品主檔資料庫_${new Date().toISOString().split('T')[0]}.csv`; a.click();
            };


            const exportCSV = () => {
                const filtered = invoices.filter(i => {
                    const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(i.date) === filterPeriod;
                    const matchType = filterType === 'ALL' || i.invoiceType === filterType;
                    const matchTrans = filterTrans === 'ALL' || i.transactionType === filterTrans;
                    return matchPeriod && matchType && matchTrans;
                });
                const headers = ['狀態', '類型', '發票類型', '期別', '稅別', '發票號碼', '對方公司', '開立日期', '統編', '銷售額', '稅額', '總計', '品項', '規格', '數量', '單價', '小計'];
                const csvRows = [headers.join(',')];
                filtered.forEach(inv => {
                    const base = [`"${inv.status==='void'?'作廢':'正常'}"`, `"${inv.transactionType || '銷項'}"`, `"${inv.invoiceType}"`, `"${getInvoicePeriod(inv.date)}"`, `"${inv.taxType==='taxable'?'應稅':'免稅'}"`, `"${inv.invoiceNumber}"`, `"${(inv.vendorName || '').replace(/"/g, '""')}"`, `"${inv.date}"`, `"${inv.taxId||''}"`, inv.netAmount, inv.tax, inv.total];
                    if (inv.items && inv.items.length > 0) {
                        inv.items.forEach(it => { csvRows.push([...base, `"${(it.name||'').replace(/"/g,'""')}"`, `"${(it.specs||'').replace(/"/g,'""')}"`, it.quantity, it.unitPrice, it.amount].join(',')); });
                    } else { csvRows.push([...base, '""', '""', 0, 0, 0].join(',')); }
                });
                const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `進銷項明細導出.csv`; a.click();
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                        const headers = parseCSVLine(lines[0]);
                        if (headers.includes('id') && headers.includes('data')) {
                            const dataIdx = headers.indexOf('data');
                            const imported = lines.slice(1).map(l => {
                                const cols = parseCSVLine(l);
                                return cols[dataIdx] ? JSON.parse(cols[dataIdx]) : null;
                            }).filter(i => i);
                            
                            // 過濾掉商品主檔記錄，只還原發票
                            const importedInvoices = imported.filter(i => !i.isSystemRecord);
                            setInvoices(importedInvoices);
                            showToast("資料還原成功");
                            return;
                        }
                        const invoiceMap = new Map();
                        for (let i = 1; i < lines.length; i++) {
                            const cols = parseCSVLine(lines[i]);
                            if (cols.length < 10) continue;
                            const invNum = cols[5];
                            if (!invoiceMap.has(invNum)) {
                                invoiceMap.set(invNum, {
                                    status: cols[0] === '作廢' ? 'void' : 'active', transactionType: cols[1], invoiceType: cols[2], taxType: cols[4] === '應稅' ? 'taxable' : 'exempt',
                                    invoiceNumber: invNum, vendorName: cols[6], date: cols[7], taxId: cols[8], netAmount: parseFloat(cols[9]) || 0, tax: parseFloat(cols[10]) || 0, total: parseFloat(cols[11]) || 0,
                                    items: [], id: Date.now().toString() + i
                                });
                            }
                            const inv = invoiceMap.get(invNum);
                            if (cols[12]) inv.items.push({ id: generateItemId()+i, name: cols[12], specs: cols[13], quantity: parseFloat(cols[14])||0, unitPrice: parseFloat(cols[15])||0, amount: parseFloat(cols[16])||0 });
                        }
                        setInvoices(Array.from(invoiceMap.values()));
                        showToast("報表數據還原成功");
                    } catch (err) { showToast("解析失敗", "error"); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort().reverse(); 
            }, [invoices]);

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 overflow-hidden relative">
                    {/* 左側導航列 */}
                    <aside className="hidden md:flex w-72 bg-slate-900 text-slate-300 flex-col shadow-2xl flex-shrink-0">
                        <div className="p-8 border-b border-slate-800 text-center">
                            <h1 className="text-xl font-black text-white italic tracking-tighter">NEXTGEN FINANCE</h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8 font-bold text-sm">
                            <button onClick={() => setActiveTab('help')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'help' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-info"></i> 使用指南</button>
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-pie"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-circle"></i> 進銷項錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-list-dashes"></i> 整合明細清單</button>
                            <button onClick={() => setActiveTab('products')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'products' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800 text-indigo-300'}`}><i className="ph ph-database"></i> 商品主檔庫</button>
                        </nav>
                        <div className="p-6 mt-auto border-t border-slate-800 text-center">
                            <div className="bg-slate-800 rounded-2xl p-4 flex flex-col items-center justify-center gap-2">
                                <div className="flex items-center gap-2">
                                    <div className={`w-2.5 h-2.5 rounded-full ${syncStatus === 'syncing' ? 'bg-amber-400 animate-pulse' : syncStatus === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                    <span className="text-[10px] font-bold text-slate-400">SUPABASE CLOUD SYNC</span>
                                </div>
                                <div className="text-[10px] font-bold text-emerald-400 mt-1"><i className="ph ph-cloud-check"></i> 主檔同步: {productMaster.length} 筆</div>
                            </div>

                                                                    <table className="w-full text-xs text-left text-slate-300">
                                                                        <thead className="bg-slate-800 text-slate-500 font-black border-b border-slate-700"><tr><th className="p-4">品項/規格</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr></thead>
                                                                        <tbody className="divide-y divide-slate-800/50">{(inv.items || []).map((it, idx) => (<tr key={idx}><td className="p-4"><div className="font-bold">{it.name || '項目'}</div><div className="text-[10px] text-slate-500 italic mt-0.5">{it.specs}</div></td><td className="p-4 text-center font-mono">{it.quantity}</td><td className="p-4 text-right font-mono">${(it.unitPrice||0).toLocaleString()}</td><td className="p-4 text-right font-black text-emerald-400 font-mono">${(it.amount||0).toLocaleString()}</td></tr>))}</tbody>
                                                                    </table>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* 全新的商品主檔管理分頁 */}
                        {activeTab === 'products' && (
                            <div className="space-y-6 animate-slide-in">
                                <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-8">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight italic">雲端商品主檔庫</h2>
                                        <p className="text-slate-500 font-bold text-sm mt-2 flex items-center gap-2"><i className="ph-fill ph-cloud-check text-emerald-500"></i> 與 Supabase 實時同步中</p>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={exportProductsCSV} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg text-xs hover:bg-indigo-700 transition-all"><i className="ph ph-download"></i> 導出 API 用 CSV</button>
                                    </div>
                                </header>

                                {/* 手動新增商品區塊 */}
                                <div className="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-sm mb-8">
                                    <h4 className="font-black text-slate-800 mb-6 flex items-center gap-2"><i className="ph ph-plus-circle text-indigo-500 text-xl"></i> 手動建檔</h4>
                                    <form onSubmit={handleAddProduct} className="flex flex-col md:flex-row gap-4 items-end">
                                        <div className="flex-1 space-y-1 w-full"><label className="text-[10px] font-black text-slate-400 uppercase">商品/服務名稱</label><input type="text" required value={newProductForm.name} onChange={e=>setNewProductForm({...newProductForm, name: e.target.value})} className="w-full px-5 py-3 rounded-xl border focus:border-indigo-500 outline-none font-bold text-sm" placeholder="例：顧問服務包" /></div>
                                        <div className="flex-1 space-y-1 w-full"><label className="text-[10px] font-black text-slate-400 uppercase">規格描述</label><input type="text" value={newProductForm.specs} onChange={e=>setNewProductForm({...newProductForm, specs: e.target.value})} className="w-full px-5 py-3 rounded-xl border focus:border-indigo-500 outline-none text-sm" placeholder="例：10小時/月" /></div>
                                        <div className="w-full md:w-48 space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">預設單價 (未稅)</label><input type="number" required value={newProductForm.unitPrice} onChange={e=>setNewProductForm({...newProductForm, unitPrice: e.target.value})} className="w-full px-5 py-3 rounded-xl border focus:border-indigo-500 outline-none font-mono text-sm" placeholder="0" /></div>
                                        <button type="submit" className="w-full md:w-auto bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white px-8 py-3.5 rounded-xl font-black transition-all flex items-center justify-center gap-2 text-sm"><i className="ph-fill ph-floppy-disk"></i> 加入主檔</button>
                                    </form>
                                </div>

                                {/* 商品主檔清單 */}
                                <div className="bg-white rounded-[3rem] border border-slate-200 overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 tracking-widest border-b uppercase">
                                            <tr><th className="p-6">商品/服務名稱</th><th className="p-6">規格描述</th><th className="p-6 text-right font-black">預設單價 (未稅)</th><th className="p-6 text-center">操作</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {productMaster.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-50 transition-all group">
                                                    <td className="p-6 font-black text-indigo-900">{p.name}</td>
                                                    <td className="p-6 text-sm text-slate-500 italic">{p.specs || '-'}</td>
                                                    <td className="p-6 text-right font-black font-mono text-lg text-slate-700">${(p.unitPrice||0).toLocaleString()}</td>
                                                    <td className="p-6 text-center"><button onClick={() => { setProductMaster(productMaster.filter(item => item.id !== p.id)); showToast("已從主檔庫移除", "success"); }} className="text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"><i className="ph-fill ph-trash-simple text-2xl"></i></button></td>
                                                </tr>
                                            ))}
                                            {productMaster.length === 0 && <tr><td colSpan="4" className="p-16 text-center text-slate-400 font-bold italic">目前尚無商品主檔，請於錄入發票時自動學習或手動建檔。</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl pb-safe">
                        <button onClick={()=>setActiveTab('help')} className={activeTab==='help'?'text-indigo-600':'text-slate-400'}><i className="ph ph-info text-2xl"></i></button>
                        <button onClick={()=>setActiveTab('dashboard')} className={activeTab==='dashboard'?'text-indigo-600':'text-slate-400'}><i className="ph ph-chart-pie text-2xl"></i></button>
                        <button onClick={()=>setActiveTab('entry')} className={activeTab==='entry'?'text-indigo-600':'text-slate-400'}><i className="ph ph-plus-circle text-2xl"></i></button>
                        <button onClick={()=>setActiveTab('list')} className={activeTab==='list'?'text-indigo-600':'text-slate-400'}><i className="ph ph-list-dashes text-2xl"></i></button>
                        <button onClick={()=>setActiveTab('products')} className={activeTab==='products'?'text-indigo-600':'text-slate-400'}><i className="ph ph-database text-2xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
