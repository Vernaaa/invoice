<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const COLORS = {
            primary: '#4f46e5',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            accent: '#8b5cf6',
            gray: '#94a3b8'
        };

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            // 本地數據初始化
            const [invoices, setInvoices] = useState(() => {
                try {
                    const saved = localStorage.getItem('nextgen_invoices_v2');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterType, setFilterType] = useState('ALL');

            const chartInstances = useRef({});
            const refs = { bar: useRef(null), doughnut: useRef(null), line: useRef(null) };
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式', taxType: 'taxable', invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0], taxId: '', 
                items: [], netAmount: 0, tax: 0, total: 0, status: 'active'
            });

            useEffect(() => {
                localStorage.setItem('nextgen_invoices_v2', JSON.stringify(invoices));
            }, [invoices]);

            // --- 數據統計與篩選 ---
            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort().reverse(); 
            }, [invoices]);

            const filteredInvoices = useMemo(() => {
                return invoices.filter(inv => {
                    const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(inv.date) === filterPeriod;
                    const matchType = filterType === 'ALL' || inv.invoiceType === filterType;
                    return matchPeriod && matchType;
                });
            }, [invoices, filterPeriod, filterType]);

            const activeInvoices = useMemo(() => filteredInvoices.filter(inv => inv.status !== 'void'), [filteredInvoices]);
            const totalAmount = activeInvoices.reduce((sum, inv) => sum + (inv.total || 0), 0);
            const totalTax = activeInvoices.reduce((sum, inv) => sum + (inv.tax || 0), 0);

            // --- 圖表邏輯 ---
            useEffect(() => {
                if (activeTab === 'dashboard') {
                    Object.values(chartInstances.current).forEach(c => c?.destroy());
                    
                    if (refs.bar.current) {
                        const itemMap = {};
                        activeInvoices.forEach(inv => (inv.items || []).forEach(it => {
                            itemMap[it.name] = (itemMap[it.name] || 0) + (it.amount || 0);
                        }));
                        const barData = Object.keys(itemMap).map(n => ({ n, v: itemMap[n] })).sort((a,b) => b.v - a.v).slice(0, 5);
                        chartInstances.current.bar = new Chart(refs.bar.current, {
                            type: 'bar',
                            data: { labels: barData.map(d=>d.n), datasets: [{ data: barData.map(d=>d.v), backgroundColor: COLORS.primary, borderRadius: 8 }] },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    }

                    if (refs.line.current) {
                        const trendMap = {};
                        [...activeInvoices].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(inv => {
                            const m = inv.date.substring(0, 7);
                            trendMap[m] = (trendMap[m] || 0) + (inv.total || 0);
                        });
                        chartInstances.current.line = new Chart(refs.line.current, {
                            type: 'line',
                            data: { labels: Object.keys(trendMap), datasets: [{ label: '營收趨勢', data: Object.values(trendMap), borderColor: COLORS.primary, tension: 0.4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)' }] },
                            options: { responsive: true, maintainAspectRatio: false }
                        });
                    }
                }
            }, [activeTab, activeInvoices]);

            const showToast = (message) => { setToast(message); setTimeout(() => setToast(null), 3000); };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let val = value;
                if (name === 'invoiceNumber') {
                    val = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (val.length > 2) val = val.substring(0, 2) + '-' + val.substring(2, 10);
                }
                if (name === 'taxId') val = value.replace(/[^0-9]/g, '').substring(0, 8);

                const next = { ...formData, [name]: val };
                if (name === 'taxType') {
                    const tax = val === 'taxable' ? Math.round(next.netAmount * 0.05) : 0;
                    setFormData({ ...next, tax, total: next.netAmount + tax });
                } else { setFormData(next); }
            };

            const handleItemChange = (idx, field, val) => {
                const items = [...formData.items];
                items[idx][field] = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    items[idx].amount = Math.round((parseFloat(items[idx].quantity) || 0) * (parseFloat(items[idx].unitPrice) || 0));
                }
                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                setFormData({ ...formData, items, netAmount, tax, total: netAmount + tax });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) return showToast("發票號碼格式不符");
                if (formData.invoiceType === '三聯式' && formData.taxId.length !== 8) return showToast("統編須為 8 碼");
                
                setInvoices([ { ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber) ]);
                showToast("數據已成功儲存至本地");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col shadow-2xl flex-shrink-0">
                        <div className="p-8 border-b border-slate-800">
                            <h1 className="text-xl font-black text-white italic"><i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務</h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-polar"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers"></i> 整合清單</button>
                        </nav>
                        <div className="p-6 mt-auto"><div className="bg-slate-800 rounded-xl p-3 text-[10px] font-bold text-emerald-400 border border-emerald-900/50"><i className="ph-fill ph-circle"></i> LOCAL ENGINE ONLINE</div></div>
                    </aside>
                    
                    <main className="flex-1 overflow-y-auto relative pb-24 md:pb-0">
                        {toast && <div className="fixed top-6 right-6 px-6 py-3 rounded-2xl shadow-2xl bg-white border-l-8 border-emerald-500 z-[110] animate-slide-in font-bold">{toast}</div>}

                        <div className="p-4 md:p-10 max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 animate-slide-in">
                                    <header><h2 className="text-4xl font-black tracking-tight text-slate-900">戰情儀表板</h2></header>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">張數</div><div className="text-4xl font-black mt-1">{activeInvoices.length}</div></div>
                                        <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white"><div className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">總額</div><div className="text-4xl font-black font-mono mt-1">${totalAmount.toLocaleString()}</div></div>
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">營業稅</div><div className="text-4xl font-black text-indigo-600 mt-1">${totalTax.toLocaleString()}</div></div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 h-80">
                                            <h4 className="font-bold mb-4 flex items-center gap-2"><i className="ph ph-trend-up text-indigo-500"></i> 營收趨勢</h4>
                                            <div className="h-56"><canvas ref={refs.line}></canvas></div>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 h-80">
                                            <h4 className="font-bold mb-4 flex items-center gap-2"><i className="ph ph-chart-bar text-emerald-500"></i> 熱銷品項排行</h4>
                                            <div className="h-56"><canvas ref={refs.bar}></canvas></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'entry' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header><h2 className="text-3xl font-black">發票錄入</h2></header>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 p-10 shadow-sm">
                                        <form onSubmit={handleSubmit} className="space-y-8">
                                            <div className="flex flex-wrap justify-between items-center bg-slate-50 p-2 rounded-2xl border border-slate-100 gap-4">
                                                <div className="flex gap-2">
                                                    <button type="button" onClick={() => setFormData({...formData, invoiceType: '三聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '三聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>三聯 (B2B)</button>
                                                    <button type="button" onClick={() => setFormData({...formData, invoiceType: '二聯式'})} className={`px-8 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '二聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>二聯 (B2C)</button>
                                                </div>
                                                <label className="flex items-center gap-2 cursor-pointer bg-red-50 px-4 py-1.5 rounded-xl text-red-600 text-[10px] font-bold">
                                                    <input type="checkbox" checked={formData.status === 'void'} onChange={e => setFormData({...formData, status: e.target.checked ? 'void' : 'active'})} className="accent-red-500" />
                                                    作廢標記
                                                </label>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                                <div className="space-y-2"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">發票號碼</label><input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border border-slate-200 font-mono text-xl" placeholder="AB-12345678" /></div>
                                                <div className="space-y-2"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">日期</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border border-slate-200" /></div>
                                                {formData.invoiceType === '三聯式' && <div className="space-y-2"><label className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">買方統編 (8碼)</label><input type="text" name="taxId" value={formData.taxId} onChange={handleInputChange} maxLength={8} className="w-full px-5 py-4 rounded-2xl border border-indigo-100 bg-indigo-50/50 font-mono" placeholder="00000000" /></div>}
                                            </div>

                                            <div className="pt-8 border-t border-slate-100">
                                                <div className="flex justify-between items-center mb-6"><h3 className="font-black text-slate-700 flex items-center gap-2"><i className="ph ph-shopping-cart text-indigo-500"></i> 品項細節</h3><button type="button" onClick={() => setFormData(p=>({...p, items:[...p.items, {id:generateItemId(), name:'', quantity:1, unitPrice:'', amount:0}]}))} className="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-xl">+ 新增品項</button></div>
                                                <div className="space-y-4">
                                                    {formData.items.map((it, i) => (
                                                        <div key={it.id} className="flex flex-col md:flex-row gap-4 p-5 bg-slate-50 rounded-2xl relative group border border-slate-100">
                                                            <input type="text" placeholder="品名" value={it.name} onChange={e => handleItemChange(i, 'name', e.target.value)} className="flex-1 bg-transparent outline-none text-sm font-black" />
                                                            <div className="flex gap-4">
                                                                <input type="number" placeholder="數量" value={it.quantity} onChange={e => handleItemChange(i, 'quantity', e.target.value)} className="w-20 bg-white border border-slate-200 rounded-xl py-2 px-3 text-center text-sm" />
                                                                <input type="number" placeholder="單價" value={it.unitPrice} onChange={e => handleItemChange(i, 'unitPrice', e.target.value)} className="w-28 bg-white border border-slate-200 rounded-xl py-2 px-3 text-right text-sm font-mono" />
                                                                <div className="w-32 text-right font-black text-slate-400 text-sm py-2">${(it.amount || 0).toLocaleString()}</div>
                                                            </div>
                                                            <button type="button" onClick={() => {
                                                                const items = formData.items.filter((_, idx) => idx !== i);
                                                                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                                                                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                                                                setFormData({...formData, items, netAmount, tax, total: netAmount+tax});
                                                            }} className="absolute -top-3 -right-3 bg-white p-2 rounded-full shadow-lg text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-trash-simple text-xl"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className={`p-8 rounded-[2.5rem] text-white shadow-2xl transition-all ${formData.status === 'void' ? 'bg-slate-700' : 'bg-indigo-900'}`}>
                                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                                                    <div className="flex flex-col md:flex-row gap-12 w-full md:w-auto">
                                                        <div><div className="text-[10px] uppercase font-bold text-indigo-300 mb-2">銷售額 (未稅)</div><div className="text-2xl font-black font-mono">${(formData.netAmount || 0).toLocaleString()}</div></div>
                                                        <div className="md:border-l md:border-indigo-800 md:pl-12">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <div className="text-[10px] uppercase font-bold text-indigo-300">營業稅 ({formData.taxType === 'taxable' ? '5%' : '0%'})</div>
                                                                <div className="flex p-1 bg-white/10 rounded-lg ml-4">
                                                                    <button type="button" onClick={() => handleInputChange({target: {name: 'taxType', value: 'taxable'}})} className={`px-3 py-1 rounded-md text-[10px] font-bold ${formData.taxType === 'taxable' ? 'bg-indigo-500 text-white' : 'text-indigo-300'}`}>應稅</button>
                                                                    <button type="button" onClick={() => handleInputChange({target: {name: 'taxType', value: 'exempt'}})} className={`px-3 py-1 rounded-md text-[10px] font-bold ${formData.taxType === 'exempt' ? 'bg-indigo-500 text-white' : 'text-indigo-300'}`}>免稅</button>
                                                                </div>
                                                            </div>
                                                            <div className="text-2xl font-black font-mono">${(formData.tax || 0).toLocaleString()}</div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right w-full md:w-auto border-t md:border-t-0 md:border-l border-indigo-800 pt-6 md:pt-0 md:pl-16"><div className="text-[10px] uppercase font-bold text-indigo-300">含稅總額</div><div className="text-5xl font-black font-mono text-emerald-400 mt-2">${(formData.total || 0).toLocaleString()}</div></div>
                                                </div>
                                            </div>
                                            <button type="submit" className={`w-full font-black py-5 rounded-3xl shadow-xl transition-all active:scale-[0.98] text-xl ${formData.status === 'void' ? 'bg-red-600 text-white' : 'bg-indigo-600 text-white'}`}>儲存發票資訊</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'list' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                        <div><h2 className="text-3xl font-black">整合明細清單</h2><p className="text-slate-400">本地存儲模式</p></div>
                                        <div className="flex flex-wrap gap-4 w-full md:w-auto">
                                            <select value={filterPeriod} onChange={e => setFilterPeriod(e.target.value)} className="bg-white border px-4 py-2 rounded-2xl text-xs font-bold shadow-sm"><option value="ALL">全部期別</option>{availablePeriods.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                            <button onClick={() => {
                                                const headers = ['狀態', '期別', '號碼', '總額'];
                                                const rows = filteredInvoices.map(i => `${i.status},${getInvoicePeriod(i.date)},${i.invoiceNumber},${i.total}`);
                                                const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                                                const blob = new Blob([csv], { type: 'text/csv' });
                                                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '財務報表.csv'; a.click();
                                            }} className="bg-emerald-600 text-white px-8 py-2.5 rounded-2xl font-black flex items-center gap-2 shadow-lg text-xs"><i className="ph ph-download"></i> 導出 CSV</button>
                                        </div>
                                    </header>
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                                <tr><th className="p-6">發票號碼</th><th className="p-6">統編/稅別</th><th className="p-6 text-center">狀態</th><th className="p-6 text-right">總計</th><th className="p-6 text-center">操作</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filteredInvoices.map(inv => (
                                                    <Fragment key={inv.id}>
                                                        <tr onClick={() => setExpandedInvoiceId(expandedInvoiceId === inv.id ? null : inv.id)} className="cursor-pointer hover:bg-slate-50 transition-all">
                                                            <td className={`p-6 font-black font-mono text-lg ${inv.status === 'void' ? 'line-through text-slate-300' : 'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                            <td className="p-6 text-sm text-slate-500"><div className="font-bold">{inv.taxId || '二聯無統編'}</div><div className="text-[10px] uppercase text-slate-300">{inv.taxType === 'taxable' ? '應稅 5%' : '免稅 0%'}</div></td>
                                                            <td className="p-6 text-center">{inv.status === 'void' ? <span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black">作廢</span> : <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black">正常</span>}</td>
                                                            <td className={`p-6 text-right font-black font-mono text-xl ${inv.status === 'void' ? 'text-slate-300' : 'text-indigo-700'}`}>${(inv.total || 0).toLocaleString()}</td>
                                                            <td className="p-6 text-center"><button onClick={(e) => { e.stopPropagation(); setInvoices(invoices.filter(i=>i.id !== inv.id)); showToast("已移除紀錄"); }} className="text-slate-300 hover:text-red-500 transition-colors"><i className="ph ph-trash-simple text-2xl"></i></button></td>
                                                        </tr>
                                                        {expandedInvoiceId === inv.id && (
                                                            <tr className="bg-slate-900"><td colSpan="5" className="p-8"><div className="rounded-3xl border border-slate-800 overflow-hidden shadow-2xl"><table className="w-full text-xs text-left text-slate-300"><thead className="bg-slate-800 text-slate-500 font-black tracking-widest border-b border-slate-700"><tr><th className="p-4">品項</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr></thead><tbody className="divide-y divide-slate-800/50">{(inv.items || []).map((it, idx) => (<tr key={idx}><td className="p-4 font-medium">{it.name}</td><td className="p-4 text-center">{it.quantity}</td><td className="p-4 text-right">${it.unitPrice.toLocaleString()}</td><td className="p-4 text-right font-black text-emerald-400">${it.amount.toLocaleString()}</td></tr>))}</tbody></table></div></td></tr>
                                                        )}
                                                    </Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl pb-safe">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-chart-polar text-3xl"></i></button>
                        <button onClick={() => setActiveTab('entry')} className={activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-plus-circle text-3xl"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-list-numbers text-3xl"></i></button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
