<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor 企業級圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- 引入 React, ReactDOM 與 Chart.js -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-in-row { animation: fadeInRow 0.2s ease-out forwards; }
        .expand-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .camera-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        video { object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const COLORS = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
        const apiKey = ""; // 若有 Gemini API Key 請填寫於此

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        // 預留辨識函數結構，防止呼叫時出錯
        const callGeminiVision = async (base64Data) => {
            if (!apiKey) throw new Error("Missing API Key");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `辨識發票內容並回傳 JSON：{"invoiceNumber": "XX-12345678", "date": "YYYY-MM-DD", "invoiceType": "三聯式/二聯式", "taxId": "8碼", "netAmount": 數字, "tax": 數字, "total": 數字, "items": [{"name": "品名", "quantity": 數量, "unitPrice": 單價, "amount": 小計}]}`;
            const payload = { contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data } }] }], generationConfig: { responseMimeType: "application/json" } };
            
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await response.json();
            return JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text);
        };

        function App() {
            // 安全讀取 LocalStorage
            const [invoices, setInvoices] = useState(() => {
                try {
                    const saved = localStorage.getItem('nextgen_invoices');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    console.error("Failed to parse local storage", e);
                    return [];
                }
            });
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const barChartRef = useRef(null);
            const pieChartRef = useRef(null);
            const barChartInstance = useRef(null);
            const pieChartInstance = useRef(null);
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式', 
                taxRate: 0.05, 
                invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0],
                taxId: '', 
                items: [], 
                netAmount: '', 
                tax: '', 
                total: '',
                status: 'active'
            });

            // 資料自動存檔
            useEffect(() => {
                localStorage.setItem('nextgen_invoices', JSON.stringify(invoices));
            }, [invoices]);

            // --- 儀表板數據處理 ---
            const activeInvoices = useMemo(() => invoices.filter(inv => inv.status !== 'void'), [invoices]);
            const voidCount = invoices.filter(inv => inv.status === 'void').length;
            const totalAmount = activeInvoices.reduce((sum, inv) => sum + (inv.total || 0), 0);
            const totalTax = activeInvoices.reduce((sum, inv) => sum + (inv.tax || 0), 0);

            const chartData = useMemo(() => {
                const itemMap = {};
                activeInvoices.forEach(inv => {
                    if (inv.items) {
                        inv.items.forEach(it => {
                            itemMap[it.name] = (itemMap[it.name] || 0) + (it.amount || 0);
                        });
                    }
                });
                return Object.keys(itemMap)
                    .map(name => ({ name, value: itemMap[name] }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);
            }, [activeInvoices]);

            // 圖表渲染 (加入 null check 防止崩潰)
            useEffect(() => {
                if (activeTab === 'dashboard' && barChartRef.current && chartData.length > 0) {
                    if (barChartInstance.current) barChartInstance.current.destroy();
                    try {
                        barChartInstance.current = new Chart(barChartRef.current, {
                            type: 'bar',
                            data: {
                                labels: chartData.map(d => d.name),
                                datasets: [{ label: '銷售額 ($)', data: chartData.map(d => d.value), backgroundColor: COLORS, borderRadius: 8 }]
                            },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    } catch (e) { console.error("Chart Render Error", e); }
                }
                if (activeTab === 'dashboard' && pieChartRef.current && activeInvoices.length > 0) {
                    if (pieChartInstance.current) pieChartInstance.current.destroy();
                    try {
                        const taxable = activeInvoices.filter(i => i.tax > 0).reduce((s, i) => s + (i.total || 0), 0);
                        const exempt = activeInvoices.filter(i => i.tax === 0).reduce((s, i) => s + (i.total || 0), 0);
                        pieChartInstance.current = new Chart(pieChartRef.current, {
                            type: 'doughnut',
                            data: {
                                labels: ['應稅', '免稅'],
                                datasets: [{ data: [taxable, exempt], backgroundColor: ['#4f46e5', '#10b981'], borderWidth: 0 }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
                        });
                    } catch (e) { console.error("Chart Render Error", e); }
                }
            }, [activeTab, chartData, activeInvoices]);

            // --- 核心操作邏輯 ---
            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

            const recalculateTotalsFromItems = (itemsToCalc, currentType, currentRate) => {
                const sumAmount = itemsToCalc.reduce((acc, item) => acc + (item.amount || 0), 0);
                let newNet = 0; let newTax = 0; let newTotal = 0;
                if (itemsToCalc.length > 0 && sumAmount > 0) {
                    if (currentType === '三聯式') { newNet = sumAmount; newTax = Math.round(sumAmount * currentRate); newTotal = sumAmount + newTax; } 
                    else { newTotal = sumAmount; newNet = Math.round(sumAmount / (1 + currentRate)); newTax = sumAmount - newNet; }
                }
                return { netAmount: newNet, tax: newTax, total: newTotal };
            };

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                const finalValue = type === 'checkbox' ? (checked ? 'void' : 'active') : value;
                let newFormData = { ...formData, [name]: finalValue };
                if (name === 'invoiceNumber') {
                    let formatted = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (formatted.length > 2) formatted = formatted.substring(0, 2) + '-' + formatted.substring(2, 10);
                    newFormData[name] = formatted;
                }
                setFormData(newFormData);
            };

            const addItem = () => {
                const newItem = { id: generateItemId(), name: '', quantity: 1, unitPrice: '', amount: 0 };
                setFormData(prev => ({ ...prev, items: [...prev.items, newItem] }));
            };

            const removeItem = (index) => {
                const newItems = formData.items.filter((_, i) => i !== index);
                const totals = recalculateTotalsFromItems(newItems, formData.invoiceType, formData.taxRate);
                setFormData(prev => ({ ...prev, items: newItems, ...totals }));
            };

            const handleItemChange = (index, field, value) => {
                const newItems = [...formData.items];
                const item = newItems[index];
                if (field === 'quantity' || field === 'unitPrice') {
                    item[field] = value === '' ? '' : parseFloat(value);
                    item.amount = Math.round((parseFloat(item.quantity) || 0) * (parseFloat(item.unitPrice) || 0));
                } else { item[field] = value; }
                const totals = recalculateTotalsFromItems(newItems, formData.invoiceType, formData.taxRate);
                setFormData(prev => ({ ...prev, items: newItems, ...totals }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber) { showToast("請輸入發票號碼", "error"); return; }
                
                const existingInv = invoices.find(inv => inv.invoiceNumber === formData.invoiceNumber);
                let finalInvoice;
                if (existingInv) {
                    const mergedItems = [...(existingInv.items || []), ...formData.items.filter(it => it.name.trim())];
                    const calc = recalculateTotalsFromItems(mergedItems, existingInv.invoiceType, existingInv.taxRate);
                    finalInvoice = { ...existingInv, items: mergedItems, ...calc, status: formData.status, date: formData.date };
                } else {
                    finalInvoice = { ...formData, id: Date.now().toString(), items: formData.items.filter(it => it.name.trim()) };
                }
                
                const updatedList = [finalInvoice, ...invoices.filter(i => i.id !== finalInvoice.id)];
                setInvoices(updatedList);
                showToast("資料已儲存至本地快取。", "success");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: '', tax: '', total: '', status: 'active' });
            };

            const handleDelete = (id) => {
                 setInvoices(invoices.filter(inv => inv.id !== id));
                 showToast("發票已徹底移除。", "info");
            };

            // --- 相機功能 ---
            const openCamera = async () => {
                setIsCameraOpen(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) { 
                    showToast("相機啟動失敗，請檢查權限。", "error"); 
                    setIsCameraOpen(false); 
                }
            };

            const captureAndAnalyze = async () => {
                if (!videoRef.current || !canvasRef.current) return;
                if (!apiKey) { showToast("請先在程式碼中配置 Gemini API Key。", "error"); return; }
                
                setIsAnalyzing(true); showToast("AI 正全力辨識中...", "info");
                const canvas = canvasRef.current;
                const video = videoRef.current;
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const base64Image = canvas.toDataURL('image/png').split(',')[1];
                
                const stream = video.srcObject;
                if (stream) stream.getTracks().forEach(t => t.stop());
                setIsCameraOpen(false);

                try {
                    const data = await callGeminiVision(base64Image);
                    setFormData(prev => ({ ...prev, ...data, items: data.items.map(it => ({ ...it, id: generateItemId() })), status: 'active' }));
                    showToast("辨識成功！請核對資料。", "success");
                } catch (err) { 
                    showToast("辨識過程中發生錯誤。", "error"); 
                } finally { 
                    setIsAnalyzing(false); 
                }
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
                    
                    {/* 相機預覽層 */}
                    {isCameraOpen && (
                        <div className="fixed inset-0 z-[100] camera-overlay flex flex-col items-center justify-center p-4">
                            <video ref={videoRef} autoPlay playsInline className="w-full max-w-lg rounded-3xl shadow-2xl border-4 border-white/10" />
                            <div className="flex gap-4 mt-8">
                                <button onClick={() => {
                                    const stream = videoRef.current.srcObject;
                                    if (stream) stream.getTracks().forEach(t => t.stop());
                                    setIsCameraOpen(false);
                                }} className="bg-white/10 hover:bg-white/20 text-white px-8 py-4 rounded-2xl font-bold transition-all">取消</button>
                                <button onClick={captureAndAnalyze} className="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">拍攝發票</button>
                            </div>
                        </div>
                    )}
                    <canvas ref={canvasRef} className="hidden" />

                    {/* 側邊導航 */}
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col z-10 shadow-xl flex-shrink-0">
                        <div className="p-8 text-center">
                            <h1 className="text-xl font-bold text-white flex items-center justify-center gap-2 tracking-tight">
                                <i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務
                            </h1>
                            <p className="text-[10px] text-slate-500 mt-2 uppercase tracking-widest">穩定本地版 2.0</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-polar text-xl"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square text-xl"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers text-xl"></i> 整合清單</button>
                        </nav>
                        <div className="p-6 mt-auto">
                           <div className="px-4 py-3 rounded-2xl bg-slate-800 border border-slate-700 flex items-center gap-3 text-slate-500">
                                <i className="ph ph-shield-check text-xl text-emerald-500"></i>
                                <span className="text-[10px] font-bold uppercase tracking-widest">物理脫機模式</span>
                           </div>
                        </div>
                    </aside>
                    
                    <main className="flex-1 overflow-y-auto relative pb-24 md:pb-0">
                        {toast && (
                            <div className="fixed top-6 right-6 px-5 py-3 rounded-2xl shadow-2xl bg-white border border-slate-200 z-[110] animate-slide-in flex items-center gap-3">
                                <i className={`ph-fill ${toast.type === 'error' ? 'ph-x-circle text-red-500' : 'ph-check-circle text-emerald-500'} text-xl`}></i>
                                <span className="font-bold text-sm">{toast.message}</span>
                            </div>
                        )}

                        <div className="p-4 md:p-10 max-w-6xl mx-auto">
                            {/* 儀表板 */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 animate-slide-in">
                                    <header>
                                        <h2 className="text-3xl font-black text-slate-800 tracking-tight">戰情儀表板</h2>
                                        <p className="text-slate-500 mt-1 italic text-sm">數據每秒更新一次，已扣除作廢發票</p>
                                    </header>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="text-slate-400 text-[10px] font-bold mb-1 uppercase tracking-widest">有效發票張數</div>
                                            <div className="text-4xl font-black text-slate-800">{activeInvoices.length}</div>
                                        </div>
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="text-slate-400 text-[10px] font-bold mb-1 uppercase tracking-widest">累計稅額 (5%)</div>
                                            <div className="text-4xl font-black text-indigo-600">${totalTax.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white">
                                            <div className="text-indigo-200 text-[10px] font-bold mb-1 uppercase tracking-widest">含稅總額</div>
                                            <div className="text-4xl font-black font-mono">${totalAmount.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-red-50 p-6 rounded-3xl border border-red-100">
                                            <div className="text-red-400 text-[10px] font-bold mb-1 uppercase tracking-widest">本期作廢張數</div>
                                            <div className="text-4xl font-black text-red-600">{voidCount}</div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm h-96">
                                            <h4 className="font-bold text-slate-700 mb-6 flex items-center gap-2"><i className="ph-fill ph-chart-bar text-indigo-500"></i> 熱銷品項營收排行</h4>
                                            {chartData.length > 0 ? (
                                                <div className="h-64"><canvas ref={barChartRef}></canvas></div>
                                            ) : (
                                                <div className="h-64 flex items-center justify-center text-slate-300 italic text-sm">尚無商品數據</div>
                                            )}
                                        </div>
                                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm h-96 text-center">
                                            <h4 className="font-bold text-slate-700 mb-6 flex items-center gap-2 justify-center"><i className="ph-fill ph-chart-donut text-emerald-500"></i> 稅額比例分佈</h4>
                                            {activeInvoices.length > 0 ? (
                                                <div className="h-64"><canvas ref={pieChartRef}></canvas></div>
                                            ) : (
                                                <div className="h-64 flex items-center justify-center text-slate-300 italic text-sm">尚無發票數據</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 錄入頁面 */}
                            {activeTab === 'entry' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header><h2 className="text-3xl font-black text-slate-800">智能錄入系統</h2></header>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-2 bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                                            <form onSubmit={handleSubmit} className="space-y-6">
                                                <div className="flex flex-wrap justify-between items-center bg-slate-50 p-2 rounded-2xl mb-6 border border-slate-100 gap-4">
                                                    <div className="flex gap-2">
                                                        <button type="button" onClick={() => setFormData({...formData, invoiceType: '三聯式'})} className={`px-6 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '三聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>三聯 (B2B)</button>
                                                        <button type="button" onClick={() => setFormData({...formData, invoiceType: '二聯式'})} className={`px-6 py-2 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '二聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>二聯 (B2C)</button>
                                                    </div>
                                                    <label className="flex items-center gap-2 cursor-pointer bg-white px-4 py-2 rounded-xl border border-slate-200">
                                                        <input type="checkbox" name="status" checked={formData.status === 'void'} onChange={handleInputChange} className="w-4 h-4 accent-red-500" />
                                                        <span className="text-xs font-bold text-red-600 uppercase">標記作廢</span>
                                                    </label>
                                                </div>
                                                <div className="grid grid-cols-2 gap-6">
                                                    <div className="space-y-2"><label className="text-xs font-black uppercase text-slate-400 tracking-widest">發票號碼</label><input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-4 py-4 rounded-2xl border border-slate-200 outline-none font-mono uppercase focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="例: AB-12345678" /></div>
                                                    <div className="space-y-2"><label className="text-xs font-black uppercase text-slate-400 tracking-widest">開立日期</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-4 py-4 rounded-2xl border border-slate-200 outline-none" /></div>
                                                </div>
                                                <div className="pt-6 border-t border-slate-100">
                                                    <div className="flex justify-between items-center mb-4"><h3 className="font-black text-indigo-900 flex items-center gap-2"><i className="ph ph-list-plus"></i> 商品品項明細</h3><button type="button" onClick={addItem} className="text-xs font-bold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors">+ 新增品項</button></div>
                                                    <div className="space-y-3 max-h-72 overflow-y-auto no-scrollbar pr-2">
                                                        {formData.items.map((it, i) => (
                                                            <div key={it.id} className="flex gap-3 p-4 bg-slate-50 rounded-2xl relative border border-slate-100 group">
                                                                <input type="text" placeholder="商品名稱" value={it.name} onChange={(e) => handleItemChange(i, 'name', e.target.value)} className="flex-1 bg-transparent border-none text-sm outline-none font-medium" />
                                                                <input type="number" placeholder="數量" value={it.quantity} onChange={(e) => handleItemChange(i, 'quantity', e.target.value)} className="w-16 bg-transparent text-center text-sm outline-none font-mono" />
                                                                <input type="number" placeholder="單價" value={it.unitPrice} onChange={(e) => handleItemChange(i, 'unitPrice', e.target.value)} className="w-24 bg-transparent text-right text-sm outline-none font-mono" />
                                                                <div className="w-24 text-right font-black text-slate-600 text-sm">${(it.amount || 0).toLocaleString()}</div>
                                                                <button type="button" onClick={() => removeItem(i)} className="absolute -top-2 -right-2 bg-white p-1 rounded-full shadow-md text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-x-circle text-xl"></i></button>
                                                            </div>
                                                        ))}
                                                        {formData.items.length === 0 && <div className="py-10 text-center text-slate-300 italic text-sm border-2 border-dashed border-slate-100 rounded-3xl">請開始錄入品項...</div>}
                                                    </div>
                                                </div>
                                                <div className={`p-8 rounded-3xl text-white grid grid-cols-1 md:grid-cols-3 gap-6 shadow-2xl transition-all ${formData.status === 'void' ? 'bg-slate-700' : 'bg-indigo-900 shadow-indigo-200'}`}>
                                                    <div><label className="text-[10px] uppercase font-bold text-indigo-300 tracking-widest">銷售額 (未稅)</label><div className="text-2xl font-black font-mono mt-1">${(formData.netAmount || 0).toLocaleString()}</div></div>
                                                    <div className="md:border-x md:border-indigo-800/50 md:px-6"><label className="text-[10px] uppercase font-bold text-indigo-300 tracking-widest">稅額 (5%)</label><div className="text-2xl font-black font-mono mt-1">${(formData.tax || 0).toLocaleString()}</div></div>
                                                    <div className="md:text-right"><label className="text-[10px] uppercase font-bold text-indigo-300 tracking-widest">總計金額 {formData.status === 'void' && '(作廢)'}</label><div className="text-3xl font-black font-mono mt-1 text-emerald-400">${(formData.total || 0).toLocaleString()}</div></div>
                                                </div>
                                                <div className="flex flex-col md:flex-row gap-4">
                                                    <button type="button" onClick={openCamera} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-5 rounded-2xl flex items-center justify-center gap-3 transition-all"><i className="ph ph-camera text-xl"></i> AI 拍照辨識</button>
                                                    <button type="submit" className={`flex-[2] font-black py-5 rounded-2xl shadow-xl transition-all active:scale-[0.98] text-lg ${formData.status === 'void' ? 'bg-red-600 text-white' : 'bg-indigo-600 text-white'}`}>
                                                        {formData.status === 'void' ? '存檔作廢資訊' : '儲存發票數據'}
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                                <h4 className="font-black text-slate-800 mb-4">系統狀態報告</h4>
                                                <p className="text-xs text-slate-500 leading-relaxed italic">「工程師已經將 Firebase 模組完全隔離，目前系統運行於純本地模式，這將根治啟動白屏的問題。」</p>
                                                <div className="mt-6 p-4 bg-emerald-50 rounded-2xl border border-emerald-100">
                                                    <div className="flex items-center gap-2 text-emerald-700 font-bold text-xs"><i className="ph-fill ph-check-circle"></i> LocalStorage 穩定連線中</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 清單頁面 */}
                            {activeTab === 'list' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                                        <div><h2 className="text-3xl font-black text-slate-800">整合清單</h2><p className="text-slate-500 mt-1">井然有序的發票履歷</p></div>
                                        <button onClick={() => {
                                            const headers = ['號碼', '期別', '狀態', '總額'];
                                            const rows = invoices.map(i => `${i.invoiceNumber},${getInvoicePeriod(i.date)},${i.status},${i.total}`);
                                            const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                                            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
                                            const url = window.URL.createObjectURL(blob);
                                            const a = document.createElement('a'); a.href = url; a.download = '發票財務報表.csv'; a.click();
                                        }} className="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg transition-all active:scale-95"><i className="ph ph-download text-xl"></i> 導出 CSV</button>
                                    </header>
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] border-b">
                                                    <tr><th className="p-6 w-14"></th><th className="p-6">發票號碼</th><th className="p-6">目前狀態</th><th className="p-6 text-right">總額 (含稅)</th><th className="p-6 text-center">操作</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {invoices.map(inv => (
                                                        <Fragment key={inv.id}>
                                                            <tr onClick={() => setExpandedInvoiceId(expandedInvoiceId === inv.id ? null : inv.id)} className={`cursor-pointer transition-all ${inv.status === 'void' ? 'bg-red-50/30' : expandedInvoiceId === inv.id ? 'bg-indigo-50/50' : 'hover:bg-slate-50'}`}>
                                                                <td className="p-6 text-center"><i className={`ph-bold ph-caret-right text-indigo-400 transition-transform ${expandedInvoiceId === inv.id ? 'rotate-90' : ''}`}></i></td>
                                                                <td className={`p-6 font-black font-mono text-lg ${inv.status === 'void' ? 'line-through text-slate-300' : 'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                                <td className="p-6">{inv.status === 'void' ? <span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black">作廢</span> : <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black">正常</span>}</td>
                                                                <td className={`p-6 text-right font-black font-mono text-xl ${inv.status === 'void' ? 'text-slate-300' : 'text-indigo-700'}`}>${(inv.total || 0).toLocaleString()}</td>
                                                                <td className="p-6 text-center"><button onClick={(e) => { e.stopPropagation(); handleDelete(inv.id); }} className="text-slate-300 hover:text-red-500 transition-colors p-2"><i className="ph ph-trash-simple text-2xl"></i></button></td>
                                                            </tr>
                                                            {expandedInvoiceId === inv.id && (
                                                                <tr className="bg-slate-900 animate-slide-in">
                                                                    <td colSpan="5" className="p-8">
                                                                        <div className="rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                                                                            <table className="w-full text-xs text-left text-slate-300">
                                                                                <thead className="bg-slate-800 text-slate-500 font-black uppercase tracking-widest border-b border-slate-700">
                                                                                    <tr><th className="p-4">品項名稱</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr>
                                                                                </thead>
                                                                                <tbody className="divide-y divide-slate-800/50">
                                                                                    {inv.items && inv.items.length > 0 ? inv.items.map((it, idx) => (
                                                                                        <tr key={idx} className="hover:bg-slate-800/30">
                                                                                            <td className="p-4 font-medium">{it.name}</td>
                                                                                            <td className="p-4 text-center font-mono">{it.quantity}</td>
                                                                                            <td className="p-4 text-right font-mono">${(it.unitPrice || 0).toLocaleString()}</td>
                                                                                            <td className="p-4 text-right font-black text-emerald-400 font-mono">${(it.amount || 0).toLocaleString()}</td>
                                                                                        </tr>
                                                                                    )) : <tr><td colSpan="4" className="p-10 text-center text-slate-600">無商品數據</td></tr>}
                                                                                </tbody>
                                                                            </table>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </Fragment>
                                                    ))}
                                                    {invoices.length === 0 && <tr><td colSpan="5" className="p-32 text-center text-slate-300 font-bold italic">目前尚無整合數據</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    
                    {/* 手機導航 */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-4 z-50 pb-safe shadow-2xl">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-chart-polar text-3xl"></i></button>
                        <button onClick={() => setActiveTab('entry')} className={activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-plus-circle text-3xl"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-list-numbers text-3xl"></i></button>
                    </nav>
                </div>
            );
        }

        // 啟動 React
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
