<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor 圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- 引入 React, ReactDOM 與 Chart.js -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 引入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-in-row { animation: fadeInRow 0.2s ease-out forwards; }
        .expand-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .camera-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        video { object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const COLORS = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
        const apiKey = ""; // Gemini API Key 預留位

        // 台灣發票期別邏輯：每兩個月為一期
        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        // API 呼叫結構預留
        const callGeminiVision = async (base64Data) => {
            if (!apiKey) throw new Error("Missing API Key");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `辨識發票內容並回傳 JSON：{"invoiceNumber": "XX-12345678", "date": "YYYY-MM-DD", "invoiceType": "三聯式/二聯式", "taxId": "8碼", "netAmount": 數字, "tax": 數字, "total": 數字, "items": [{"name": "品名", "quantity": 數量, "unitPrice": 單價, "amount": 小計}]}`;
            const payload = { contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data } }] }], generationConfig: { responseMimeType: "application/json" } };
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const result = await response.json();
            return JSON.parse(result.candidates?.[0]?.content?.parts?.[0]?.text);
        };

        function App() {
            // 本地儲存讀取
            const [invoices, setInvoices] = useState(() => {
                try {
                    const saved = localStorage.getItem('nextgen_invoices');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });
            
            const [activeTab, setActiveTab] = useState('dashboard');
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            
            // 篩選器狀態
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterType, setFilterType] = useState('ALL');

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const barChartRef = useRef(null);
            const pieChartRef = useRef(null);
            const barChartInstance = useRef(null);
            const pieChartInstance = useRef(null);
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式', 
                taxRate: 0.05, 
                invoiceNumber: '', 
                date: new Date().toISOString().split('T')[0],
                taxId: '', 
                items: [], 
                netAmount: '', 
                tax: '', 
                total: '',
                status: 'active'
            });

            useEffect(() => {
                localStorage.setItem('nextgen_invoices', JSON.stringify(invoices));
            }, [invoices]);

            // --- 數據處理 ---
            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort().reverse(); // 由新到舊
            }, [invoices]);

            const filteredInvoices = useMemo(() => {
                return invoices.filter(inv => {
                    const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(inv.date) === filterPeriod;
                    const matchType = filterType === 'ALL' || inv.invoiceType === filterType;
                    return matchPeriod && matchType;
                });
            }, [invoices, filterPeriod, filterType]);

            const activeInvoices = useMemo(() => filteredInvoices.filter(inv => inv.status !== 'void'), [filteredInvoices]);
            const voidCount = filteredInvoices.filter(inv => inv.status === 'void').length;
            const totalAmount = activeInvoices.reduce((sum, inv) => sum + (inv.total || 0), 0);
            const totalTax = activeInvoices.reduce((sum, inv) => sum + (inv.tax || 0), 0);

            // 圖表渲染
            useEffect(() => {
                if (activeTab === 'dashboard' && barChartRef.current) {
                    if (barChartInstance.current) barChartInstance.current.destroy();
                    const itemMap = {};
                    activeInvoices.forEach(inv => (inv.items || []).forEach(it => {
                        itemMap[it.name] = (itemMap[it.name] || 0) + (it.amount || 0);
                    }));
                    const chartData = Object.keys(itemMap).map(n => ({ n, v: itemMap[n] })).sort((a,b) => b.v - a.v).slice(0, 5);
                    
                    if (chartData.length > 0) {
                        barChartInstance.current = new Chart(barChartRef.current, {
                            type: 'bar',
                            data: { labels: chartData.map(d=>d.n), datasets: [{ data: chartData.map(d=>d.v), backgroundColor: COLORS, borderRadius: 8 }] },
                            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                        });
                    }
                }
            }, [activeTab, activeInvoices]);

            // --- 核心操作 ---
            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

            const addItem = () => {
                setFormData(prev => ({ ...prev, items: [...prev.items, { id: generateItemId(), name: '', quantity: 1, unitPrice: '', amount: 0 }] }));
            };

            const removeItem = (idx) => {
                const newItems = formData.items.filter((_, i) => i !== idx);
                setFormData(prev => ({ ...prev, items: newItems }));
            };

            const handleItemChange = (idx, field, val) => {
                const newItems = [...formData.items];
                const item = newItems[idx];
                item[field] = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    item.amount = Math.round((parseFloat(item.quantity) || 0) * (parseFloat(item.unitPrice) || 0));
                }
                const sum = newItems.reduce((acc, it) => acc + (it.amount || 0), 0);
                const tax = Math.round(sum * 0.05);
                setFormData(prev => ({ ...prev, items: newItems, netAmount: sum, tax: tax, total: sum + tax }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber) return showToast("請輸入發票號碼", "error");
                const newInvoices = [ { ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber) ];
                setInvoices(newInvoices);
                showToast("存檔成功！", "success");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            const handleDelete = (id) => {
                setInvoices(invoices.filter(i => i.id !== id));
                showToast("已徹底刪除", "info");
            };

            // --- 智慧匯出功能 ---
            const exportData = () => {
                if (filteredInvoices.length === 0) return showToast("目前選取條件下無資料", "error");
                
                const headers = ['狀態', '期別', '類型', '號碼', '日期', '統編', '銷售額', '稅額', '總計'];
                const rows = filteredInvoices.map(i => [
                    i.status === 'void' ? '作廢' : '正常',
                    getInvoicePeriod(i.date),
                    i.invoiceType,
                    i.invoiceNumber,
                    i.date,
                    i.taxId || '-',
                    i.netAmount,
                    i.tax,
                    i.total
                ].join(','));
                
                const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                // 檔名智慧化
                const periodLabel = filterPeriod === 'ALL' ? '全期別' : filterPeriod;
                const typeLabel = filterType === 'ALL' ? '全類型' : filterType;
                
                a.href = url;
                a.download = `發票報表_${periodLabel}_${typeLabel}.csv`;
                a.click();
                showToast("報表匯出成功！", "success");
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden relative">
                    
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col shadow-xl flex-shrink-0">
                        <div className="p-8 text-center border-b border-slate-800">
                            <h1 className="text-xl font-black text-white flex items-center justify-center gap-2">
                                <i className="ph-fill ph-lightning text-emerald-400"></i> NextGen 財務
                            </h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-polar"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-square"></i> 智能錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-list-numbers"></i> 整合清單</button>
                        </nav>
                    </aside>
                    
                    <main className="flex-1 overflow-y-auto relative pb-24 md:pb-0">
                        {toast && (
                            <div className="fixed top-6 right-6 px-5 py-3 rounded-2xl shadow-2xl bg-white border border-slate-200 z-[110] animate-slide-in flex items-center gap-3 font-bold">
                                {toast.message}
                            </div>
                        )}

                        <div className="p-4 md:p-10 max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 animate-slide-in">
                                    <header><h2 className="text-3xl font-black tracking-tight">戰情儀表板</h2></header>
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">張數</div>
                                            <div className="text-4xl font-black">{activeInvoices.length}</div>
                                        </div>
                                        <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white">
                                            <div className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">含稅總計</div>
                                            <div className="text-4xl font-black font-mono">${totalAmount.toLocaleString()}</div>
                                        </div>
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <div className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">作廢</div>
                                            <div className="text-4xl font-black text-red-500">{voidCount}</div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm h-80">
                                        <h4 className="font-bold mb-6">熱銷品項 (Top 5)</h4>
                                        <div className="h-48"><canvas ref={barChartRef}></canvas></div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'entry' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header><h2 className="text-3xl font-black tracking-tight">發票錄入</h2></header>
                                    <div className="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                                        <form onSubmit={handleSubmit} className="space-y-6">
                                            <div className="flex justify-between items-center bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                                <div className="flex gap-2">
                                                    <button type="button" onClick={() => setFormData({...formData, invoiceType: '三聯式'})} className={`px-6 py-1.5 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '三聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>三聯</button>
                                                    <button type="button" onClick={() => setFormData({...formData, invoiceType: '二聯式'})} className={`px-6 py-1.5 rounded-xl text-xs font-bold transition-all ${formData.invoiceType === '二聯式' ? 'bg-white shadow-md text-indigo-700' : 'text-slate-400'}`}>二聯</button>
                                                </div>
                                                <label className="flex items-center gap-2 cursor-pointer mr-2">
                                                    <input type="checkbox" checked={formData.status === 'void'} onChange={e => setFormData({...formData, status: e.target.checked ? 'void' : 'active'})} className="accent-red-500" />
                                                    <span className="text-[10px] font-bold text-red-600">標記作廢</span>
                                                </label>
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="space-y-2"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">號碼</label><input type="text" value={formData.invoiceNumber} onChange={e => setFormData({...formData, invoiceNumber: e.target.value.toUpperCase()})} className="w-full px-4 py-3 rounded-2xl border border-slate-200 outline-none font-mono" placeholder="XX-12345678" /></div>
                                                <div className="space-y-2"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">日期</label><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full px-4 py-3 rounded-2xl border border-slate-200 outline-none" /></div>
                                            </div>
                                            <div className="pt-6 border-t border-slate-100">
                                                <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-indigo-900">明細</h3><button type="button" onClick={addItem} className="text-xs font-bold text-indigo-600">+ 新成品項</button></div>
                                                <div className="space-y-3">
                                                    {formData.items.map((it, i) => (
                                                        <div key={it.id} className="flex gap-3 p-4 bg-slate-50 rounded-2xl relative group">
                                                            <input type="text" placeholder="品名" value={it.name} onChange={e => handleItemChange(i, 'name', e.target.value)} className="flex-1 bg-transparent outline-none text-sm font-bold" />
                                                            <input type="number" placeholder="數量" value={it.quantity} onChange={e => handleItemChange(i, 'quantity', e.target.value)} className="w-16 bg-transparent text-center text-sm outline-none" />
                                                            <input type="number" placeholder="單價" value={it.unitPrice} onChange={e => handleItemChange(i, 'unitPrice', e.target.value)} className="w-20 bg-transparent text-right text-sm outline-none" />
                                                            <div className="w-24 text-right font-black text-slate-600 text-sm">${(it.amount || 0).toLocaleString()}</div>
                                                            <button type="button" onClick={() => removeItem(i)} className="absolute -top-2 -right-2 bg-white p-1 rounded-full shadow-md text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i className="ph ph-x-circle text-xl"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className={`p-6 rounded-3xl text-white flex justify-between items-center shadow-lg ${formData.status === 'void' ? 'bg-slate-700' : 'bg-indigo-900 shadow-indigo-200'}`}>
                                                <div><div className="text-[10px] uppercase font-bold text-indigo-300">未稅總額</div><div className="text-xl font-mono">${(formData.netAmount || 0).toLocaleString()}</div></div>
                                                <div className="text-right"><div className="text-[10px] uppercase font-bold text-indigo-300">含稅總計</div><div className="text-3xl font-black font-mono text-emerald-400">${(formData.total || 0).toLocaleString()}</div></div>
                                            </div>
                                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-[0.98]">儲存發票</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'list' && (
                                <div className="space-y-6 animate-slide-in">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                        <div><h2 className="text-3xl font-black tracking-tight">整合清單</h2><p className="text-slate-500 mt-1 italic text-xs">可針對篩選條件進行匯出</p></div>
                                        
                                        {/* 篩選與匯出區 */}
                                        <div className="flex flex-wrap gap-4 w-full md:w-auto">
                                            <div className="bg-white border px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm">
                                                <i className="ph ph-calendar-blank text-slate-400"></i>
                                                <select value={filterPeriod} onChange={e => setFilterPeriod(e.target.value)} className="text-xs font-bold outline-none bg-transparent">
                                                    <option value="ALL">全部期別</option>
                                                    {availablePeriods.map(p => <option key={p} value={p}>{p}</option>)}
                                                </select>
                                            </div>
                                            <div className="bg-white border px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm">
                                                <i className="ph ph-funnel text-slate-400"></i>
                                                <select value={filterType} onChange={e => setFilterType(e.target.value)} className="text-xs font-bold outline-none bg-transparent">
                                                    <option value="ALL">全部類型</option>
                                                    <option value="三聯式">三聯式</option>
                                                    <option value="二聯式">二聯式</option>
                                                </select>
                                            </div>
                                            <button onClick={exportData} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl font-black flex items-center gap-2 shadow-md transition-all active:scale-95 text-xs">
                                                <i className="ph ph-download"></i> 導出 CSV
                                            </button>
                                        </div>
                                    </header>
                                    
                                    <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                                    <tr><th className="p-6 w-14"></th><th className="p-6">發票號碼</th><th className="p-6 text-center">狀態</th><th className="p-6 text-right font-black text-indigo-600">總額 (含稅)</th><th className="p-6 text-center">操作</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredInvoices.map(inv => (
                                                        <Fragment key={inv.id}>
                                                            <tr onClick={() => setExpandedInvoiceId(expandedInvoiceId === inv.id ? null : inv.id)} className={`cursor-pointer transition-all ${inv.status === 'void' ? 'bg-red-50/20' : 'hover:bg-slate-50'}`}>
                                                                <td className="p-6 text-center"><i className={`ph-bold ph-caret-right text-indigo-400 transition-transform ${expandedInvoiceId === inv.id ? 'rotate-90' : ''}`}></i></td>
                                                                <td className={`p-6 font-black font-mono text-lg ${inv.status === 'void' ? 'line-through text-slate-300' : 'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                                <td className="p-6 text-center">{inv.status === 'void' ? <span className="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black">作廢</span> : <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black">正常</span>}</td>
                                                                <td className={`p-6 text-right font-black font-mono text-xl ${inv.status === 'void' ? 'text-slate-300' : 'text-indigo-700'}`}>${(inv.total || 0).toLocaleString()}</td>
                                                                <td className="p-6 text-center"><button onClick={(e) => { e.stopPropagation(); handleDelete(inv.id); }} className="text-slate-300 hover:text-red-500 transition-colors p-2"><i className="ph ph-trash-simple text-2xl"></i></button></td>
                                                            </tr>
                                                            {expandedInvoiceId === inv.id && (
                                                                <tr className="bg-slate-900 animate-slide-in">
                                                                    <td colSpan="5" className="p-8">
                                                                        <div className="rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                                                                            <table className="w-full text-xs text-left text-slate-300">
                                                                                <thead className="bg-slate-800 text-slate-500 font-black uppercase tracking-widest border-b border-slate-700">
                                                                                    <tr><th className="p-4">品項名稱</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr>
                                                                                </thead>
                                                                                <tbody className="divide-y divide-slate-800/50">
                                                                                    {(inv.items || []).map((it, idx) => (
                                                                                        <tr key={idx} className="hover:bg-slate-800/30">
                                                                                            <td className="p-4 font-medium">{it.name}</td>
                                                                                            <td className="p-4 text-center font-mono">{it.quantity}</td>
                                                                                            <td className="p-4 text-right font-mono">${(it.unitPrice || 0).toLocaleString()}</td>
                                                                                            <td className="p-4 text-right font-black text-emerald-400 font-mono">${(it.amount || 0).toLocaleString()}</td>
                                                                                        </tr>
                                                                                    ))}
                                                                                </tbody>
                                                                            </table>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </Fragment>
                                                    ))}
                                                    {filteredInvoices.length === 0 && <tr><td colSpan="5" className="p-32 text-center text-slate-300 font-bold italic">查無符合篩選條件的發票</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-chart-polar text-3xl"></i></button>
                        <button onClick={() => setActiveTab('entry')} className={activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-plus-circle text-3xl"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-400'}><i className="ph-fill ph-list-numbers text-3xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
