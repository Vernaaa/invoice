<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, Fragment } = React;

        const SUPABASE_URL = 'https://bzdwlfodbkyiougsqeve.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_f7RuOJ8xRT8qXNIjwP5wlw_pRTFKN3b';
        const supabase = Object.assign(window['supabase']).createClient(SUPABASE_URL, SUPABASE_KEY);

        const COLORS = { 
            primary: '#4f46e5', 
            success: '#10b981', 
            warning: '#f59e0b', 
            danger: '#ef4444', 
            accent: '#8b5cf6',
            chart: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
        };

        const getInvoicePeriod = (dateString) => {
            if (!dateString || dateString === "undefined" || dateString === "NaN") return '期別未知';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return '日期格式錯誤';
            const periodStart = (date.getMonth() + 1) % 2 === 0 ? date.getMonth() : date.getMonth() + 1;
            return `${date.getFullYear()}年 ${String(periodStart).padStart(2, '0')}-${String(periodStart + 1).padStart(2, '0')}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        const parseCSVLine = (text) => {
            const result = [];
            let current = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        current += '"'; i++; 
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = "";
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        };

        function App() {
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices_supabase');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [activeTab, setActiveTab] = useState('help');
            const [toast, setToast] = useState(null);
            const [expandedInvoiceId, setExpandedInvoiceId] = useState(null);
            const [syncStatus, setSyncStatus] = useState('idle');
            
            // 核心篩選狀態：進銷項、期別、發票類型 (保留所有更新版本)
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterType, setFilterType] = useState('ALL');
            const [filterTrans, setFilterTrans] = useState('ALL');

            const chartRefs = { bar: useRef(null), line: useRef(null), doughnut: useRef(null) };
            const chartInstances = useRef({});

            const [formData, setFormData] = useState({
                transactionType: '銷項',
                invoiceType: '三聯式', 
                taxType: 'taxable', 
                invoiceNumber: '', 
                vendorName: '', 
                date: new Date().toISOString().split('T')[0], 
                taxId: '', 
                items: [], 
                netAmount: 0, 
                tax: 0, 
                total: 0, 
                status: 'active'
            });

            useEffect(() => {
                localStorage.setItem('nextgen_invoices_supabase', JSON.stringify(invoices));
            }, [invoices]);

            useEffect(() => {
                const performSync = async () => {
                    if (invoices.length === 0) return;
                    setSyncStatus('syncing');
                    const syncData = invoices.map(inv => ({
                        id: inv.invoiceNumber,
                        data: { ...inv, items: inv.items || [] },
                        updated_at: new Date()
                    }));
                    const { error } = await supabase.from('invoices').upsert(syncData);
                    if (error) setSyncStatus('error');
                    else {
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus('idle'), 2000);
                    }
                };
                const timer = setTimeout(performSync, 1500);
                return () => clearTimeout(timer);
            }, [invoices]);

            useEffect(() => {
                if (activeTab === 'dashboard') {
                    Object.values(chartInstances.current).forEach(c => c?.destroy());
                    const activeInvoices = invoices.filter(i => i.status !== 'void');
                    if (chartRefs.line.current) {
                        const salesMap = {};
                        const purchaseMap = {};
                        [...activeInvoices].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(inv => {
                            const month = inv.date.substring(0, 7);
                            if (inv.transactionType === '進項') {
                                purchaseMap[month] = (purchaseMap[month] || 0) + (inv.total || 0);
                            } else {
                                salesMap[month] = (salesMap[month] || 0) + (inv.total || 0);
                            }
                        });
                        const labels = [...new Set([...Object.keys(salesMap), ...Object.keys(purchaseMap)])].sort();
                        chartInstances.current.line = new Chart(chartRefs.line.current, {
                            type: 'line',
                            data: { 
                                labels, 
                                datasets: [
                                    { label: '銷項總額', data: labels.map(l => salesMap[l] || 0), borderColor: COLORS.primary, tension: 0.4 },
                                    { label: '進項總額', data: labels.map(l => purchaseMap[l] || 0), borderColor: COLORS.danger, tension: 0.4 }
                                ] 
                            },
                            options: { responsive: true, maintainAspectRatio: false }
                        });
                    }
                }
            }, [activeTab, invoices]);

            const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 3000); };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let val = value;
                if (name === 'invoiceNumber') {
                    val = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (val.length > 2) val = val.substring(0, 2) + '-' + val.substring(2, 10);
                }
                if (name === 'taxId') val = value.replace(/[^0-9]/g, '').substring(0, 8);
                const next = { ...formData, [name]: val };
                if (name === 'taxType') {
                    const tax = val === 'taxable' ? Math.round(next.netAmount * 0.05) : 0;
                    setFormData({ ...next, tax, total: next.netAmount + tax });
                } else setFormData(next);
            };

            const handleItemChange = (idx, field, val) => {
                const items = [...formData.items];
                let processedVal = val;
                if (field === 'quantity' || field === 'unitPrice') {
                    processedVal = val.replace(/[^0-9.]/g, ''); 
                    if (processedVal !== "" && parseFloat(processedVal) < 0) processedVal = "0";
                }
                items[idx][field] = processedVal;
                if (field === 'quantity' || field === 'unitPrice') {
                    items[idx].amount = Math.round((parseFloat(items[idx].quantity) || 0) * (parseFloat(items[idx].unitPrice) || 0));
                }
                const netAmount = items.reduce((s, it) => s + (it.amount || 0), 0);
                const tax = formData.taxType === 'taxable' ? Math.round(netAmount * 0.05) : 0;
                setFormData({ ...formData, items, netAmount, tax, total: netAmount + tax });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) return showToast("發票格式錯誤 (AA-12345678)");
                setInvoices([{ ...formData, id: Date.now().toString() }, ...invoices.filter(i => i.invoiceNumber !== formData.invoiceNumber)]);
                showToast("數據存檔成功並同步至雲端");
                setFormData({ ...formData, invoiceNumber: '', taxId: '', vendorName: '', items: [], netAmount: 0, tax: 0, total: 0 });
            };

            const handleFormKeyDown = (e) => {
                if (e.key === 'Enter') e.preventDefault();
            };

            const exportCSV = () => {
                const filtered = invoices.filter(i => {
                    const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(i.date) === filterPeriod;
                    const matchType = filterType === 'ALL' || i.invoiceType === filterType;
                    const matchTrans = filterTrans === 'ALL' || i.transactionType === filterTrans;
                    return matchPeriod && matchType && matchTrans;
                });
                const headers = ['狀態', '類型', '發票類型', '期別', '稅別', '發票號碼', '對方公司', '開立日期', '統編', '銷售額', '稅額', '總計', '品項', '規格', '數量', '單價', '小計'];
                const csvRows = [headers.join(',')];
                filtered.forEach(inv => {
                    const base = [
                        `"${inv.status==='void'?'作廢':'正常'}"`, 
                        `"${inv.transactionType || '銷項'}"`,
                        `"${inv.invoiceType}"`, 
                        `"${getInvoicePeriod(inv.date)}"`, 
                        `"${inv.taxType==='taxable'?'應稅':'免稅'}"`, 
                        `"${inv.invoiceNumber}"`, 
                        `"${(inv.vendorName || '').replace(/"/g, '""')}"`,
                        `"${inv.date}"`, 
                        `"${inv.taxId||''}"`, 
                        inv.netAmount, inv.tax, inv.total
                    ];
                    if (inv.items && inv.items.length > 0) {
                        inv.items.forEach(it => {
                            csvRows.push([...base, `"${(it.name||'').replace(/"/g,'""')}"`, `"${(it.specs||'').replace(/"/g,'""')}"`, it.quantity, it.unitPrice, it.amount].join(','));
                        });
                    } else { csvRows.push([...base, '""', '""', 0, 0, 0].join(',')); }
                });
                const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `進銷項明細全導出.csv`; a.click();
            };

            const importCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                        const headers = parseCSVLine(lines[0]);
                        
                        if (headers.includes('id') && headers.includes('data')) {
                            const dataIdx = headers.indexOf('data');
                            const imported = lines.slice(1).map(l => {
                                const cols = parseCSVLine(l);
                                return cols[dataIdx] ? JSON.parse(cols[dataIdx]) : null;
                            }).filter(i => i);
                            setInvoices(imported);
                            showToast("資料庫原始檔導入成功");
                            return;
                        }

                        const invoiceMap = new Map();
                        for (let i = 1; i < lines.length; i++) {
                            const cols = parseCSVLine(lines[i]);
                            if (cols.length < 10) continue;
                            const invNum = cols[5];
                            if (!invoiceMap.has(invNum)) {
                                invoiceMap.set(invNum, {
                                    status: cols[0] === '作廢' ? 'void' : 'active',
                                    transactionType: cols[1],
                                    invoiceType: cols[2],
                                    taxType: cols[4] === '應稅' ? 'taxable' : 'exempt',
                                    invoiceNumber: invNum,
                                    vendorName: cols[6],
                                    date: cols[7],
                                    taxId: cols[8],
                                    netAmount: parseFloat(cols[9]) || 0,
                                    tax: parseFloat(cols[10]) || 0,
                                    total: parseFloat(cols[11]) || 0,
                                    items: [],
                                    id: Date.now().toString() + i
                                });
                            }
                            const inv = invoiceMap.get(invNum);
                            if (cols[12]) {
                                inv.items.push({ id: generateItemId() + i, name: cols[12], specs: cols[13], quantity: parseFloat(cols[14])||0, unitPrice: parseFloat(cols[15])||0, amount: parseFloat(cols[16])||0 });
                            }
                        }
                        setInvoices(Array.from(invoiceMap.values()));
                        showToast("報表數據還原成功");
                    } catch (err) { showToast("解析失敗", "error"); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort().reverse(); 
            }, [invoices]);

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 overflow-hidden relative">
                    <aside className="hidden md:flex w-72 bg-slate-900 text-slate-300 flex-col shadow-2xl flex-shrink-0">
                        <div className="p-8 border-b border-slate-800 text-center">
                            <h1 className="text-xl font-black text-white italic tracking-tighter">NEXTGEN FINANCE</h1>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-8 font-bold text-sm">
                            <button onClick={() => setActiveTab('help')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'help' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-info"></i> 使用指南</button>
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-chart-pie"></i> 戰情儀表板</button>
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'entry' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-plus-circle"></i> 進銷項錄入</button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all ${activeTab === 'list' ? 'bg-indigo-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}><i className="ph ph-list-dashes"></i> 整合明細清單</button>
                        </nav>
                        <div className="p-6 mt-auto border-t border-slate-800">
                            <div className="bg-slate-800 rounded-2xl p-4 flex items-center justify-center gap-2">
                                <div className={`w-2.5 h-2.5 rounded-full ${syncStatus === 'syncing' ? 'bg-amber-400 animate-pulse' : syncStatus === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                                <span className="text-[10px] font-bold text-slate-400">SUPABASE SECURE</span>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-4 md:p-10 relative pb-24 md:pb-10">
                        {toast && <div className="fixed top-6 right-6 px-6 py-3 rounded-2xl shadow-2xl bg-white border-l-8 border-indigo-600 z-[110] animate-slide-in font-bold">{toast}</div>}

                        {activeTab === 'help' && (
                            <div className="max-w-4xl mx-auto space-y-8 animate-slide-in">
                                <header className="bg-indigo-900 p-12 rounded-[3.5rem] text-white shadow-2xl text-center">
                                    <h2 className="text-4xl font-black mb-4">進銷項管理系統 3.0</h2>
                                    <p className="text-indigo-200 text-lg font-medium italic">「三位一體篩選引擎，實現極致財務洞察。」</p>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm"><h4 className="font-black text-indigo-700 mb-3 flex items-center gap-2"><i className="ph ph-funnel text-2xl"></i> 全方位篩選中心</h4><p className="text-sm text-slate-500 leading-relaxed font-medium">整合清單現在具備「收支、期別、格式」三大篩選器，讓您在數千筆資料中瞬間定位關鍵發票。</p></div>
                                    <div className="bg-white p-8 rounded-[2rem] border shadow-sm"><h4 className="font-black text-emerald-700 mb-3 flex items-center gap-2"><i className="ph ph-file-csv text-2xl"></i> 資料永續完整性</h4><p className="text-sm text-slate-500 leading-relaxed font-medium">導出與還原引擎已全面適配所有維度，確保數據在不同平台間轉換時，屬性資訊不發生遺失。</p></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-slide-in">
                                <h2 className="text-4xl font-black text-slate-900 italic underline decoration-indigo-500">戰情儀表板</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-xs font-bold text-slate-400">銷項總計 (營收)</div><div className="text-4xl font-black mt-1 text-indigo-600">${invoices.filter(i=>i.transactionType!=='進項'&&i.status!=='void').reduce((s,i)=>s+(i.total||0),0).toLocaleString()}</div></div>
                                    <div className="bg-white p-6 rounded-3xl border shadow-sm"><div className="text-xs font-bold text-slate-400">進項總計 (成本)</div><div className="text-4xl font-black mt-1 text-red-500">${invoices.filter(i=>i.transactionType==='進項'&&i.status!=='void').reduce((s,i)=>s+(i.total||0),0).toLocaleString()}</div></div>
                                    <div className="bg-slate-900 p-6 rounded-3xl shadow-xl text-white"><div className="text-xs font-bold text-slate-400 uppercase">淨營業稅額</div><div className="text-4xl font-black mt-1 text-emerald-400">${(invoices.filter(i=>i.transactionType!=='進項'&&i.status!=='void').reduce((s,i)=>s+(i.tax||0),0) - invoices.filter(i=>i.transactionType==='進項'&&i.status!=='void').reduce((s,i)=>s+(i.tax||0),0)).toLocaleString()}</div></div>
                                </div>
                                <div className="bg-white p-10 rounded-[3rem] border shadow-sm h-96"><h4 className="font-black text-slate-800 text-lg mb-4">收支對比趨勢圖</h4><div className="h-72"><canvas ref={chartRefs.line}></canvas></div></div>
                            </div>
                        )}

                        {activeTab === 'entry' && (
                            <div className="max-w-4xl mx-auto animate-slide-in">
                                <div className="bg-white rounded-[3rem] border p-12 shadow-sm">
                                    <form onSubmit={handleSubmit} onKeyDown={handleFormKeyDown} className="space-y-10">
                                        <div className="flex flex-wrap justify-between items-center gap-6 pb-6 border-b">
                                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                                <button type="button" onClick={()=>setFormData({...formData, transactionType:'銷項'})} className={`px-10 py-3 rounded-xl font-black text-sm transition-all ${formData.transactionType==='銷項'?'bg-white text-indigo-700 shadow-md':'text-slate-400'}`}>銷項 (營收)</button>
                                                <button type="button" onClick={()=>setFormData({...formData, transactionType:'進項'})} className={`px-10 py-3 rounded-xl font-black text-sm transition-all ${formData.transactionType==='進項'?'bg-white text-red-600 shadow-md':'text-slate-400'}`}>進項 (採購)</button>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                                    <button type="button" onClick={()=>setFormData({...formData, invoiceType:'三聯式'})} className={`px-6 py-3 rounded-xl text-xs font-bold transition-all ${formData.invoiceType==='三聯式'?'bg-white text-indigo-700 shadow-sm':'text-slate-400'}`}>三聯</button>
                                                    <button type="button" onClick={()=>setFormData({...formData, invoiceType:'二聯式'})} className={`px-6 py-3 rounded-xl text-xs font-bold transition-all ${formData.invoiceType==='二聯式'?'bg-white text-indigo-700 shadow-sm':'text-slate-400'}`}>二聯</button>
                                                </div>
                                                <label className="flex items-center gap-2 cursor-pointer text-red-600 text-xs font-black uppercase"><input type="checkbox" checked={formData.status==='void'} onChange={e=>setFormData({...formData, status:e.target.checked?'void':'active'})} className="accent-red-500 w-4 h-4" /> 作廢</label>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">發票號碼</label><input type="text" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border font-mono text-xl outline-none focus:border-indigo-500 transition-colors" placeholder="AA-12345678" /></div>
                                            <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">日期</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border outline-none focus:border-indigo-500 transition-colors" /></div>
                                            {formData.invoiceType === '三聯式' && <div className="space-y-1"><label className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">統編 (8碼)</label><input type="text" name="taxId" value={formData.taxId} onChange={handleInputChange} maxLength={8} className="w-full px-5 py-4 rounded-2xl border bg-indigo-50/20 font-mono outline-none focus:border-indigo-500 transition-colors" /></div>}
                                            {formData.transactionType === '進項' && <div className="md:col-span-2 lg:col-span-3 space-y-1"><label className="text-[10px] font-black text-red-500 uppercase tracking-widest">對方公司名稱 (供應商)</label><input type="text" name="vendorName" value={formData.vendorName} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl border bg-red-50/10 font-bold outline-none focus:border-red-500 transition-colors" placeholder="例：鼎新電腦股份有限公司" /></div>}
                                        </div>

                                        <div className="pt-8 border-t border-slate-100">
                                            <div className="flex justify-between items-center mb-6"><h3 className="font-black text-lg">品項明細紀錄</h3><button type="button" onClick={()=>setFormData(p=>({...p, items:[...p.items, {id:generateItemId(), name:'', specs:'', quantity:1, unitPrice:'', amount:0}]}))} className="bg-indigo-50 text-indigo-700 px-6 py-2 rounded-xl text-xs font-black hover:bg-indigo-100 transition-all">+ 新增明細</button></div>
                                            <div className="space-y-4">
                                                {formData.items.map((it, i) => (
                                                    <div key={it.id} className="flex flex-col md:flex-row gap-4 p-6 bg-slate-50 rounded-[2rem] border relative group transition-all hover:bg-white hover:shadow-xl">
                                                        <div className="flex-1 flex flex-col gap-3">
                                                            <input type="text" placeholder="品名內容" value={it.name} onChange={e=>handleItemChange(i, 'name', e.target.value)} className="bg-transparent text-sm font-black outline-none border-b border-transparent focus:border-indigo-500" />
                                                            <input type="text" placeholder="規格描述" value={it.specs} onChange={e=>handleItemChange(i, 'specs', e.target.value)} className="bg-transparent text-[10px] text-slate-400 outline-none italic font-bold" />
                                                        </div>
                                                        <div className="flex gap-6 items-end">
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 font-black mb-1">數量</label><input type="number" onKeyDown={(e)=>["-","e","+"].includes(e.key)&&e.preventDefault()} value={it.quantity} onChange={e=>handleItemChange(i, 'quantity', e.target.value)} className="w-20 py-2 px-3 text-center text-sm rounded-xl border bg-white font-mono" /></div>
                                                            <div className="flex flex-col"><label className="text-[8px] text-slate-400 font-black mb-1">單價</label><input type="number" onKeyDown={(e)=>["-","e","+"].includes(e.key)&&e.preventDefault()} value={it.unitPrice} onChange={e=>handleItemChange(i, 'unitPrice', e.target.value)} className="w-28 py-2 px-3 text-right text-sm rounded-xl border bg-white font-mono" /></div>
                                                            <div className="flex flex-col items-end"><label className="text-[8px] text-slate-400 font-black mb-1">小計</label><div className="w-28 text-right font-black text-indigo-600 text-lg py-1 font-mono">${(it.amount||0).toLocaleString()}</div></div>
                                                        </div>
                                                        <button type="button" onClick={()=>{const items=formData.items.filter((_,idx)=>idx!==i); setFormData({...formData, items});}} className="absolute -top-2 -right-2 bg-white rounded-full shadow-lg text-red-500 opacity-0 group-hover:opacity-100 transition-all"><i className="ph-fill ph-x-circle text-2xl"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className={`p-10 rounded-[3rem] text-white shadow-2xl transition-all ${formData.status==='void'?'bg-slate-700':formData.transactionType==='進項'?'bg-red-900':'bg-indigo-900'}`}>
                                            <div className="flex flex-col md:flex-row justify-between items-center gap-12 font-black">
                                                <div className="flex gap-12">
                                                    <div><div className="text-[10px] uppercase text-indigo-300 mb-3 tracking-widest">銷售淨額 (未稅)</div><div className="text-3xl font-mono">${(formData.netAmount||0).toLocaleString()}</div></div>
                                                    <div className="border-l border-white/10 pl-12">
                                                        <div className="flex items-center gap-4 mb-3"><span className="text-[10px] text-indigo-300 uppercase">稅別</span>
                                                            <div className="flex p-0.5 bg-white/10 rounded-lg"><button type="button" onClick={()=>handleInputChange({target:{name:'taxType',value:'taxable'}})} className={`px-4 py-1 rounded-md text-[10px] ${formData.taxType==='taxable'?'bg-indigo-500 text-white':'text-indigo-200'}`}>應稅</button><button type="button" onClick={()=>handleInputChange({target:{name:'taxType',value:'exempt'}})} className={`px-4 py-1 rounded-md text-[10px] ${formData.taxType==='exempt'?'bg-indigo-500 text-white':'text-indigo-200'}`}>免稅</button></div>
                                                        </div>
                                                        <div className="text-3xl font-mono">${(formData.tax||0).toLocaleString()}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right md:border-l md:border-white/10 md:pl-12"><div className="text-[10px] uppercase text-indigo-300 mb-3 tracking-widest">交易總額 (含稅)</div><div className="text-6xl text-emerald-400 font-mono tracking-tighter italic underline decoration-white/20">${(formData.total||0).toLocaleString()}</div></div>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 py-7 rounded-[2rem] font-black text-white text-2xl shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-4"><i className="ph-fill ph-check-square"></i> 確認儲存並同步雲端</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-6 animate-slide-in">
                                <header className="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                                    <div><h2 className="text-3xl font-black text-slate-800 tracking-tight italic">發票整合清單</h2></div>
                                    <div className="flex flex-wrap gap-4 w-full md:w-auto">
                                        <label className="bg-white border-2 border-dashed border-indigo-200 text-indigo-600 px-6 py-2.5 rounded-2xl font-black flex items-center gap-2 shadow-sm text-xs cursor-pointer hover:bg-indigo-50 transition-all"><i className="ph ph-upload"></i> 從 CSV 還原<input type="file" accept=".csv" onChange={importCSV} className="hidden" /></label>
                                        
                                        {/* 篩選器 1：進項/銷項 */}
                                        <div className="bg-white border px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm text-xs font-bold border-slate-200">
                                            <i className="ph ph-swap text-indigo-500"></i>
                                            <select value={filterTrans} onChange={e=>setFilterTrans(e.target.value)} className="outline-none bg-transparent">
                                                <option value="ALL">全部收支</option>
                                                <option value="銷項">僅看銷項 (營收)</option>
                                                <option value="進項">僅看進項 (成本)</option>
                                            </select>
                                        </div>

                                        {/* 篩選器 2：月份期別 */}
                                        <div className="bg-white border px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm text-xs font-bold border-slate-200">
                                            <i className="ph ph-calendar text-indigo-500"></i>
                                            <select value={filterPeriod} onChange={e=>setFilterPeriod(e.target.value)} className="outline-none bg-transparent">
                                                <option value="ALL">全部期別</option>
                                                {availablePeriods.map(p=><option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>

                                        {/* 篩選器 3：二聯/三聯 (已復位並強化) */}
                                        <div className="bg-white border px-4 py-2 rounded-2xl flex items-center gap-2 shadow-sm text-xs font-bold border-slate-200">
                                            <i className="ph ph-receipt text-indigo-500"></i>
                                            <select value={filterType} onChange={e=>setFilterType(e.target.value)} className="outline-none bg-transparent">
                                                <option value="ALL">全部發票類型</option>
                                                <option value="三聯式">三聯式 (B2B)</option>
                                                <option value="二聯式">二聯式 (B2C)</option>
                                            </select>
                                        </div>

                                        <button onClick={exportCSV} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg text-xs hover:bg-emerald-700 transition-all"><i className="ph ph-download"></i> 導出 CSV</button>
                                    </div>
                                </header>
                                <div className="bg-white rounded-[3rem] border border-slate-200 overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 tracking-widest border-b uppercase">
                                            <tr><th className="p-6">發票號碼</th><th className="p-6 text-center">類型/來源</th><th className="p-6 text-center">狀態</th><th className="p-6 text-right font-black">總計金額</th><th className="p-6 text-center">操作</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {invoices.filter(i=>{
                                                const matchPeriod = filterPeriod === 'ALL' || getInvoicePeriod(i.date) === filterPeriod;
                                                const matchType = filterType === 'ALL' || i.invoiceType === filterType;
                                                const matchTrans = filterTrans === 'ALL' || i.transactionType === filterTrans;
                                                return matchPeriod && matchType && matchTrans;
                                            }).map(inv=>(
                                                <Fragment key={inv.id}>
                                                    <tr onClick={()=>setExpandedInvoiceId(expandedInvoiceId===inv.id?null:inv.id)} className="cursor-pointer hover:bg-slate-50 transition-all group">
                                                        <td className={`p-6 font-black font-mono text-lg ${inv.status==='void'?'line-through text-slate-300':'text-slate-800'}`}>{inv.invoiceNumber}</td>
                                                        <td className="p-6 text-center">
                                                            <div className="flex flex-col items-center">
                                                                <span className={`text-[10px] font-black px-3 py-1 rounded-md border ${inv.transactionType==='進項'?'border-red-200 text-red-600 bg-red-50':'border-indigo-200 text-indigo-700 bg-indigo-50'}`}>{inv.transactionType || '銷項'}</span>
                                                                <div className="text-[10px] font-bold text-slate-400 mt-1 truncate max-w-[120px]">{inv.vendorName || '公司內帳'}</div>
                                                                <div className="text-[8px] font-bold text-slate-300 italic">{inv.invoiceType}</div>
                                                            </div>
                                                        </td>
                                                        <td className="p-6 text-center">{inv.status==='void'?<span className="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-black">作廢</span>:<span className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black">正常</span>}</td>
                                                        <td className={`p-6 text-right font-black font-mono text-xl ${inv.transactionType==='進項'?'text-red-500':'text-indigo-700'}`}>{inv.transactionType==='進項'?'-':''}${(inv.total||0).toLocaleString()}</td>
                                                        <td className="p-6 text-center"><button onClick={(e)=>{e.stopPropagation(); setInvoices(invoices.filter(i=>i.id!==inv.id));}} className="text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"><i className="ph-fill ph-trash-simple text-2xl"></i></button></td>
                                                    </tr>
                                                    {expandedInvoiceId===inv.id && (
                                                        <tr className="bg-slate-900 animate-slide-in">
                                                            <td colSpan="5" className="p-10">
                                                                <div className="mb-6 flex justify-between items-start">
                                                                    <div className="text-white">
                                                                        <div className="text-xs text-slate-400 font-black mb-1">對方公司 (供應商)</div>
                                                                        <div className="text-lg font-black text-emerald-400 underline">{inv.vendorName || '無記錄'}</div>
                                                                    </div>
                                                                    <div className="text-right text-white">
                                                                        <div className="text-xs text-slate-400 font-black mb-1">開立日期 / 統編</div>
                                                                        <div className="text-sm font-bold font-mono">{inv.date} / {inv.taxId || 'N/A'}</div>
                                                                    </div>
                                                                </div>
                                                                <div className="rounded-[2rem] border border-slate-800 overflow-hidden shadow-2xl">
                                                                    <table className="w-full text-xs text-left text-slate-300">
                                                                        <thead className="bg-slate-800 text-slate-500 font-black border-b border-slate-700">
                                                                            <tr><th className="p-4">品項/規格</th><th className="p-4 text-center">數量</th><th className="p-4 text-right">單價</th><th className="p-4 text-right">小計</th></tr>
                                                                        </thead>
                                                                        <tbody className="divide-y divide-slate-800/50">
                                                                            {(inv.items || []).map((it, idx) => (
                                                                                <tr key={idx}><td className="p-4"><div className="font-bold">{it.name || '項目'}</div><div className="text-[10px] text-slate-500 italic mt-0.5">{it.specs}</div></td><td className="p-4 text-center font-mono">{it.quantity}</td><td className="p-4 text-right font-mono">${(it.unitPrice||0).toLocaleString()}</td><td className="p-4 text-right font-black text-emerald-400 font-mono">${(it.amount||0).toLocaleString()}</td></tr>
                                                                            ))}
                                                                        </tbody>
                                                                    </table>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t p-4 z-50 flex justify-around shadow-2xl pb-safe">
                        <button onClick={()=>setActiveTab('help')} className={activeTab==='help'?'text-indigo-600':'text-slate-400'}><i className="ph ph-info text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('dashboard')} className={activeTab==='dashboard'?'text-indigo-600':'text-slate-400'}><i className="ph ph-chart-pie text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('entry')} className={activeTab==='entry'?'text-indigo-600':'text-slate-400'}><i className="ph ph-plus-circle text-3xl"></i></button>
                        <button onClick={()=>setActiveTab('list')} className={activeTab==='list'?'text-indigo-600':'text-slate-400'}><i className="ph ph-list-dashes text-3xl"></i></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
