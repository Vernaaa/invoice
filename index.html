<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextGen 發票智能錄入系統</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Phosphor 企業級圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- 引入 React, ReactDOM 與 Chart.js (更穩定強大的視覺化引擎) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-in-row { animation: fadeInRow 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 圖表配色票
        const COLORS = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];

        const INITIAL_INVOICES = [
            { id: '1', invoiceNumber: 'AB-12345678', date: '2026-04-01', invoiceType: '三聯式', taxId: '23456789', netAmount: 1000, tax: 50, total: 1050, items: [{id: 1, name: '高階機械鍵盤', quantity: 1, unitPrice: 1000, amount: 1000}], status: 'verified' },
            { id: '2', invoiceNumber: 'CD-87654321', date: '2026-03-15', invoiceType: '二聯式', taxId: '', netAmount: 5000, tax: 250, total: 5250, items: [{id: 2, name: '辦公椅', quantity: 2, unitPrice: 2625, amount: 5250}], status: 'verified' },
            { id: '3', invoiceNumber: 'EF-99887766', date: '2026-05-10', invoiceType: '三聯式', taxId: '11223344', netAmount: 10000, tax: 500, total: 10500, items: [{id: 3, name: '商務筆電', quantity: 1, unitPrice: 10000, amount: 10000}], status: 'verified' },
            { id: '4', invoiceNumber: 'GH-11223344', date: '2026-05-12', invoiceType: '二聯式', taxId: '', netAmount: 250, tax: 0, total: 250, items: [{id: 4, name: '跨國雲端伺服器(免稅)', quantity: 1, unitPrice: 250, amount: 250}], status: 'verified' },
        ];

        const getInvoicePeriod = (dateString) => {
            if (!dateString) return '未知期別';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const periodStart = month % 2 === 0 ? month - 1 : month;
            const periodEnd = periodStart + 1;
            const pad = (n) => n.toString().padStart(2, '0');
            return `${year}年 ${pad(periodStart)}-${pad(periodEnd)}月`;
        };

        const generateItemId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('nextgen_invoices');
                return saved ? JSON.parse(saved) : INITIAL_INVOICES;
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [toast, setToast] = useState(null);
            const [selectedPeriod, setSelectedPeriod] = useState('ALL');
            
            const [formData, setFormData] = useState({
                invoiceType: '三聯式',
                taxRate: 0.05, 
                invoiceNumber: '',
                date: new Date().toISOString().split('T')[0],
                taxId: '',
                items: [],
                netAmount: '',
                tax: '',
                total: ''
            });
            
            const [isScanning, setIsScanning] = useState(false);
            const [errors, setErrors] = useState({});
            const invoiceInputRef = useRef(null);

            // Chart.js 的 Canvas Refs
            const barChartRef = useRef(null);
            const pieChartRef = useRef(null);
            const barChartInstance = useRef(null);
            const pieChartInstance = useRef(null);

            useEffect(() => {
                localStorage.setItem('nextgen_invoices', JSON.stringify(invoices));
            }, [invoices]);

            const availablePeriods = useMemo(() => {
                const periods = invoices.map(inv => getInvoicePeriod(inv.date));
                return [...new Set(periods)].sort((a, b) => b.localeCompare(a));
            }, [invoices]);

            const filteredInvoices = useMemo(() => {
                if (selectedPeriod === 'ALL') return invoices;
                return invoices.filter(inv => getInvoicePeriod(inv.date) === selectedPeriod);
            }, [invoices, selectedPeriod]);

            useEffect(() => {
                if (selectedPeriod !== 'ALL' && !availablePeriods.includes(selectedPeriod)) {
                    setSelectedPeriod('ALL');
                }
            }, [availablePeriods, selectedPeriod]);

            // --- 圖表數據處理邏輯 ---
            const taxDistributionData = useMemo(() => {
                const taxable = filteredInvoices.filter(inv => inv.tax > 0).reduce((sum, inv) => sum + inv.total, 0);
                const taxFree = filteredInvoices.filter(inv => inv.tax === 0).reduce((sum, inv) => sum + inv.total, 0);
                return [
                    { name: '應稅銷售額 (5%)', value: taxable },
                    { name: '免稅銷售額 (0%)', value: taxFree }
                ].filter(d => d.value > 0);
            }, [filteredInvoices]);

            const topItemsData = useMemo(() => {
                const itemMap = {};
                filteredInvoices.forEach(inv => {
                    if (inv.items && inv.items.length > 0) {
                        inv.items.forEach(item => {
                            if (item.name) {
                                itemMap[item.name] = (itemMap[item.name] || 0) + item.amount;
                            }
                        });
                    } else if (inv.netAmount > 0) {
                        itemMap['無明細銷售'] = (itemMap['無明細銷售'] || 0) + inv.netAmount;
                    }
                });

                return Object.keys(itemMap)
                    .map(key => ({ name: key, sales: itemMap[key] }))
                    .sort((a, b) => b.sales - a.sales)
                    .slice(0, 5);
            }, [filteredInvoices]);

            // --- 初始化與更新 Chart.js 圖表 ---
            useEffect(() => {
                if (activeTab === 'dashboard' && topItemsData.length > 0 && barChartRef.current) {
                    if (barChartInstance.current) barChartInstance.current.destroy();
                    
                    barChartInstance.current = new Chart(barChartRef.current, {
                        type: 'bar',
                        data: {
                            labels: topItemsData.map(d => d.name),
                            datasets: [{
                                label: '銷售額 ($)',
                                data: topItemsData.map(d => d.sales),
                                backgroundColor: COLORS,
                                borderRadius: 6
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#0f172a',
                                    titleFont: { size: 14, family: "'Segoe UI', sans-serif" },
                                    bodyFont: { size: 14, weight: 'bold', family: "monospace" },
                                    padding: 12,
                                    displayColors: false,
                                    callbacks: {
                                        label: function(context) {
                                            return '$' + context.raw.toLocaleString();
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: { display: false, grid: { display: false } },
                                y: { border: { display: false }, grid: { display: false }, ticks: { font: { size: 12, family: "'Segoe UI', sans-serif" }, color: '#64748b' } }
                            }
                        }
                    });
                }
                return () => {
                    if (barChartInstance.current) barChartInstance.current.destroy();
                };
            }, [activeTab, topItemsData]);

            useEffect(() => {
                if (activeTab === 'dashboard' && taxDistributionData.length > 0 && pieChartRef.current) {
                    if (pieChartInstance.current) pieChartInstance.current.destroy();

                    pieChartInstance.current = new Chart(pieChartRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: taxDistributionData.map(d => d.name),
                            datasets: [{
                                data: taxDistributionData.map(d => d.value),
                                backgroundColor: ['#4f46e5', '#10b981'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            cutout: '70%',
                            plugins: {
                                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20, font: { family: "'Segoe UI', sans-serif" }, color: '#64748b' } },
                                tooltip: {
                                    backgroundColor: '#0f172a',
                                    titleFont: { size: 14, family: "'Segoe UI', sans-serif" },
                                    bodyFont: { size: 14, weight: 'bold', family: "monospace" },
                                    padding: 12,
                                    displayColors: false,
                                    callbacks: {
                                        label: function(context) {
                                            return '$' + context.raw.toLocaleString();
                                        }
                                    }
                                }
                            }
                        }
                    });
                }
                return () => {
                    if (pieChartInstance.current) pieChartInstance.current.destroy();
                };
            }, [activeTab, taxDistributionData]);

            const exportToCSV = () => {
                if (filteredInvoices.length === 0) {
                    showToast('目前篩選的期別沒有資料可以匯出喔！', 'info');
                    return;
                }
                const headers = ['期別', '發票類型', '稅別', '發票號碼', '開立日期', '買受人統編', '品項名稱', '單價', '數量', '品項小計', '整筆銷售額(未稅)', '整筆營業稅', '整筆總計(含稅)'];
                const csvRows = [headers.join(',')];

                filteredInvoices.forEach(inv => {
                    const taxTypeLabel = inv.tax === 0 ? '免稅' : '應稅';
                    const baseInfo = `${getInvoicePeriod(inv.date)},${inv.invoiceType},${taxTypeLabel},${inv.invoiceNumber},${inv.date},${inv.taxId || ''}`;
                    const totalInfo = `${inv.netAmount},${inv.tax},${inv.total}`;

                    if (inv.items && inv.items.length > 0) {
                        inv.items.forEach(item => {
                            const safeName = `"${(item.name || '').replace(/"/g, '""')}"`;
                            csvRows.push(`${baseInfo},${safeName},${item.unitPrice || 0},${item.quantity || 0},${item.amount || 0},${totalInfo}`);
                        });
                    } else {
                        csvRows.push(`${baseInfo},無明細,0,0,0,${totalInfo}`);
                    }
                });

                const csvContent = csvRows.join('\n');
                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `發票財務報表_明細展開版_${selectedPeriod === 'ALL' ? '全部' : selectedPeriod}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast(`已成功匯出扁平化明細報表！分析起來更得心應手。`, 'success');
            };

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const validateForm = () => {
                const newErrors = {};
                if (!formData.invoiceNumber.match(/^[A-Z]{2}-\d{8}$/)) newErrors.invoiceNumber = '格式為：兩碼英文-八碼數字';
                if (formData.invoiceType === '三聯式') {
                    if (!formData.taxId || !formData.taxId.match(/^\d{8}$/)) {
                        newErrors.taxId = '統編需為 8 碼數字';
                    }
                    if (!formData.netAmount || isNaN(formData.netAmount)) newErrors.netAmount = '請輸入有效銷售額';
                } else {
                    if (!formData.total || isNaN(formData.total)) newErrors.total = '請輸入有效總計金額';
                }
                
                formData.items.forEach((item, index) => {
                    if (!item.name.trim()) newErrors[`item_name_${index}`] = '請輸入名稱';
                });

                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const recalculateTotalsFromItems = (itemsToCalc, currentType, currentRate) => {
                const sumAmount = itemsToCalc.reduce((acc, item) => acc + (item.amount || 0), 0);
                let newNet = ''; let newTax = ''; let newTotal = '';

                if (itemsToCalc.length > 0 && sumAmount > 0) {
                    if (currentType === '三聯式') {
                        newNet = sumAmount;
                        newTax = Math.round(sumAmount * currentRate);
                        newTotal = sumAmount + newTax;
                    } else {
                        newTotal = sumAmount;
                        newNet = Math.round(sumAmount / (1 + currentRate));
                        newTax = sumAmount - newNet;
                    }
                }
                return { netAmount: newNet, tax: newTax, total: newTotal };
            };

            const handleTaxRateChange = (rate) => {
                let newFormData = { ...formData, taxRate: rate };
                if (newFormData.items.length > 0) {
                    const calcRes = recalculateTotalsFromItems(newFormData.items, newFormData.invoiceType, rate);
                    newFormData = { ...newFormData, ...calcRes };
                } else {
                    if (newFormData.invoiceType === '三聯式' && newFormData.netAmount && !isNaN(newFormData.netAmount)) {
                        const net = parseInt(newFormData.netAmount, 10);
                        newFormData.tax = Math.round(net * rate);
                        newFormData.total = net + newFormData.tax;
                    } else if (newFormData.invoiceType === '二聯式' && newFormData.total && !isNaN(newFormData.total)) {
                        const tot = parseInt(newFormData.total, 10);
                        newFormData.netAmount = Math.round(tot / (1 + rate));
                        newFormData.tax = tot - newFormData.netAmount;
                    }
                }
                setFormData(newFormData);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                let newFormData = { ...formData, [name]: value };

                if (name === 'invoiceType') {
                    newFormData.taxId = ''; 
                    if (newFormData.items.length > 0) {
                        const calcRes = recalculateTotalsFromItems(newFormData.items, value, newFormData.taxRate);
                        newFormData = { ...newFormData, ...calcRes };
                    } else {
                        newFormData.netAmount = ''; newFormData.tax = ''; newFormData.total = '';
                    }
                }

                if (newFormData.items.length === 0) {
                    if (name === 'netAmount' && newFormData.invoiceType === '三聯式' && value && !isNaN(value)) {
                        const net = parseInt(value, 10);
                        newFormData.tax = Math.round(net * formData.taxRate);
                        newFormData.total = net + newFormData.tax;
                    }
                    if (name === 'total' && newFormData.invoiceType === '二聯式' && value && !isNaN(value)) {
                        const tot = parseInt(value, 10);
                        const calculatedNet = Math.round(tot / (1 + formData.taxRate));
                        newFormData.netAmount = calculatedNet;
                        newFormData.tax = tot - calculatedNet;
                    }
                }

                if (name === 'invoiceNumber') {
                    let formatted = value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (formatted.length > 2) formatted = formatted.substring(0, 2) + '-' + formatted.substring(2, 10);
                    newFormData[name] = formatted;
                }
                if (name === 'taxId') {
                    newFormData[name] = value.replace(/[^\d]/g, '').substring(0, 8);
                }

                setFormData(newFormData);
                if (errors[name]) setErrors({ ...errors, [name]: null });
            };

            const handleItemChange = (index, field, value) => {
                const newItems = [...formData.items];
                const item = newItems[index];
                
                if (field === 'quantity' || field === 'unitPrice') {
                    const numValue = value === '' ? '' : parseFloat(value);
                    item[field] = numValue;
                    const q = parseFloat(item.quantity) || 0;
                    const p = parseFloat(item.unitPrice) || 0;
                    item.amount = Math.round(q * p);
                } else {
                    item[field] = value;
                }
                
                if (errors[`item_name_${index}`] && field === 'name') {
                    setErrors({ ...errors, [`item_name_${index}`]: null });
                }

                let newFormData = { ...formData, items: newItems };
                const calcRes = recalculateTotalsFromItems(newItems, newFormData.invoiceType, newFormData.taxRate);
                newFormData = { ...newFormData, ...calcRes };
                
                setFormData(newFormData);
            };

            const addItem = () => {
                setFormData({
                    ...formData,
                    items: [...formData.items, { id: generateItemId(), name: '', quantity: 1, unitPrice: '', amount: 0 }]
                });
            };

            const removeItem = (index) => {
                const newItems = formData.items.filter((_, i) => i !== index);
                let newFormData = { ...formData, items: newItems };
                
                if (newItems.length > 0) {
                    const calcRes = recalculateTotalsFromItems(newItems, newFormData.invoiceType, newFormData.taxRate);
                    newFormData = { ...newFormData, ...calcRes };
                }
                setFormData(newFormData);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validateForm()) {
                    const cleanItems = formData.items.filter(item => item.name.trim() !== '');

                    const newInvoice = {
                        ...formData,
                        items: cleanItems,
                        id: Date.now().toString(),
                        netAmount: parseInt(formData.netAmount, 10) || 0,
                        tax: parseInt(formData.tax, 10) || 0,
                        total: parseInt(formData.total, 10) || 0,
                    };
                    
                    const period = getInvoicePeriod(formData.date);
                    const updatedInvoices = [newInvoice, ...invoices].sort((a, b) => new Date(b.date) - new Date(a.date));
                    setInvoices(updatedInvoices);
                    showToast(`發票已歸檔至 ${period}！`, 'success');
                    
                    setFormData({ ...formData, invoiceNumber: '', taxId: '', items: [], netAmount: '', tax: '', total: '' });
                    
                    if (window.innerWidth > 768) {
                        invoiceInputRef.current?.focus();
                    } else {
                        invoiceInputRef.current?.blur();
                    }
                } else {
                    showToast('請檢查輸入格式與品項是否完整。', 'error');
                }
            };

            const handleDelete = (id) => {
                setInvoices(invoices.filter(inv => inv.id !== id));
                showToast('發票已作廢刪除。', 'success');
            };

            const simulateAIScan = () => {
                setIsScanning(true);
                showToast('AI 視覺模組啟動中...', 'info');
                setTimeout(() => {
                    const isTri = Math.random() > 0.5;
                    const isTaxFree = Math.random() > 0.8;
                    const currentTaxRate = isTaxFree ? 0 : 0.05;
                    
                    const item1Price = Math.floor(Math.random() * 3000) + 500;
                    const item2Price = Math.floor(Math.random() * 2000) + 200;
                    const simulatedItems = [
                        { id: generateItemId(), name: isTri ? '企業版軟體授權' : '辦公室耗材', quantity: 1, unitPrice: item1Price, amount: item1Price },
                        { id: generateItemId(), name: isTri ? '伺服器維護費' : '茶水間點心', quantity: 2, unitPrice: item2Price, amount: item2Price * 2 }
                    ];
                    
                    const calcRes = recalculateTotalsFromItems(simulatedItems, isTri ? '三聯式' : '二聯式', currentTaxRate);
                    
                    setFormData({
                        invoiceType: isTri ? '三聯式' : '二聯式',
                        taxRate: currentTaxRate,
                        invoiceNumber: `XY-${Math.floor(10000000 + Math.random() * 90000000)}`,
                        date: new Date().toISOString().split('T')[0],
                        taxId: isTri ? `${Math.floor(10000000 + Math.random() * 90000000)}` : '',
                        items: simulatedItems,
                        ...calcRes
                    });
                    setIsScanning(false);
                    showToast('AI 解析完成！明細已自動帶入並加總。', 'success');
                }, 1800);
            };

            const totalAmount = filteredInvoices.reduce((sum, inv) => sum + inv.total, 0);
            const totalTax = filteredInvoices.reduce((sum, inv) => sum + inv.tax, 0);

            const PeriodSelector = () => (
                <div className="flex items-center gap-2 bg-white border border-slate-200 px-3 py-2 rounded-xl shadow-sm flex-shrink-0 w-full md:w-auto">
                    <i className="ph ph-calendar-blank text-slate-400 text-lg"></i>
                    <select 
                        value={selectedPeriod} 
                        onChange={(e) => setSelectedPeriod(e.target.value)}
                        className="bg-transparent border-none focus:outline-none text-slate-700 font-medium text-sm cursor-pointer w-full"
                    >
                        <option value="ALL">全部期別總覽</option>
                        {availablePeriods.map(p => (
                            <option key={p} value={p}>{p}</option>
                        ))}
                    </select>
                </div>
            );

            const isAmountLockedByItems = formData.items.length > 0;

            return (
                <div className="flex flex-col md:flex-row h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
                    
                    {/* 桌機版側邊欄 */}
                    <aside className="hidden md:flex w-64 bg-slate-900 text-slate-300 flex-col z-10 shadow-xl flex-shrink-0">
                        <div className="p-6">
                            <h1 className="text-xl font-bold text-white flex items-center gap-2">
                                <i className="ph-fill ph-lightning text-emerald-400 text-2xl"></i>
                                NextGen 發票
                            </h1>
                            <p className="text-xs mt-2 text-slate-500">2026 企業級中樞</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <button onClick={() => setActiveTab('entry')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'entry' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="ph ph-plus text-xl"></i> 發票錄入
                            </button>
                            <button onClick={() => setActiveTab('list')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'list' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="ph ph-list-numbers text-xl"></i> 總覽與篩選
                            </button>
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <i className="ph ph-chart-polar text-xl"></i> 統計儀表板
                            </button>
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button className="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors">
                                <i className="ph ph-gear text-lg"></i> 設定
                            </button>
                        </div>
                    </aside>

                    {/* 手機版底部導航列 */}
                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center p-2 z-50 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] pb-safe">
                        <button onClick={() => setActiveTab('entry')} className={`flex flex-col items-center p-2 w-full transition-colors ${activeTab === 'entry' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className={`ph${activeTab === 'entry' ? '-fill' : ''} ph-plus-circle text-2xl mb-1`}></i>
                            <span className="text-[10px] font-bold">錄入</span>
                        </button>

                                                            <td className="p-3 md:p-4 text-sm md:text-base text-indigo-700 font-bold font-mono text-right">${inv.total.toLocaleString()}</td>
                                                            <td className="p-3 md:p-4 text-center">
                                                                <button onClick={() => handleDelete(inv.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="作廢刪除">
                                                                    <i className="ph ph-trash text-lg md:text-xl"></i>
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="md:hidden bg-slate-50 text-center text-[10px] text-slate-400 py-1.5 border-t border-slate-200">
                                        <i className="ph ph-arrows-left-right mr-1"></i>左右滑動查看完整表格
                                    </div>
                                </div>
                            )}

                            {/* 升級為 Chart.js 的儀表板區塊 */}
                            {activeTab === 'dashboard' && (
                                <div className="animate-slide-in space-y-6">
                                    <div className="mb-4 flex items-center justify-between">
                                        <h3 className="text-lg md:text-xl font-bold text-slate-700">
                                            {selectedPeriod === 'ALL' ? '累積財務總覽' : `${selectedPeriod} 報表`}
                                        </h3>
                                    </div>
                                    
                                    {/* 核心數字卡片 */}
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                                        <div className="col-span-2 md:col-span-1 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                            <div className="text-slate-500 text-xs md:text-sm font-bold mb-1 md:mb-2">處理發票數</div>
                                            <div className="text-3xl md:text-4xl font-black text-slate-800">{filteredInvoices.length} <span className="text-sm md:text-lg text-slate-400 font-normal">張</span></div>
                                        </div>
                                        <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                            <div className="text-slate-500 text-xs md:text-sm font-bold mb-1 md:mb-2">銷售總額(未稅)</div>
                                            <div className="text-xl md:text-4xl font-black text-slate-800 font-mono">${(totalAmount - totalTax).toLocaleString()}</div>
                                        </div>
                                        <div className="bg-gradient-to-br from-indigo-500 to-indigo-700 p-5 md:p-6 rounded-2xl shadow-sm border border-indigo-200 text-white">
                                            <div className="text-indigo-100 text-xs md:text-sm font-bold mb-1 md:mb-2">發票總額(含稅)</div>
                                            <div className="text-xl md:text-4xl font-black font-mono">${totalAmount.toLocaleString()}</div>
                                            <div className="mt-2 md:mt-4 text-[10px] md:text-sm text-indigo-200 font-medium">營業稅: ${totalTax.toLocaleString()}</div>
                                        </div>
                                    </div>

                                    {/* 視覺化圖表區塊 */}
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {/* 長條圖：品項銷售排行 */}
                                        <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                            <div className="flex items-center gap-2 mb-6">
                                                <div className="p-2 bg-indigo-50 rounded-lg text-indigo-600"><i className="ph-fill ph-chart-bar text-xl"></i></div>
                                                <h4 className="font-bold text-slate-700">熱門品項銷售排行 (Top 5)</h4>
                                            </div>
                                            {topItemsData.length > 0 ? (
                                                <div className="h-64 w-full relative">
                                                    <canvas ref={barChartRef}></canvas>
                                                </div>
                                            ) : (
                                                <div className="h-64 flex flex-col items-center justify-center text-slate-400">
                                                    <i className="ph ph-chart-line-down text-4xl mb-2"></i>
                                                    <p className="text-sm">本期尚無足夠數據可供分析</p>
                                                </div>
                                            )}
                                        </div>

                                        {/* 甜甜圈圖：稅務結構分佈 */}
                                        <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                            <div className="flex items-center gap-2 mb-6">
                                                <div className="p-2 bg-emerald-50 rounded-lg text-emerald-600"><i className="ph-fill ph-chart-donut text-xl"></i></div>
                                                <h4 className="font-bold text-slate-700">稅務結構與合規比例</h4>
                                            </div>
                                            {taxDistributionData.length > 0 ? (
                                                <div className="h-64 w-full relative">
                                                    <canvas ref={pieChartRef}></canvas>
                                                </div>
                                            ) : (
                                                <div className="h-64 flex flex-col items-center justify-center text-slate-400">
                                                    <i className="ph ph-chart-pie-slice text-4xl mb-2"></i>
                                                    <p className="text-sm">本期無交易紀錄</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
